<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=400">
<title>Control Panel</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1e1e1e;
  --bg-section: #252526;
  --bg-input: #3c3c3c;
  --bg-input-hover: #505050;
  --text: #cccccc;
  --text-dim: #858585;
  --accent: #0e639c;
  --accent-hover: #1177bb;
  --green: #388a34;
  --green-hover: #45a641;
  --red: #c94040;
  --red-hover: #d95050;
  --border: #3c3c3c;
  --radius: 4px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', sans-serif;
  font-size: 13px;
  line-height: 1.4;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #424242; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

/* Tab Bar */
.tab-bar {
  display: flex;
  background: var(--bg-section);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab {
  flex: 1;
  padding: 7px 0;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.3px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }

/* Tab Content */
.tab-content { display: none; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
.tab-content.active { display: flex; }

/* Section */
.section {
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.section.flex { flex: 1; display: flex; flex-direction: column; border-bottom: none; min-height: 0; }
.section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 4px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.12s;
  background: var(--bg-input);
  color: var(--text);
  white-space: nowrap;
}
.btn:hover { background: var(--bg-input-hover); }
.btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
.btn.loading { pointer-events: none; opacity: 0.7; }
.btn.loading::after {
  content: '';
  display: inline-block;
  width: 12px;
  height: 12px;
  margin-left: 6px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

.btn-go { background: var(--green); border-color: var(--green); color: #fff; font-weight: 600; }
.btn-go:hover { background: var(--green-hover); }
.btn-stop { background: var(--red); border-color: var(--red); color: #fff; font-weight: 600; }
.btn-stop:hover { background: var(--red-hover); }

.btn-row { display: flex; gap: 6px; margin-bottom: 8px; }

/* Status */
.status { font-size: 13px; margin-bottom: 2px; }
.status.live { color: #f48771; font-weight: 600; }
.stats { font-size: 11px; color: var(--text-dim); min-height: 16px; }

/* Select */
.select-row { display: flex; gap: 4px; margin-bottom: 6px; }
select {
  flex: 1;
  padding: 3px 6px;
  background: var(--bg-input);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 12px;
  font-family: inherit;
  outline: none;
  min-width: 0;
}
select:focus { border-color: var(--accent); }

/* Capture List */
.capture-list {
  background: var(--bg-section);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  min-height: 48px;
  max-height: 90px;
  overflow-y: auto;
  margin-top: 6px;
}
.capture-item {
  padding: 3px 8px;
  font-size: 12px;
  cursor: pointer;
  border-bottom: 1px solid #2d2d30;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.capture-item:last-child { border-bottom: none; }
.capture-item:hover { background: var(--bg-input); }
.capture-item { display: flex; align-items: center; gap: 4px; }
.capture-item .cap-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.capture-item .cap-stop { background: none; border: none; color: var(--red); cursor: pointer; font-size: 14px; padding: 0 2px; flex-shrink: 0; }
.capture-item .cap-stop:hover { color: var(--red-hover); }
.capture-empty { padding: 10px; text-align: center; color: var(--text-dim); font-size: 11px; }

/* Volume */
.volume-row { display: flex; align-items: center; margin-bottom: 4px; gap: 6px; }
.volume-label { width: 44px; font-size: 12px; color: var(--text-dim); flex-shrink: 0; }
.volume-value { width: 34px; text-align: right; font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
input[type="range"] {
  -webkit-appearance: none;
  flex: 1;
  height: 4px;
  background: var(--bg-input);
  border-radius: 2px;
  outline: none;
  min-width: 0;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb:hover { background: var(--accent-hover); }

/* Audio Meter */
.meter-sources { display: flex; gap: 4px; margin-bottom: 4px; }
.meter-src {
  font-size: 9px; padding: 1px 5px; border-radius: 2px;
  background: var(--bg-input); color: var(--text-dim); transition: all 0.15s;
}
.meter-src.active { color: #fff; }
.meter-src.bgm.active { background: #2d6a4f; }
.meter-src.tts.active { background: #5c4d9a; }
.meter-container {
  position: relative; height: 8px; background: #0a0a14;
  border-radius: 3px; overflow: hidden; border: 1px solid var(--border);
  transition: border-color 0.3s;
}
.meter-container.clipping {
  border-color: var(--red);
  box-shadow: 0 0 6px rgba(201, 64, 64, 0.5);
}
/* 危険ゾーン */
.meter-zone {
  position: absolute; top: 0; height: 100%; pointer-events: none;
}
.meter-zone.hot {
  left: 80%; width: 15%;  /* -12dB ~ -3dB */
  background: rgba(244, 162, 97, 0.35);
}
.meter-zone.danger {
  left: 95%; width: 5%;   /* -3dB ~ 0dB */
  background: rgba(201, 64, 64, 0.5);
}
.meter-zone-line {
  position: absolute; top: 0; height: 100%; width: 1px; z-index: 4;
}
.meter-zone-line.hot-line {
  left: 80%; background: rgba(244, 162, 97, 0.7);
}
.meter-zone-line.danger-line {
  left: 95%; background: rgba(201, 64, 64, 0.9);
}
.meter-bar {
  position: absolute; top: 0; left: 0; height: 100%; width: 0%;
  transition: width 0.05s linear; border-radius: 2px;
}
.meter-bar.level {
  background: linear-gradient(90deg, #2d6a4f 0%, #52b788 50%, #f4a261 80%, #e76f51 95%);
  z-index: 1;
}
.meter-bar.peak {
  width: 2px; background: #fff; z-index: 2;
  transition: left 0.05s linear; left: 0%;
}
.meter-info {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 2px; font-size: 10px;
  font-family: 'Cascadia Code', 'Consolas', monospace;
}
.meter-db { color: #52b788; }
.meter-db.hot { color: #f4a261; }
.meter-db.clip { color: #e76f51; }
.meter-peak { color: var(--text-dim); }

/* Log */
.log-area {
  flex: 1;
  background: #1a1a1a;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: 'Cascadia Code', 'Consolas', monospace;
  font-size: 11px;
  line-height: 1.5;
  color: #9da5b4;
  padding: 6px 8px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
  min-height: 0;
  user-select: text;
  cursor: text;
}
.log-error { color: #f48771; }
.log-success { color: #89d185; }
.log-info { color: #9cdcfe; }

/* Chat placeholder */
.placeholder {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  font-size: 12px;
}
</style>
</head>
<body>

<div class="tab-bar">
  <button class="tab active" data-tab="stream">Stream</button>
  <button class="tab" data-tab="sound">Sound</button>
  <button class="tab" data-tab="chat">Chat</button>
</div>

<div class="tab-content active" id="tab-stream">
  <div class="section">
    <div class="section-title">Stream</div>
    <div class="btn-row">
      <button class="btn btn-go" id="goLiveBtn" onclick="goLive()">● Go Live</button>
      <button class="btn btn-stop" id="stopBtn" onclick="stopStream()" disabled>■ Stop</button>
    </div>
    <div class="status" id="streamStatus">Standby</div>
    <div class="stats" id="streamStats"></div>
  </div>

  <div class="section">
    <div class="section-title">Capture</div>
    <div class="select-row">
      <select id="windowSelect"><option>Loading windows...</option></select>
      <button class="btn" onclick="refreshWindows()" title="Refresh">↻</button>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="startCapture()">Start</button>
    </div>
    <div class="capture-list" id="captureList">
      <div class="capture-empty">No captures</div>
    </div>
  </div>

  <div class="section flex">
    <div class="section-title">Log</div>
    <div class="log-area" id="logArea"></div>
  </div>
</div>

<div class="tab-content" id="tab-sound">
  <div class="section">
    <div class="section-title">Volume</div>
    <div class="volume-row">
      <span class="volume-label">Master</span>
      <input type="range" min="0" max="200" value="80" id="volMaster" oninput="onVolume('master',this.value)">
      <span class="volume-value" id="volMasterVal">80%</span>
    </div>
    <div class="volume-row">
      <span class="volume-label">Voice</span>
      <input type="range" min="0" max="100" value="90" id="volTts" oninput="onVolume('tts',this.value)">
      <span class="volume-value" id="volTtsVal">90%</span>
    </div>
    <div class="volume-row">
      <span class="volume-label">BGM</span>
      <input type="range" min="0" max="100" value="50" id="volBgm" oninput="onVolume('bgm',this.value)">
      <span class="volume-value" id="volBgmVal">50%</span>
    </div>
  </div>
  <div class="section" id="bgmStatus" style="display:none;">
    <div class="section-title">BGM</div>
    <div id="bgmStatusText" style="font-size:11px;color:var(--text-dim);"></div>
  </div>
  <div class="section">
    <div class="section-title">Meter</div>
    <div class="meter-sources">
      <span class="meter-src bgm" id="meterBgm">BGM</span>
      <span class="meter-src tts" id="meterTts">Voice</span>
    </div>
    <div class="meter-container" id="meterContainer">
      <div class="meter-zone hot"></div>
      <div class="meter-zone danger"></div>
      <div class="meter-zone-line hot-line"></div>
      <div class="meter-zone-line danger-line"></div>
      <div class="meter-bar level" id="meterLevel"></div>
      <div class="meter-bar peak" id="meterPeak"></div>
    </div>
    <div class="meter-info">
      <span class="meter-db" id="meterDb">-∞ dB</span>
      <span class="meter-peak" id="meterPeakDb">pk -∞</span>
    </div>
  </div>
</div>

<div class="tab-content" id="tab-chat">
  <div class="placeholder">Coming soon</div>
</div>

<script>
const $ = id => document.getElementById(id);
const wv = window.chrome?.webview;

// Tab switching
document.querySelector('.tab-bar').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  tab.classList.add('active');
  $('tab-' + tab.dataset.tab).classList.add('active');
});

// C# → HTML
wv?.addEventListener('message', e => {
  const m = e.data;
  if (!m?.type) return;
  if (m.type === 'status') console.log('[Panel] C#→HTML status:', JSON.stringify(m));
  switch (m.type) {
    case 'status': updateStatus(m); break;
    case 'windows': updateWindows(m.windows); break;
    case 'captures': updateCaptures(m.captures); break;
    case 'log': appendLog(m.text, m.level); break;
    case 'volume': setVolumes(m); break;
    case 'audioLevel': updateMeter(m); break;
    case 'streamResult': handleStreamResult(m); break;
    case 'bgm_status': updateBgmStatus(m); break;
  }
});

// HTML → C#
function send(msg) {
  console.log('[Panel] send:', JSON.stringify(msg), 'wv=', !!wv);
  if (!wv) { appendLog('ERROR: wv is null, postMessage unavailable', 'error'); return; }
  wv.postMessage(msg);
}
function goLive() {
  const btn = $('goLiveBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '準備中…';
  send({action:'goLive'});
}
function stopStream() {
  console.log('[Panel] stopStream clicked');
  const btn = $('stopBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '停止中…';
  send({action:'stopStream'});
}
function refreshWindows() { send({action:'refreshWindows'}); }

function startCapture() {
  const sel = $('windowSelect');
  const opt = sel.options[sel.selectedIndex];
  if (!opt?.dataset?.hwnd) return;
  send({action:'startCapture', hwnd: opt.dataset.hwnd, title: opt.textContent});
}

function onVolume(type, val) {
  const key = 'vol' + type.charAt(0).toUpperCase() + type.slice(1) + 'Val';
  $(key).textContent = val + '%';
  send({action:'volume', volumeType: type, value: parseInt(val)});
}

function handleStreamResult(m) {
  if (m.action === 'goLive') {
    const btn = $('goLiveBtn');
    btn.classList.remove('loading');
    btn.textContent = '● Go Live';
    if (!m.ok) btn.disabled = false;
  } else if (m.action === 'stop') {
    const btn = $('stopBtn');
    btn.classList.remove('loading');
    btn.textContent = '■ Stop';
    if (!m.ok) btn.disabled = false;
  }
}

// UI updates
function updateStatus(s) {
  const el = $('streamStatus'), st = $('streamStats');
  if (s.streaming) {
    el.textContent = 'Live  ' + (s.uptime || '');
    el.className = 'status live';
    st.textContent = '';
    $('goLiveBtn').disabled = true;
    $('stopBtn').disabled = false;
  } else {
    el.textContent = 'Standby';
    el.className = 'status';
    st.textContent = '';
    $('goLiveBtn').disabled = false;
    $('stopBtn').disabled = true;
  }
}

function updateWindows(wins) {
  const sel = $('windowSelect');
  sel.innerHTML = '';
  if (!wins?.length) { sel.innerHTML = '<option>No windows</option>'; return; }
  wins.forEach(w => {
    const o = document.createElement('option');
    o.textContent = w.title;
    o.dataset.hwnd = w.hwnd;
    sel.appendChild(o);
  });
}

function updateCaptures(caps) {
  const list = $('captureList');
  if (!caps?.length) { list.innerHTML = '<div class="capture-empty">No captures</div>'; return; }
  const selId = document.querySelector('.capture-item.selected')?.dataset?.id;
  list.innerHTML = '';
  caps.forEach(c => {
    const d = document.createElement('div');
    d.className = 'capture-item';
    d.dataset.id = c.id;
    const name = document.createElement('span');
    name.className = 'cap-name';
    name.textContent = c.name;
    d.appendChild(name);
    const stop = document.createElement('button');
    stop.className = 'cap-stop';
    stop.textContent = '✕';
    stop.title = 'Stop';
    stop.onclick = () => send({action:'stopCapture', id: c.id});
    d.appendChild(stop);
    list.appendChild(d);
  });
}

function updateBgmStatus(m) {
  const el = $('bgmStatus');
  const text = $('bgmStatusText');
  if (m.state === 'downloading') {
    el.style.display = '';
    const mb = (m.size / 1024 / 1024).toFixed(1);
    text.textContent = '⏳ Downloading... ' + mb + ' MB';
    text.style.color = 'var(--accent)';
  } else if (m.state === 'playing') {
    el.style.display = '';
    text.textContent = '♪ ' + (m.name || 'Playing');
    text.style.color = '#4ade80';
  } else if (m.state === 'stopped') {
    el.style.display = 'none';
  } else if (m.state === 'error') {
    el.style.display = '';
    text.textContent = '⚠ ' + (m.error || 'Error');
    text.style.color = '#f87171';
  }
}

function setVolumes(v) {
  ['master','tts','bgm'].forEach(t => {
    if (v[t] === undefined) return;
    const key = t.charAt(0).toUpperCase() + t.slice(1);
    $('vol'+key).value = v[t];
    $('vol'+key+'Val').textContent = v[t]+'%';
  });
}

function appendLog(text, level) {
  const area = $('logArea');
  const span = document.createElement('span');
  if (level) span.className = 'log-' + level;
  span.textContent = text + '\n';
  area.appendChild(span);
  while (area.childNodes.length > 300) area.removeChild(area.firstChild);
  area.scrollTop = area.scrollHeight;
}

// Audio meter
const METER_MIN_DB = -60;
let meterSmooth = METER_MIN_DB;
let meterPeakHold = METER_MIN_DB;
let meterPeakTime = 0;
let clipTimer = null;

function meterDbToPct(db) {
  if (db <= METER_MIN_DB) return 0;
  if (db >= 0) return 100;
  return ((db - METER_MIN_DB) / (0 - METER_MIN_DB)) * 100;
}

function updateMeter(data) {
  const db = isFinite(data.db) ? Math.max(METER_MIN_DB, data.db) : METER_MIN_DB;
  const instantPeak = isFinite(data.peak) ? Math.max(METER_MIN_DB, data.peak) : METER_MIN_DB;
  meterSmooth = db > meterSmooth ? db : meterSmooth * 0.85 + db * 0.15;

  // ピークホールド: 瞬時ピークかスムージングRMSの大きい方で更新、1.5秒でリセット
  const effectivePeak = Math.max(instantPeak, meterSmooth);
  const now = Date.now();
  if (effectivePeak > meterPeakHold || now - meterPeakTime > 1500) {
    meterPeakHold = effectivePeak;
    meterPeakTime = now;
  }

  $('meterLevel').style.width = meterDbToPct(meterSmooth) + '%';
  $('meterPeak').style.left = meterDbToPct(meterPeakHold) + '%';

  const dbStr = meterSmooth <= METER_MIN_DB ? '-∞ dB' : meterSmooth.toFixed(1) + ' dB';
  const pkStr = meterPeakHold <= METER_MIN_DB ? 'pk -∞' : 'pk ' + meterPeakHold.toFixed(0);
  $('meterDb').textContent = dbStr;
  $('meterPeakDb').textContent = pkStr;
  $('meterDb').className = 'meter-db' + (meterSmooth > -3 ? ' clip' : meterSmooth > -12 ? ' hot' : '');

  // Clipping warning
  if (meterPeakHold > -3) {
    $('meterContainer').classList.add('clipping');
    clearTimeout(clipTimer);
    clipTimer = setTimeout(() => $('meterContainer').classList.remove('clipping'), 500);
  }

  $('meterBgm').classList.toggle('active', !!data.bgm);
  $('meterTts').classList.toggle('active', !!data.tts);
}

// Init
send({action:'init'});
appendLog('Panel started', 'info');
</script>
</body>
</html>
