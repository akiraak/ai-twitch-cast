<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=400">
<title>Control Panel</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1e1e1e;
  --bg-section: #252526;
  --bg-input: #3c3c3c;
  --bg-input-hover: #505050;
  --text: #cccccc;
  --text-dim: #858585;
  --accent: #0e639c;
  --accent-hover: #1177bb;
  --green: #388a34;
  --green-hover: #45a641;
  --red: #c94040;
  --red-hover: #d95050;
  --border: #3c3c3c;
  --radius: 4px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', sans-serif;
  font-size: 13px;
  line-height: 1.4;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #424242; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

/* Tab Bar */
.tab-bar {
  display: flex;
  background: var(--bg-section);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab {
  flex: 1;
  padding: 7px 0;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.3px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }

/* Tab Content */
.tab-content { display: none; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
.tab-content.active { display: flex; }

/* Section */
.section {
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.section.flex { flex: 1; display: flex; flex-direction: column; border-bottom: none; min-height: 0; }
.section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 4px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.12s;
  background: var(--bg-input);
  color: var(--text);
  white-space: nowrap;
}
.btn:hover { background: var(--bg-input-hover); }
.btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
.btn.loading { pointer-events: none; opacity: 0.7; }
.btn.loading::after {
  content: '';
  display: inline-block;
  width: 12px;
  height: 12px;
  margin-left: 6px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

.btn-go { background: var(--green); border-color: var(--green); color: #fff; font-weight: 600; }
.btn-go:hover { background: var(--green-hover); }
.btn-stop { background: var(--red); border-color: var(--red); color: #fff; font-weight: 600; }
.btn-stop:hover { background: var(--red-hover); }

.btn-row { display: flex; gap: 6px; margin-bottom: 8px; }

/* Status */
.status { font-size: 13px; margin-bottom: 2px; }
.status.live { color: #f48771; font-weight: 600; }
.stats { font-size: 11px; color: var(--text-dim); min-height: 16px; }

/* Select */
.select-row { display: flex; gap: 4px; margin-bottom: 6px; }
select {
  flex: 1;
  padding: 3px 6px;
  background: var(--bg-input);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 12px;
  font-family: inherit;
  outline: none;
  min-width: 0;
}
select:focus { border-color: var(--accent); }

/* Capture List */
.capture-list {
  background: var(--bg-section);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  min-height: 48px;
  max-height: 90px;
  overflow-y: auto;
  margin-top: 6px;
}
.capture-item {
  padding: 3px 8px;
  font-size: 12px;
  cursor: pointer;
  border-bottom: 1px solid #2d2d30;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.capture-item:last-child { border-bottom: none; }
.capture-item:hover { background: var(--bg-input); }
.capture-item { display: flex; align-items: center; gap: 4px; }
.capture-item .cap-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.capture-item .cap-stop { background: none; border: none; color: var(--red); cursor: pointer; font-size: 14px; padding: 0 2px; flex-shrink: 0; }
.capture-item .cap-stop:hover { color: var(--red-hover); }
.capture-empty { padding: 10px; text-align: center; color: var(--text-dim); font-size: 11px; }

/* Volume */
.volume-row { display: flex; align-items: center; margin-bottom: 4px; gap: 6px; }
.volume-label { width: 44px; font-size: 12px; color: var(--text-dim); flex-shrink: 0; }
.volume-value { width: 34px; text-align: right; font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
input[type="range"] {
  -webkit-appearance: none;
  flex: 1;
  height: 4px;
  background: var(--bg-input);
  border-radius: 2px;
  outline: none;
  min-width: 0;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb:hover { background: var(--accent-hover); }

/* Audio Meter */
.meter-sources { display: flex; gap: 4px; margin-bottom: 4px; }
.meter-src {
  font-size: 9px; padding: 1px 5px; border-radius: 2px;
  background: var(--bg-input); color: var(--text-dim); transition: all 0.15s;
}
.meter-src.active { color: #fff; }
.meter-src.bgm.active { background: #2d6a4f; }
.meter-src.tts.active { background: #5c4d9a; }
.meter-container {
  position: relative; height: 8px; background: #0a0a14;
  border-radius: 3px; overflow: hidden; border: 1px solid var(--border);
  transition: border-color 0.3s;
}
.meter-container.clipping {
  border-color: var(--red);
  box-shadow: 0 0 6px rgba(201, 64, 64, 0.5);
}
/* 危険ゾーン */
.meter-zone {
  position: absolute; top: 0; height: 100%; pointer-events: none;
}
.meter-zone.hot {
  left: 80%; width: 15%;  /* -12dB ~ -3dB */
  background: rgba(244, 162, 97, 0.35);
}
.meter-zone.danger {
  left: 95%; width: 5%;   /* -3dB ~ 0dB */
  background: rgba(201, 64, 64, 0.5);
}
.meter-zone-line {
  position: absolute; top: 0; height: 100%; width: 1px; z-index: 4;
}
.meter-zone-line.hot-line {
  left: 80%; background: rgba(244, 162, 97, 0.7);
}
.meter-zone-line.danger-line {
  left: 95%; background: rgba(201, 64, 64, 0.9);
}
.meter-bar {
  position: absolute; top: 0; left: 0; height: 100%; width: 0%;
  transition: width 0.05s linear; border-radius: 2px;
}
.meter-bar.level {
  background: linear-gradient(90deg, #2d6a4f 0%, #52b788 50%, #f4a261 80%, #e76f51 95%);
  z-index: 1;
}
.meter-bar.peak {
  width: 2px; background: #fff; z-index: 2;
  transition: left 0.05s linear; left: 0%;
}
.meter-info {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 2px; font-size: 10px;
  font-family: 'Cascadia Code', 'Consolas', monospace;
}
.meter-db { color: #52b788; }
.meter-db.hot { color: #f4a261; }
.meter-db.clip { color: #e76f51; }
.meter-peak { color: var(--text-dim); }

/* Log */
.log-area {
  flex: 1;
  background: #1a1a1a;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: 'Cascadia Code', 'Consolas', monospace;
  font-size: 11px;
  line-height: 1.5;
  color: #9da5b4;
  padding: 6px 8px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
  min-height: 0;
  user-select: text;
  cursor: text;
}
.log-error { color: #f48771; }
.log-success { color: #89d185; }
.log-info { color: #9cdcfe; }

/* Chat */
#chatMessages {
  flex: 1;
  overflow-y: auto;
  padding: 6px 8px;
  font-size: 12px;
  background: #1a1a1a;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  min-height: 0;
}
.chat-msg-user { margin-bottom: 4px; color: var(--text-dim); }
.chat-msg-user .chat-name { color: var(--accent); font-weight: 600; }
.chat-msg-ai {
  margin-bottom: 6px;
  color: var(--text);
  padding-left: 8px;
  border-left: 2px solid var(--accent);
}
.chat-msg-err { margin-bottom: 4px; color: var(--red); font-size: 11px; }
.chat-msg-translation { margin-bottom: 6px; color: var(--text-dim); font-size: 11px; padding-left: 10px; font-style: italic; }
.chat-input-area {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
  margin-top: 6px;
}
#chatInput {
  flex: 1;
  padding: 5px 8px;
  background: var(--bg-input);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 12px;
  font-family: inherit;
  outline: none;
  min-width: 0;
}
#chatInput:focus { border-color: var(--accent); }
#chatSendBtn {
  padding: 5px 12px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
}
#chatSendBtn:hover { background: var(--accent-hover); }
#chatSendBtn:disabled { opacity: 0.35; cursor: default; }

/* Lesson tab */
.lesson-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: var(--bg-input);
  color: var(--text-dim);
}
.lesson-badge.loaded { background: #2b4f7a; color: #bfe0ff; }
.lesson-badge.playing { background: var(--green); color: #fff; }
.lesson-badge.paused { background: #7a6a2b; color: #ffeab0; }
.lesson-badge.idle { background: #4a4a4a; color: var(--text-dim); }

.lesson-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.lesson-id { font-size: 11px; color: var(--text-dim); }

/* === 授業タイムライン（broadcast の lesson-dialogues-panel と同等、px 単位） === */
#lessonDialoguesTabs {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding-bottom: 4px;
  margin-bottom: 6px;
  border-bottom: 1px solid rgba(124, 77, 255, 0.25);
}
#lessonDialoguesTabs::-webkit-scrollbar { display: none; }
.ld-tab {
  flex: 0 0 auto;
  font-size: 11px;
  padding: 3px 8px;
  color: rgba(255, 255, 255, 0.55);
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(124, 77, 255, 0.25);
  border-radius: 3px;
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
}
.ld-tab:hover { color: rgba(255, 255, 255, 0.9); }
.ld-tab.active {
  color: #fff;
  background: rgba(124, 77, 255, 0.28);
  border-color: rgba(124, 77, 255, 0.65);
  font-weight: 600;
}
.ld-tab.done { color: rgba(255, 255, 255, 0.45); }
.ld-tab.current::before { content: '▶ '; color: #7c4dff; }
.ld-tab.done::before { content: '✓ '; color: rgba(124, 255, 180, 0.7); }

.lesson-timeline-list {
  flex: 1;
  background: #1a1a1a;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow-y: auto;
  min-height: 0;
  padding: 4px 6px;
  user-select: text;
  cursor: text;
}
.ld-group-header {
  font-size: 10px;
  color: rgba(200, 180, 255, 0.75);
  margin: 6px 0 3px;
  letter-spacing: 0.05em;
}
.ld-row {
  display: flex;
  gap: 4px;
  align-items: flex-start;
  font-size: 11px;
  line-height: 1.4;
  padding: 3px 4px;
  margin-bottom: 1px;
  border-radius: 2px;
  border-left: 2px solid transparent;
  color: rgba(255, 255, 255, 0.85);
  word-break: break-word;
}
.ld-row.past { opacity: 0.55; color: rgba(255, 255, 255, 0.5); }
.ld-row.current {
  background: rgba(124, 77, 255, 0.22);
  border-left-color: #7c4dff;
  color: #fff;
  font-weight: 600;
}
.ld-row.future { color: rgba(255, 255, 255, 0.85); }
.ld-marker {
  flex: 0 0 14px;
  text-align: center;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.45);
}
.ld-row.past .ld-marker::before { content: '✓'; color: rgba(124, 255, 180, 0.75); }
.ld-row.current .ld-marker::before { content: '▶'; color: #7c4dff; }
.ld-speaker { flex: 0 0 auto; font-size: 12px; }
.ld-content { flex: 1 1 auto; }

.ld-follow-hint {
  align-self: flex-end;
  font-size: 10px;
  color: rgba(255, 200, 100, 0.8);
  cursor: pointer;
  user-select: none;
  margin-bottom: 4px;
  padding: 2px 6px;
  border: 1px solid rgba(255, 200, 100, 0.35);
  border-radius: 3px;
  background: rgba(255, 200, 100, 0.08);
}
.ld-follow-hint:hover { background: rgba(255, 200, 100, 0.15); }

.ld-empty {
  padding: 20px;
  text-align: center;
  color: var(--text-dim);
  font-size: 11px;
}

/* Design tab */
.design-panel { border-bottom: 1px solid var(--border); }
.design-panel summary {
  padding: 6px 8px; font-size: 12px; font-weight: 600; cursor: pointer;
  color: var(--text); list-style: none; display: flex; align-items: center; gap: 4px;
}
.design-panel summary::before { content: '▸'; font-size: 10px; transition: transform 0.15s; display: inline-block; width: 12px; }
.design-panel[open] summary::before { transform: rotate(90deg); }
.design-panel .dp-body { padding: 0 8px 8px; }
.design-group-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
  color: var(--text-dim); margin: 8px 0 4px; padding: 2px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.design-row { display: flex; align-items: center; margin-bottom: 3px; gap: 4px; }
.design-label { width: 56px; font-size: 11px; color: var(--text-dim); flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.design-val { width: 36px; text-align: right; font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
.design-row input[type="color"] { width: 28px; height: 20px; border: 1px solid var(--border); border-radius: 3px; padding: 0; cursor: pointer; background: var(--bg-input); }
.design-row select { flex: 1; min-width: 0; padding: 2px 4px; font-size: 11px; background: var(--bg-input); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); }
.design-test-row { display: flex; gap: 4px; margin-bottom: 6px; }
.design-test-row .btn { flex: 1; font-size: 11px; padding: 3px 6px; }
</style>
</head>
<body>

<div class="tab-bar">
  <button class="tab active" data-tab="stream">Stream</button>
  <button class="tab" data-tab="sound">Sound</button>
  <button class="tab" data-tab="chat">Chat</button>
  <button class="tab" data-tab="lesson">Lesson</button>
  <button class="tab" data-tab="design">Design</button>
</div>

<div class="tab-content active" id="tab-stream">
  <div class="section">
    <div class="section-title">Stream</div>
    <div class="btn-row">
      <button class="btn btn-go" id="goLiveBtn" onclick="goLive()">● Go Live</button>
      <button class="btn btn-stop" id="stopBtn" onclick="stopStream()" disabled>■ Stop</button>
    </div>
    <div class="status" id="streamStatus">Standby</div>
    <div class="stats" id="streamStats"></div>
  </div>

  <div class="section">
    <div class="section-title">Twitch</div>
    <textarea id="twitchTitle" style="width:100%;padding:4px 6px;background:var(--bg-input);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;font-family:inherit;resize:vertical;min-height:36px;" placeholder="配信タイトル" rows="2"></textarea>
    <div class="btn-row" style="margin-top:6px;">
      <button class="btn" onclick="updateTwitchTitle()">タイトル更新</button>
    </div>
    <div id="twitchMsg" style="font-size:11px;min-height:14px;margin-top:2px;"></div>
  </div>

  <div class="section">
    <div class="section-title">Capture</div>
    <div class="select-row">
      <select id="windowSelect"><option>Loading windows...</option></select>
      <button class="btn" onclick="refreshWindows()" title="Refresh">↻</button>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="startCapture()">Start</button>
    </div>
    <div class="capture-list" id="captureList">
      <div class="capture-empty">No captures</div>
    </div>
  </div>

  <div class="section flex">
    <div class="section-title">Log</div>
    <div class="log-area" id="logArea"></div>
  </div>
</div>

<div class="tab-content" id="tab-sound">
  <div class="section">
    <div class="section-title">Volume</div>
    <div class="volume-row">
      <span class="volume-label">Master</span>
      <input type="range" min="0" max="200" value="80" id="volMaster" oninput="onVolume('master',this.value)">
      <span class="volume-value" id="volMasterVal">80%</span>
    </div>
    <div class="volume-row">
      <span class="volume-label">Voice</span>
      <input type="range" min="0" max="100" value="90" id="volTts" oninput="onVolume('tts',this.value)">
      <span class="volume-value" id="volTtsVal">90%</span>
    </div>
    <div class="volume-row">
      <span class="volume-label">BGM</span>
      <input type="range" min="0" max="100" value="50" id="volBgm" oninput="onVolume('bgm',this.value)">
      <span class="volume-value" id="volBgmVal">50%</span>
    </div>
    <div id="bgmTrackInfo" style="display:none;">
      <div id="bgmStatusText" style="font-size:11px; color:#4ade80; margin:4px 0 2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></div>
      <div class="volume-row" id="trackVolRow">
        <span class="volume-label">Track</span>
        <input type="range" min="0" max="100" value="100" id="volTrack" oninput="onVolume('track',this.value)">
        <span class="volume-value" id="volTrackVal">100%</span>
      </div>
    </div>
    <div class="meter-sources" style="margin-top:8px;">
      <span class="meter-src bgm" id="meterBgm">BGM</span>
      <span class="meter-src tts" id="meterTts">Voice</span>
    </div>
    <div class="meter-container" id="meterContainer">
      <div class="meter-zone hot"></div>
      <div class="meter-zone danger"></div>
      <div class="meter-zone-line hot-line"></div>
      <div class="meter-zone-line danger-line"></div>
      <div class="meter-bar level" id="meterLevel"></div>
      <div class="meter-bar peak" id="meterPeak"></div>
    </div>
    <div class="meter-info">
      <span class="meter-db" id="meterDb">-∞ dB</span>
      <span class="meter-peak" id="meterPeakDb">pk -∞</span>
    </div>
  </div>
  <div class="section">
    <div class="section-title">Sync</div>
    <div class="volume-row">
      <span class="volume-label">Delay</span>
      <input type="range" min="0" max="3000" step="50" value="500" id="syncDelay" oninput="onSyncDelay(this.value)">
      <span class="volume-value" id="syncDelayVal">500ms</span>
    </div>
  </div>
</div>

<div class="tab-content" id="tab-chat">
  <div class="section flex">
    <div class="section-title">Chat</div>
    <div id="chatMessages"></div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="メッセージを入力..."
             onkeydown="if(event.key==='Enter'&&!this.disabled)sendChat()">
      <button class="btn" id="chatSendBtn" onclick="sendChat()">送信</button>
    </div>
  </div>
</div>

<div class="tab-content" id="tab-lesson">
  <div class="section">
    <div class="lesson-header">
      <div class="section-title" style="margin-bottom:0;">Lesson <span class="lesson-id" id="lessonId"></span></div>
      <span class="lesson-badge idle" id="lessonBadge">idle</span>
    </div>
    <div class="stats" id="lessonProgress"></div>
  </div>
  <div class="section flex">
    <div id="lessonDialoguesTabs"></div>
    <div id="lessonFollowHintSlot"></div>
    <div class="lesson-timeline-list" id="lessonDialoguesList">
      <div class="ld-empty">授業が読み込まれていません</div>
    </div>
  </div>
</div>

<div class="tab-content" id="tab-design">
  <div class="section" style="flex:1; overflow-y:auto;">
    <div class="section-title">授業パネル</div>
    <div id="designPanels"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const wv = window.chrome?.webview;
let serverUrl = 'http://' + location.hostname + ':8080';

// Tab switching
document.querySelector('.tab-bar').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  tab.classList.add('active');
  $('tab-' + tab.dataset.tab).classList.add('active');
});

// C# → HTML
wv?.addEventListener('message', e => {
  const m = e.data;
  if (!m?.type) return;
  if (m.type === 'status') console.log('[Panel] C#→HTML status:', JSON.stringify(m));
  switch (m.type) {
    case 'status': updateStatus(m); break;
    case 'windows': updateWindows(m.windows); break;
    case 'captures': updateCaptures(m.captures); break;
    case 'log': appendLog(m.text, m.level); break;
    case 'volume': setVolumes(m); break;
    case 'audioLevel': updateMeter(m); break;
    case 'streamResult': handleStreamResult(m); break;
    case 'bgm_status': updateBgmStatus(m); break;
    case 'track_volume': setTrackVolume(m.volume); break;
    case 'serverUrl': serverUrl = m.url; break;
    case 'comment':
      appendChatMsg(m.author, m.message);
      appendChatAi(m.speech);
      if (m.translation) appendChatTranslation(m.translation);
      break;
    case 'lesson': updateLesson(m); break;
    case 'lesson_outline': setLessonOutline(m); break;
  }
});

// HTML → C#
function send(msg) {
  console.log('[Panel] send:', JSON.stringify(msg), 'wv=', !!wv);
  if (!wv) { appendLog('ERROR: wv is null, postMessage unavailable', 'error'); return; }
  wv.postMessage(msg);
}
function goLive() {
  const btn = $('goLiveBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '準備中…';
  send({action:'goLive'});
}
function stopStream() {
  console.log('[Panel] stopStream clicked');
  const btn = $('stopBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '停止中…';
  send({action:'stopStream'});
}
function refreshWindows() { send({action:'refreshWindows'}); }

function startCapture() {
  const sel = $('windowSelect');
  const opt = sel.options[sel.selectedIndex];
  if (!opt?.dataset?.hwnd) return;
  send({action:'startCapture', hwnd: opt.dataset.hwnd, title: opt.textContent});
}

function onSyncDelay(val) {
  $('syncDelayVal').textContent = val + 'ms';
  send({action:'syncDelay', value: parseInt(val)});
}

function onVolume(type, val) {
  const key = 'vol' + type.charAt(0).toUpperCase() + type.slice(1) + 'Val';
  $(key).textContent = val + '%';
  send({action:'volume', volumeType: type, value: parseInt(val)});
}

function handleStreamResult(m) {
  if (m.action === 'goLive') {
    const btn = $('goLiveBtn');
    btn.classList.remove('loading');
    btn.textContent = '● Go Live';
    if (!m.ok) btn.disabled = false;
  } else if (m.action === 'stop') {
    const btn = $('stopBtn');
    btn.classList.remove('loading');
    btn.textContent = '■ Stop';
    if (!m.ok) btn.disabled = false;
  }
}

// UI updates
function updateStatus(s) {
  const el = $('streamStatus'), st = $('streamStats');
  if (s.streaming) {
    el.textContent = 'Live  ' + (s.uptime || '');
    el.className = 'status live';
    st.textContent = '';
    $('goLiveBtn').disabled = true;
    $('stopBtn').disabled = false;
  } else {
    el.textContent = 'Standby';
    el.className = 'status';
    st.textContent = '';
    $('goLiveBtn').disabled = false;
    $('stopBtn').disabled = true;
  }
}

function updateWindows(wins) {
  const sel = $('windowSelect');
  sel.innerHTML = '';
  if (!wins?.length) { sel.innerHTML = '<option>No windows</option>'; return; }
  wins.forEach(w => {
    const o = document.createElement('option');
    o.textContent = w.title;
    o.dataset.hwnd = w.hwnd;
    sel.appendChild(o);
  });
}

function updateCaptures(caps) {
  const list = $('captureList');
  if (!caps?.length) { list.innerHTML = '<div class="capture-empty">No captures</div>'; return; }
  const selId = document.querySelector('.capture-item.selected')?.dataset?.id;
  list.innerHTML = '';
  caps.forEach(c => {
    const d = document.createElement('div');
    d.className = 'capture-item';
    d.dataset.id = c.id;
    const name = document.createElement('span');
    name.className = 'cap-name';
    name.textContent = c.name;
    d.appendChild(name);
    const stop = document.createElement('button');
    stop.className = 'cap-stop';
    stop.textContent = '✕';
    stop.title = 'Stop';
    stop.onclick = () => send({action:'stopCapture', id: c.id});
    d.appendChild(stop);
    list.appendChild(d);
  });
}

function updateBgmStatus(m) {
  const info = $('bgmTrackInfo');
  const text = $('bgmStatusText');
  const trackRow = $('trackVolRow');
  if (m.state === 'downloading') {
    info.style.display = '';
    const mb = (m.size / 1024 / 1024).toFixed(1);
    text.textContent = '⏳ Downloading... ' + mb + ' MB';
    text.style.color = 'var(--accent)';
    trackRow.style.display = 'none';
  } else if (m.state === 'playing') {
    info.style.display = '';
    text.textContent = '♪ ' + (m.name || 'Playing');
    text.style.color = '#4ade80';
    trackRow.style.display = '';
  } else if (m.state === 'stopped') {
    info.style.display = 'none';
  } else if (m.state === 'error') {
    info.style.display = '';
    text.textContent = '⚠ ' + (m.error || 'Error');
    text.style.color = '#f87171';
    trackRow.style.display = 'none';
  }
}

function setTrackVolume(pct) {
  $('volTrack').value = pct;
  $('volTrackVal').textContent = pct + '%';
}

// === Lesson tab（タイムライン版: broadcast の lesson-dialogues-panel と同期） ===
const _timelineState = {
  lessonId: 0,
  sections: [],        // outline 由来の全セクション
  currentSection: -1,  // 再生中セクション
  currentDialogue: -1, // 再生中 dialogue index
  currentKind: 'main', // 'main' | 'answer'
  viewSection: -1,     // 表示中のタブ（手動選択で currentSection とずれることがある）
  autoFollow: true,
  followTimer: null,
};
const _FOLLOW_RESET_MS = 5000;

function _speakerIcon(speaker) {
  return speaker === 'student' ? '\u{1F9D1}' : '\u{1F469}';
}

function setLessonOutline(m) {
  _timelineState.lessonId = m.lesson_id || 0;
  _timelineState.sections = Array.isArray(m.sections) ? m.sections : [];
  _timelineState.currentSection = -1;
  _timelineState.currentDialogue = -1;
  _timelineState.currentKind = 'main';
  _timelineState.autoFollow = true;
  _timelineState.viewSection = _timelineState.sections.length > 0 ? 0 : -1;
  if (_timelineState.followTimer) {
    clearTimeout(_timelineState.followTimer);
    _timelineState.followTimer = null;
  }
  renderLessonTimeline();
}

function _setAutoFollow(enable) {
  _timelineState.autoFollow = enable;
  if (_timelineState.followTimer) {
    clearTimeout(_timelineState.followTimer);
    _timelineState.followTimer = null;
  }
  if (!enable) {
    _timelineState.followTimer = setTimeout(() => {
      _timelineState.autoFollow = true;
      if (_timelineState.currentSection >= 0) {
        _timelineState.viewSection = _timelineState.currentSection;
      }
      renderLessonTimeline();
    }, _FOLLOW_RESET_MS);
  }
}

function _selectSection(idx) {
  _timelineState.viewSection = idx;
  _setAutoFollow(false);
  renderLessonTimeline();
}

function _renderDialogueGroup(listEl, dialogues, kind, isCurrentSection, currentKind, currentDialogue, curSection, viewSection) {
  dialogues.forEach((dlg, i) => {
    const row = document.createElement('div');
    let state;
    if (!isCurrentSection) {
      if (curSection < 0) state = 'future';
      else if (viewSection < curSection) state = 'past';
      else state = 'future';
    } else if (kind === currentKind && i === currentDialogue) {
      state = 'current';
    } else if ((kind === 'main' && currentKind === 'answer')
      || (kind === currentKind && i < currentDialogue)) {
      state = 'past';
    } else {
      state = 'future';
    }
    row.className = 'ld-row ' + state;

    const marker = document.createElement('span');
    marker.className = 'ld-marker';
    row.appendChild(marker);

    const speaker = document.createElement('span');
    speaker.className = 'ld-speaker';
    speaker.textContent = _speakerIcon(dlg.speaker);
    row.appendChild(speaker);

    const content = document.createElement('span');
    content.className = 'ld-content';
    content.textContent = dlg.content || '';
    row.appendChild(content);

    listEl.appendChild(row);
  });
}

function renderLessonTimeline() {
  const tabsEl = $('lessonDialoguesTabs');
  const listEl = $('lessonDialoguesList');
  const hintSlot = $('lessonFollowHintSlot');
  if (!tabsEl || !listEl) return;

  const st = _timelineState;
  const sections = st.sections || [];
  hintSlot.innerHTML = '';

  if (sections.length === 0) {
    tabsEl.innerHTML = '';
    listEl.innerHTML = '<div class="ld-empty">授業が読み込まれていません</div>';
    return;
  }

  const viewIdx = Math.max(0, Math.min(st.viewSection, sections.length - 1));
  const curIdx = st.currentSection;

  // タブ
  tabsEl.innerHTML = '';
  sections.forEach((sec, i) => {
    const tab = document.createElement('div');
    const classes = ['ld-tab'];
    if (i === viewIdx) classes.push('active');
    if (curIdx >= 0 && i < curIdx) classes.push('done');
    else if (i === curIdx) classes.push('current');
    tab.className = classes.join(' ');
    tab.textContent = `\u00A7${i + 1}`;
    tab.title = sec.section_type || '';
    tab.addEventListener('click', () => _selectSection(i));
    tabsEl.appendChild(tab);
  });

  // リスト
  listEl.innerHTML = '';
  const sec = sections[viewIdx];
  const mainDlgs = Array.isArray(sec.dialogues) ? sec.dialogues : [];
  const isCurrentSection = viewIdx === curIdx;

  if (mainDlgs.length === 0 && !sec.question) {
    listEl.innerHTML = '<div class="ld-empty">（このセクションにダイアログなし）</div>';
  } else {
    _renderDialogueGroup(listEl, mainDlgs, 'main', isCurrentSection, st.currentKind, st.currentDialogue, curIdx, viewIdx);

    if (sec.question && Array.isArray(sec.question.answer_dialogues) && sec.question.answer_dialogues.length > 0) {
      const header = document.createElement('div');
      header.className = 'ld-group-header';
      header.textContent = '— 回答 —';
      listEl.appendChild(header);
      _renderDialogueGroup(listEl, sec.question.answer_dialogues, 'answer', isCurrentSection, st.currentKind, st.currentDialogue, curIdx, viewIdx);
    }
  }

  // 追従ヒント（手動選択中）
  if (!st.autoFollow && curIdx >= 0 && viewIdx !== curIdx) {
    const hint = document.createElement('div');
    hint.className = 'ld-follow-hint';
    hint.textContent = '\u2192 現在地へ';
    hint.addEventListener('click', () => {
      _timelineState.viewSection = _timelineState.currentSection;
      _setAutoFollow(true);
      renderLessonTimeline();
    });
    hintSlot.appendChild(hint);
  }

  // 現在行を可視領域に
  const currentRow = listEl.querySelector('.ld-row.current');
  if (currentRow) currentRow.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function updateLesson(m) {
  const badge = $('lessonBadge');
  badge.textContent = m.state || 'idle';
  badge.className = 'lesson-badge ' + (m.state || 'idle');

  $('lessonId').textContent = m.lesson_id ? '#' + m.lesson_id : '';

  const total = m.total_sections || 0;
  const cur = (typeof m.section_index === 'number') ? m.section_index : -1;

  // 上部メタ行（Section x/y [type]  Dialogue a/b）
  const prog = $('lessonProgress');
  if (total > 0) {
    const dlgTotal = m.total_dialogues || 0;
    const dlgCur = (typeof m.dialogue_index === 'number' && m.dialogue_index >= 0) ? m.dialogue_index + 1 : 0;
    const secType = m.section_type ? ` [${m.section_type}]` : '';
    prog.textContent = `Section ${cur + 1}/${total}${secType}  Dialogue ${dlgCur}/${dlgTotal}`;
  } else {
    prog.textContent = '';
  }

  // タイムライン状態更新
  const prevSection = _timelineState.currentSection;
  _timelineState.currentSection = cur;
  _timelineState.currentDialogue = (typeof m.dialogue_index === 'number') ? m.dialogue_index : -1;
  _timelineState.currentKind = m.kind || 'main';

  // 授業終了（state=idle かつ lesson_id=0）で outline もクリア
  if (!m.lesson_id && !total) {
    _timelineState.sections = [];
    _timelineState.viewSection = -1;
    _timelineState.autoFollow = true;
    if (_timelineState.followTimer) {
      clearTimeout(_timelineState.followTimer);
      _timelineState.followTimer = null;
    }
  } else if (_timelineState.autoFollow && cur >= 0) {
    _timelineState.viewSection = cur;
  }

  renderLessonTimeline();
}

function setVolumes(v) {
  ['master','tts','bgm'].forEach(t => {
    if (v[t] === undefined) return;
    const key = t.charAt(0).toUpperCase() + t.slice(1);
    $('vol'+key).value = v[t];
    $('vol'+key+'Val').textContent = v[t]+'%';
  });
  if (v.syncDelay !== undefined) {
    $('syncDelay').value = v.syncDelay;
    $('syncDelayVal').textContent = v.syncDelay + 'ms';
  }
}

function appendLog(text, level) {
  const area = $('logArea');
  const span = document.createElement('span');
  if (level) span.className = 'log-' + level;
  span.textContent = text + '\n';
  area.appendChild(span);
  while (area.childNodes.length > 300) area.removeChild(area.firstChild);
  area.scrollTop = area.scrollHeight;
}

// Audio meter
const METER_MIN_DB = -60;
let meterSmooth = METER_MIN_DB;
let meterPeakHold = METER_MIN_DB;
let meterPeakTime = 0;
let clipTimer = null;

function meterDbToPct(db) {
  if (db <= METER_MIN_DB) return 0;
  if (db >= 0) return 100;
  return ((db - METER_MIN_DB) / (0 - METER_MIN_DB)) * 100;
}

function updateMeter(data) {
  const db = isFinite(data.db) ? Math.max(METER_MIN_DB, data.db) : METER_MIN_DB;
  const instantPeak = isFinite(data.peak) ? Math.max(METER_MIN_DB, data.peak) : METER_MIN_DB;
  meterSmooth = db > meterSmooth ? db : meterSmooth * 0.85 + db * 0.15;

  // ピークホールド: 瞬時ピークかスムージングRMSの大きい方で更新、1.5秒でリセット
  const effectivePeak = Math.max(instantPeak, meterSmooth);
  const now = Date.now();
  if (effectivePeak > meterPeakHold || now - meterPeakTime > 1500) {
    meterPeakHold = effectivePeak;
    meterPeakTime = now;
  }

  $('meterLevel').style.width = meterDbToPct(meterSmooth) + '%';
  $('meterPeak').style.left = meterDbToPct(meterPeakHold) + '%';

  const dbStr = meterSmooth <= METER_MIN_DB ? '-∞ dB' : meterSmooth.toFixed(1) + ' dB';
  const pkStr = meterPeakHold <= METER_MIN_DB ? 'pk -∞' : 'pk ' + meterPeakHold.toFixed(0);
  $('meterDb').textContent = dbStr;
  $('meterPeakDb').textContent = pkStr;
  $('meterDb').className = 'meter-db' + (meterSmooth > -3 ? ' clip' : meterSmooth > -12 ? ' hot' : '');

  // Clipping warning
  if (meterPeakHold > -3) {
    $('meterContainer').classList.add('clipping');
    clearTimeout(clipTimer);
    clipTimer = setTimeout(() => $('meterContainer').classList.remove('clipping'), 500);
  }

  $('meterBgm').classList.toggle('active', !!data.bgm);
  $('meterTts').classList.toggle('active', !!data.tts);
}

// === Chat ===
async function sendChat() {
  const input = $('chatInput');
  const btn = $('chatSendBtn');
  const msg = input.value.trim();
  if (!msg || !serverUrl) return;

  input.disabled = true;
  btn.disabled = true;
  input.value = '';
  appendChatMsg('あキら', msg);

  try {
    const res = await fetch(serverUrl + '/api/chat/webui', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });
    const data = await res.json();
    if (data.speech) appendChatAi(data.speech);
    if (data.translation) appendChatTranslation(data.translation);
  } catch (e) {
    appendChatErr('Error: ' + e.message);
  } finally {
    input.disabled = false;
    btn.disabled = false;
    input.focus();
  }
}

function appendChatMsg(author, text) {
  const c = $('chatMessages');
  const d = document.createElement('div');
  d.className = 'chat-msg-user';
  d.innerHTML = '<span class="chat-name">' + esc(author) + '</span> ' + esc(text);
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}
function appendChatAi(text) {
  const c = $('chatMessages');
  const d = document.createElement('div');
  d.className = 'chat-msg-ai';
  d.textContent = text;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}
function appendChatTranslation(text) {
  const c = $('chatMessages');
  const d = document.createElement('div');
  d.className = 'chat-msg-translation';
  d.textContent = text;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}
function appendChatErr(text) {
  const c = $('chatMessages');
  const d = document.createElement('div');
  d.className = 'chat-msg-err';
  d.textContent = text;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// === Twitch Info ===
async function loadTwitchInfo() {
  try {
    const res = await fetch(serverUrl + '/api/twitch/channel');
    const data = await res.json();
    if (data.title !== undefined) $('twitchTitle').value = data.title;
  } catch (e) {}
}

async function updateTwitchTitle() {
  const title = $('twitchTitle').value.trim();
  const msg = $('twitchMsg');
  if (!title) { msg.textContent = 'タイトルを入力してください'; msg.style.color = 'var(--red)'; return; }
  msg.textContent = '更新中...'; msg.style.color = 'var(--text-dim)';
  try {
    const res = await fetch(serverUrl + '/api/twitch/channel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title }),
    });
    const data = await res.json();
    if (data.ok) {
      msg.textContent = '更新しました'; msg.style.color = 'var(--green)';
    } else {
      msg.textContent = 'エラー: ' + (data.detail || '不明'); msg.style.color = 'var(--red)';
    }
  } catch (e) {
    msg.textContent = 'エラー: ' + e.message; msg.style.color = 'var(--red)';
  }
  setTimeout(() => { msg.textContent = ''; }, 3000);
}

// === Design tab ===
const DESIGN_PANELS = [
  { id: 'lesson_title', label: 'タイトル（画面上部）', testShow: '/api/debug/lesson-title', testHide: '/api/debug/lesson-title/hide' },
  { id: 'lesson_text', label: 'テキスト（画面中央）', testShow: '/api/debug/lesson-text', testHide: '/api/debug/lesson-text/hide' },
  { id: 'lesson_progress', label: '進捗（画面左）', testShow: '/api/debug/lesson-title', testHide: '/api/debug/lesson-title/hide' },
];
const DESIGN_SKIP_GROUPS = ['表示', '配置'];

let _designSettings = {};
let _designTimer = null;
let _designPending = {};

function _designSave(section, key, val) {
  if (!_designPending[section]) _designPending[section] = {};
  _designPending[section][key] = val;
  clearTimeout(_designTimer);
  _designTimer = setTimeout(async () => {
    const body = _designPending;
    _designPending = {};
    try {
      await fetch(serverUrl + '/api/overlay/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    } catch (e) {}
  }, 200);
}

function _designSlider(section, field, curVal) {
  const id = `ds-${section}-${field.key}`;
  const val = curVal ?? field.default ?? field.min ?? 0;
  return `<div class="design-row">
    <span class="design-label" title="${esc(field.label)}">${esc(field.label)}</span>
    <input type="range" min="${field.min}" max="${field.max}" step="${field.step}" value="${val}" id="${id}"
      oninput="$('${id}-v').textContent=this.value; _designSave('${section}','${field.key}',parseFloat(this.value))">
    <span class="design-val" id="${id}-v">${val}</span>
  </div>`;
}

function _designColor(section, field, curVal) {
  const id = `ds-${section}-${field.key}`;
  const val = _toHex(curVal || field.default || '#000000');
  return `<div class="design-row">
    <span class="design-label" title="${esc(field.label)}">${esc(field.label)}</span>
    <input type="color" value="${val}" id="${id}"
      oninput="_designSave('${section}','${field.key}',this.value)">
  </div>`;
}

function _designToggle(section, field, curVal) {
  const id = `ds-${section}-${field.key}`;
  const checked = (curVal ?? field.default ?? 1) ? 'checked' : '';
  return `<div class="design-row">
    <span class="design-label" title="${esc(field.label)}">${esc(field.label)}</span>
    <input type="checkbox" id="${id}" ${checked}
      onchange="_designSave('${section}','${field.key}',this.checked?1:0)">
  </div>`;
}

function _designSelect(section, field, curVal) {
  const id = `ds-${section}-${field.key}`;
  const val = curVal ?? field.default ?? '';
  const opts = (field.options || []).map(([v, l]) =>
    `<option value="${v}"${v === val ? ' selected' : ''}>${esc(l)}</option>`
  ).join('');
  return `<div class="design-row">
    <span class="design-label" title="${esc(field.label)}">${esc(field.label)}</span>
    <select id="${id}" onchange="_designSave('${section}','${field.key}',this.value)">${opts}</select>
  </div>`;
}

function _renderField(section, field, curVal) {
  switch (field.type) {
    case 'slider': return _designSlider(section, field, curVal);
    case 'color': return _designColor(section, field, curVal);
    case 'toggle': return _designToggle(section, field, curVal);
    case 'select': return _designSelect(section, field, curVal);
    default: return '';
  }
}

function _toHex(color) {
  if (!color) return '#000000';
  if (color.startsWith('#')) return color.substring(0, 7);
  const m = color.match(/rgba?\(\s*(\d+),\s*(\d+),\s*(\d+)/);
  if (m) return '#' + [m[1],m[2],m[3]].map(v => parseInt(v).toString(16).padStart(2,'0')).join('');
  return '#000000';
}

async function initDesignTab() {
  const container = $('designPanels');
  if (!container) return;

  // 設定値とスキーマを並行取得
  let settings = {};
  try { settings = await (await fetch(serverUrl + '/api/overlay/settings')).json(); } catch(e) {}
  _designSettings = settings;

  const schemas = {};
  await Promise.all(DESIGN_PANELS.map(async p => {
    try { schemas[p.id] = await (await fetch(serverUrl + '/api/items/schema?item_id=' + p.id)).json(); } catch(e) {}
  }));

  let html = '';
  for (const panel of DESIGN_PANELS) {
    const schema = schemas[panel.id];
    if (!schema) continue;
    const sectionVals = settings[panel.id] || {};

    let body = `<div class="design-test-row">
      <button class="btn" onclick="fetch(serverUrl+'${panel.testShow}',{method:'POST'})">テスト表示</button>
      <button class="btn" onclick="fetch(serverUrl+'${panel.testHide}',{method:'POST'})">非表示</button>
    </div>`;

    for (const group of schema.groups || []) {
      if (DESIGN_SKIP_GROUPS.includes(group.title)) continue;
      body += `<div class="design-group-title">${esc(group.title)}</div>`;
      for (const field of group.fields || []) {
        body += _renderField(panel.id, field, sectionVals[field.key]);
      }
    }

    html += `<details class="design-panel">
      <summary>${esc(panel.label)}</summary>
      <div class="dp-body">${body}</div>
    </details>`;
  }
  container.innerHTML = html;
}

// Init
send({action:'init'});
appendLog('Panel started', 'info');
loadTwitchInfo();
initDesignTab();
</script>
</body>
</html>
