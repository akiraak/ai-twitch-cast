<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Twitch Cast</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 16px; }
  h1 { font-size: 1.3rem; margin-bottom: 16px; color: #b388ff; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .card { background: #16213e; border-radius: 8px; padding: 16px; }
  .card h2 { font-size: 1rem; margin-bottom: 12px; color: #7c4dff; display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.on { background: #69f0ae; }
  .dot.off { background: #616161; }
  .btn-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  button { background: #7c4dff; color: #fff; border: none; border-radius: 4px; padding: 6px 14px; cursor: pointer; font-size: 0.85rem; }
  button:hover { background: #651fff; }
  button:active { background: #6200ea; }
  button.danger { background: #e53935; }
  button.danger:hover { background: #c62828; }
  button.secondary { background: #455a64; }
  button.secondary:hover { background: #37474f; }
  .status { font-size: 0.8rem; color: #9e9e9e; margin-top: 8px; min-height: 1.2em; }
  .scene-list { list-style: none; margin-top: 8px; }
  .scene-list li { padding: 4px 10px; cursor: pointer; border-radius: 4px; font-size: 0.85rem; }
  .scene-list li:hover { background: #1a237e; }
  .scene-list li.active { background: #311b92; color: #b388ff; font-weight: bold; }
  .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .slider-row label { font-size: 0.8rem; min-width: 50px; }
  .slider-row input[type=range] { flex: 1; }
  .slider-row .val { font-size: 0.8rem; min-width: 30px; text-align: right; }
  #log { background: #0f0f23; border-radius: 4px; padding: 10px; font-family: monospace; font-size: 0.8rem; height: 180px; overflow-y: auto; margin-top: 16px; white-space: pre-wrap; }
  .env-card { background: #1a2332; border: 1px solid #2a3a4a; border-radius: 6px; }
  #env-table td { padding: 3px 6px; border-bottom: 1px solid #1a2332; }
  #env-table td:first-child { color: #78909c; }
  #env-table td:nth-child(2) { font-family: monospace; color: #80cbc4; }
</style>
</head>
<body>

<h1>AI Twitch Cast</h1>

<div class="btn-row" style="margin-bottom:16px;">
  <button style="padding:10px 28px; font-size:1rem;" onclick="api('POST','/api/start')">Setup</button>
  <button style="padding:10px 28px; font-size:1rem;" onclick="api('POST','/api/stream/start')">配信開始</button>
  <button class="danger" style="padding:10px 28px; font-size:1rem;" onclick="api('POST','/api/stream/stop')">配信停止</button>
</div>

<details class="env-card" style="margin-bottom:16px;">
  <summary style="cursor:pointer; font-size:0.8rem; color:#4fc3f7; padding:8px 12px;">.env 設定</summary>
  <table id="env-table" style="width:100%; font-size:0.75rem; border-collapse:collapse; padding:0 12px 8px;">
  </table>
</details>

<div class="grid">
  <!-- OBS -->
  <div class="card">
    <h2><span class="dot" id="obs-dot"></span> OBS</h2>
    <div class="btn-row">
      <button onclick="api('POST','/api/obs/connect')">接続</button>
      <button class="secondary" onclick="api('POST','/api/obs/disconnect')">切断</button>
    </div>
    <div class="btn-row">
      <button onclick="api('POST','/api/obs/setup')">Setup</button>
      <button class="danger" onclick="api('POST','/api/obs/teardown')">Teardown</button>
    </div>
    <div id="obs-scenes"></div>
    <h3 style="font-size:0.85rem; margin: 10px 0 6px; color:#9e9e9e;">アバター位置</h3>
    <div class="slider-row">
      <label>X</label>
      <input type="range" class="avatar-slider" data-key="positionX" min="-960" max="1920" step="10" value="0">
      <input type="number" class="avatar-num" data-key="positionX" style="width:60px; background:#0f0f23; color:#e0e0e0; border:1px solid #455a64; border-radius:3px; text-align:right; font-size:0.8rem;" value="0">
    </div>
    <div class="slider-row">
      <label>Y</label>
      <input type="range" class="avatar-slider" data-key="positionY" min="-540" max="1080" step="10" value="0">
      <input type="number" class="avatar-num" data-key="positionY" style="width:60px; background:#0f0f23; color:#e0e0e0; border:1px solid #455a64; border-radius:3px; text-align:right; font-size:0.8rem;" value="0">
    </div>
    <div class="slider-row">
      <label>幅</label>
      <input type="range" class="avatar-slider" data-key="boundsWidth" min="0" max="3840" step="10" value="1920">
      <input type="number" class="avatar-num" data-key="boundsWidth" style="width:60px; background:#0f0f23; color:#e0e0e0; border:1px solid #455a64; border-radius:3px; text-align:right; font-size:0.8rem;" value="1920">
    </div>
    <div class="slider-row">
      <label>高さ</label>
      <input type="range" class="avatar-slider" data-key="boundsHeight" min="0" max="2160" step="10" value="1080">
      <input type="number" class="avatar-num" data-key="boundsHeight" style="width:60px; background:#0f0f23; color:#e0e0e0; border:1px solid #455a64; border-radius:3px; text-align:right; font-size:0.8rem;" value="1080">
    </div>
    <div class="btn-row" style="margin-top:4px;">
      <button class="secondary" onclick="loadAvatarTransform()">取得</button>
      <button onclick="saveAvatarToJson()">scenes.jsonに保存</button>
    </div>
    <div class="status" id="avatar-status"></div>
    <div class="status" id="obs-status"></div>
  </div>

  <!-- VSF -->
  <div class="card" id="vsf-card">
    <h2><span class="dot" id="vsf-dot"></span> VSeeFace (VRM)</h2>
    <div class="btn-row">
      <button onclick="api('POST','/api/vsf/connect')">接続</button>
      <button class="secondary" onclick="api('POST','/api/vsf/disconnect')">切断</button>
    </div>
    <div class="btn-row">
      <button onclick="api('POST','/api/vsf/pose')">Pose</button>
      <button onclick="startIdle()">Idle</button>
      <button class="secondary" onclick="api('POST','/api/vsf/stop')">Stop</button>
    </div>
    <div class="slider-row">
      <label>Idle倍率</label>
      <input type="range" id="idle-scale" min="0.1" max="5.0" step="0.1" value="1.0">
      <span class="val" id="idle-scale-val">1.0</span>
    </div>
    <h3 style="font-size:0.85rem; margin: 10px 0 6px; color:#9e9e9e;">BlendShape</h3>
    <div class="btn-row">
      <button class="secondary" onclick="blend('Joy',1)">Joy</button>
      <button class="secondary" onclick="blend('Angry',1)">Angry</button>
      <button class="secondary" onclick="blend('Sorrow',1)">Sorrow</button>
      <button class="secondary" onclick="blend('Fun',1)">Fun</button>
      <button class="secondary" onclick="resetBlend()">Reset</button>
    </div>
    <div class="slider-row">
      <label>A (口)</label>
      <input type="range" class="bs-slider" data-name="A" min="0" max="1" step="0.05" value="0">
      <span class="val">0</span>
    </div>
    <div class="slider-row">
      <label>Blink</label>
      <input type="range" class="bs-slider" data-name="Blink" min="0" max="1" step="0.05" value="0">
      <span class="val">0</span>
    </div>
    <div class="btn-row" style="margin-top:10px;">
      <button onclick="saveVsfDefaults()">初期値として保存</button>
      <button class="secondary" onclick="loadVsfDefaults()">初期値を読込</button>
    </div>
    <div class="status" id="vsf-status"></div>
  </div>

  <!-- VTS -->
  <div class="card" id="vts-card">
    <h2><span class="dot" id="vts-dot"></span> VTube Studio (Live2D)</h2>
    <div class="btn-row">
      <button onclick="api('POST','/api/vts/connect')">接続</button>
      <button class="secondary" onclick="api('POST','/api/vts/disconnect')">切断</button>
    </div>
    <div class="status" id="vts-status"></div>
  </div>

  <!-- Character -->
  <div class="card" style="grid-column: 1 / -1;">
    <h2>キャラクター設定</h2>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div>
        <label style="font-size:0.8rem; color:#9e9e9e;">名前</label>
        <input type="text" id="char-name" style="width:100%; background:#0f0f23; color:#e0e0e0; border:1px solid #455a64; border-radius:4px; padding:4px 8px; font-size:0.85rem;">
      </div>
      <div></div>
      <div style="grid-column: 1 / -1;">
        <label style="font-size:0.8rem; color:#9e9e9e;">システムプロンプト</label>
        <textarea id="char-prompt" rows="3" style="width:100%; background:#0f0f23; color:#e0e0e0; border:1px solid #455a64; border-radius:4px; padding:4px 8px; font-size:0.85rem; resize:vertical;"></textarea>
      </div>
      <div>
        <label style="font-size:0.8rem; color:#9e9e9e;">ルール</label>
        <div id="char-rules"></div>
        <button class="secondary" style="margin-top:4px; font-size:0.75rem;" onclick="addRule()">+ ルール追加</button>
      </div>
      <div>
        <label style="font-size:0.8rem; color:#9e9e9e;">感情</label>
        <div id="char-emotions"></div>
        <button class="secondary" style="margin-top:4px; font-size:0.75rem;" onclick="addEmotion()">+ 感情追加</button>
      </div>
      <div style="grid-column: 1 / -1;">
        <label style="font-size:0.8rem; color:#9e9e9e;">感情BlendShape</label>
        <div id="char-blendshapes"></div>
      </div>
    </div>
    <div class="btn-row" style="margin-top:10px;">
      <button onclick="saveCharacter()">保存</button>
      <button class="secondary" onclick="loadCharacter()">リロード</button>
    </div>
    <div class="status" id="char-status"></div>
  </div>

</div>

<div id="log"></div>

<script>
const logEl = document.getElementById('log');

function log(msg) {
  const t = new Date().toLocaleTimeString();
  logEl.textContent += `[${t}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

async function api(method, url, body) {
  try {
    const opts = { method };
    if (body) {
      opts.headers = { 'Content-Type': 'application/json' };
      opts.body = JSON.stringify(body);
    }
    const r = await fetch(url, opts);
    const text = await r.text();
    let data;
    try {
      data = JSON.parse(text);
    } catch {
      log(`ERROR ${url}: ${text.slice(0, 200)}`);
      return;
    }
    if (!r.ok) {
      log(`ERROR ${url}: ${data.detail || JSON.stringify(data)}`);
    } else {
      log(`OK ${url}`);
    }
    refreshStatus();
    return data;
  } catch (e) {
    log(`ERROR ${url}: ${e.message}`);
  }
}

function startIdle() {
  const scale = parseFloat(document.getElementById('idle-scale').value);
  api('POST', '/api/vsf/idle', { scale });
}

function blend(name, value) {
  api('POST', '/api/vsf/blend', { name, value });
}

function resetBlend() {
  for (const name of ['Joy', 'Angry', 'Sorrow', 'Fun', 'A', 'Blink']) {
    api('POST', '/api/vsf/blend', { name, value: 0 });
  }
  document.querySelectorAll('.bs-slider').forEach(s => {
    s.value = 0;
    s.nextElementSibling.textContent = '0';
  });
}

// BlendShapeスライダー
document.querySelectorAll('.bs-slider').forEach(slider => {
  slider.addEventListener('input', () => {
    const name = slider.dataset.name;
    const val = parseFloat(slider.value);
    slider.nextElementSibling.textContent = val.toFixed(2);
    api('POST', '/api/vsf/blend', { name, value: val });
  });
});

// Idleスライダー表示
document.getElementById('idle-scale').addEventListener('input', function() {
  document.getElementById('idle-scale-val').textContent = parseFloat(this.value).toFixed(1);
});

async function refreshStatus() {
  try {
    const data = await (await fetch('/api/status')).json();

    // OBS
    document.getElementById('obs-dot').className = 'dot ' + (data.obs.connected ? 'on' : 'off');
    if (data.obs.connected && data.obs.stream) {
      const s = data.obs.stream;
      document.getElementById('obs-status').textContent = s.active ? `配信中 ${s.timecode}` : '停止中';
    } else {
      document.getElementById('obs-status').textContent = data.obs.connected ? '接続中' : '未接続';
    }

    // VTS
    document.getElementById('vts-dot').className = 'dot ' + (data.vts.connected ? 'on' : 'off');
    document.getElementById('vts-status').textContent = data.vts.connected ? '接続中' : '未接続';

    // VSF
    document.getElementById('vsf-dot').className = 'dot ' + (data.vsf.connected ? 'on' : 'off');
    let vsfText = data.vsf.connected ? '接続中' : '未接続';
    if (data.vsf.idle) vsfText += ' / Idle実行中';
    document.getElementById('vsf-status').textContent = vsfText;

    // シーン一覧
    if (data.obs.connected) {
      loadScenes();
    } else {
      document.getElementById('obs-scenes').innerHTML = '';
    }
  } catch (e) {}
}

async function loadScenes() {
  try {
    const data = await (await fetch('/api/obs/scenes')).json();
    const ul = document.createElement('ul');
    ul.className = 'scene-list';
    data.scenes.reverse().forEach(name => {
      const li = document.createElement('li');
      li.textContent = name;
      if (name === data.current) li.className = 'active';
      li.onclick = () => api('POST', '/api/obs/scene', { name });
      ul.appendChild(li);
    });
    document.getElementById('obs-scenes').replaceChildren(ul);
  } catch (e) {}
}

// --- アバター位置調整 ---
let _avatarUpdateTimer = null;

function sendAvatarTransform(key, value) {
  clearTimeout(_avatarUpdateTimer);
  _avatarUpdateTimer = setTimeout(() => {
    api('POST', '/api/obs/avatar/transform', { [key]: value });
  }, 100);
}

document.querySelectorAll('.avatar-slider').forEach(slider => {
  slider.addEventListener('input', () => {
    const key = slider.dataset.key;
    const val = parseFloat(slider.value);
    const numInput = document.querySelector(`.avatar-num[data-key="${key}"]`);
    numInput.value = val;
    sendAvatarTransform(key, val);
  });
});

document.querySelectorAll('.avatar-num').forEach(numInput => {
  numInput.addEventListener('change', () => {
    const key = numInput.dataset.key;
    const val = parseFloat(numInput.value);
    const slider = document.querySelector(`.avatar-slider[data-key="${key}"]`);
    slider.value = val;
    sendAvatarTransform(key, val);
  });
});

async function loadAvatarTransform() {
  try {
    const data = await (await fetch('/api/obs/avatar/transform')).json();
    const keys = ['positionX', 'positionY', 'boundsWidth', 'boundsHeight'];
    for (const key of keys) {
      const val = data[key] ?? 0;
      const slider = document.querySelector(`.avatar-slider[data-key="${key}"]`);
      const numInput = document.querySelector(`.avatar-num[data-key="${key}"]`);
      if (slider) slider.value = val;
      if (numInput) numInput.value = Math.round(val);
    }
    document.getElementById('avatar-status').textContent = '取得しました';
  } catch (e) {
    document.getElementById('avatar-status').textContent = 'エラー: ' + e.message;
  }
}

async function saveAvatarToJson() {
  try {
    await api('POST', '/api/obs/avatar/save');
    document.getElementById('avatar-status').textContent = 'scenes.jsonに保存しました';
  } catch (e) {
    document.getElementById('avatar-status').textContent = 'エラー: ' + e.message;
  }
}

// --- 環境設定 ---
async function loadEnv() {
  try {
    const data = await (await fetch('/api/env')).json();
    const table = document.getElementById('env-table');
    table.innerHTML = '';
    for (const item of data) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${item.label}</td><td>${item.value || '<span style="color:#616161">未設定</span>'}</td>`;
      table.appendChild(tr);
    }
  } catch (e) {}
}
loadEnv();

// --- VSeeFace初期値 ---
function saveVsfDefaults() {
  const blendshapes = {};
  document.querySelectorAll('.bs-slider').forEach(s => {
    const val = parseFloat(s.value);
    if (val > 0) blendshapes[s.dataset.name] = val;
  });
  // 表情ボタンの状態も含める
  const idle_scale = parseFloat(document.getElementById('idle-scale').value);
  api('POST', '/api/vsf/defaults/save', { idle_scale, blendshapes });
}

async function loadVsfDefaults() {
  try {
    const data = await (await fetch('/api/vsf/defaults')).json();
    // Idle倍率
    document.getElementById('idle-scale').value = data.idle_scale || 1.0;
    document.getElementById('idle-scale-val').textContent = (data.idle_scale || 1.0).toFixed(1);
    // BlendShape
    document.querySelectorAll('.bs-slider').forEach(s => {
      const val = (data.blendshapes || {})[s.dataset.name] || 0;
      s.value = val;
      s.nextElementSibling.textContent = val.toFixed(2);
    });
    log('OK VSeeFace初期値を読み込みました');
  } catch (e) {
    log('ERROR VSeeFace初期値の読込に失敗: ' + e.message);
  }
}

// --- キャラクター設定 ---
let _charEmotions = {};
let _charBlendshapes = {};

async function loadCharacter() {
  try {
    const data = await (await fetch('/api/character')).json();
    document.getElementById('char-name').value = data.name || '';
    document.getElementById('char-prompt').value = data.system_prompt || '';
    renderRules(data.rules || []);
    _charEmotions = data.emotions || {};
    _charBlendshapes = data.emotion_blendshapes || {};
    renderEmotions();
    renderBlendshapes();
    document.getElementById('char-status').textContent = '読み込みました';
  } catch (e) {
    document.getElementById('char-status').textContent = 'エラー: ' + e.message;
  }
}

function renderRules(rules) {
  const el = document.getElementById('char-rules');
  el.innerHTML = '';
  rules.forEach((rule, i) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex; gap:4px; margin-bottom:3px;';
    row.innerHTML = `<input type="text" class="char-rule" value="${escHtml(rule)}" style="flex:1; background:#0f0f23; color:#e0e0e0; border:1px solid #455a64; border-radius:3px; padding:2px 6px; font-size:0.8rem;">
      <button class="danger" style="font-size:0.7rem; padding:2px 6px;" onclick="this.parentElement.remove()">×</button>`;
    el.appendChild(row);
  });
}

function addRule() {
  const el = document.getElementById('char-rules');
  const row = document.createElement('div');
  row.style.cssText = 'display:flex; gap:4px; margin-bottom:3px;';
  row.innerHTML = `<input type="text" class="char-rule" value="" style="flex:1; background:#0f0f23; color:#e0e0e0; border:1px solid #455a64; border-radius:3px; padding:2px 6px; font-size:0.8rem;">
    <button class="danger" style="font-size:0.7rem; padding:2px 6px;" onclick="this.parentElement.remove()">×</button>`;
  el.appendChild(row);
}

function collectRules() {
  return [...document.querySelectorAll('.char-rule')].map(el => el.value).filter(v => v.trim());
}

function renderEmotions() {
  const el = document.getElementById('char-emotions');
  el.innerHTML = '';
  for (const [key, desc] of Object.entries(_charEmotions)) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex; gap:4px; margin-bottom:3px;';
    row.innerHTML = `<input type="text" class="emo-key" value="${escHtml(key)}" style="width:70px; background:#0f0f23; color:#e0e0e0; border:1px solid #455a64; border-radius:3px; padding:2px 6px; font-size:0.8rem;" placeholder="キー">
      <input type="text" class="emo-desc" value="${escHtml(desc)}" style="flex:1; background:#0f0f23; color:#e0e0e0; border:1px solid #455a64; border-radius:3px; padding:2px 6px; font-size:0.8rem;" placeholder="説明">
      <button class="danger" style="font-size:0.7rem; padding:2px 6px;" onclick="this.parentElement.remove()">×</button>`;
    el.appendChild(row);
  }
}

function addEmotion() {
  const el = document.getElementById('char-emotions');
  const row = document.createElement('div');
  row.style.cssText = 'display:flex; gap:4px; margin-bottom:3px;';
  row.innerHTML = `<input type="text" class="emo-key" value="" style="width:70px; background:#0f0f23; color:#e0e0e0; border:1px solid #455a64; border-radius:3px; padding:2px 6px; font-size:0.8rem;" placeholder="キー">
    <input type="text" class="emo-desc" value="" style="flex:1; background:#0f0f23; color:#e0e0e0; border:1px solid #455a64; border-radius:3px; padding:2px 6px; font-size:0.8rem;" placeholder="説明">
    <button class="danger" style="font-size:0.7rem; padding:2px 6px;" onclick="this.parentElement.remove()">×</button>`;
  el.appendChild(row);
}

function collectEmotions() {
  const result = {};
  const keys = document.querySelectorAll('.emo-key');
  const descs = document.querySelectorAll('.emo-desc');
  keys.forEach((k, i) => {
    if (k.value.trim()) result[k.value.trim()] = descs[i].value;
  });
  return result;
}

function renderBlendshapes() {
  const el = document.getElementById('char-blendshapes');
  el.innerHTML = '';
  for (const [emotion, shapes] of Object.entries(_charBlendshapes)) {
    const section = document.createElement('div');
    section.style.cssText = 'margin-bottom:8px; padding:6px; background:#0f0f23; border-radius:4px;';
    const header = document.createElement('div');
    header.style.cssText = 'font-size:0.8rem; color:#7c4dff; margin-bottom:4px; display:flex; justify-content:space-between; align-items:center;';
    header.innerHTML = `<span>${escHtml(emotion)}</span>
      <button class="secondary" style="font-size:0.7rem; padding:1px 6px;" onclick="addBlendshapeRow(this.parentElement.nextElementSibling, '${escHtml(emotion)}')">+</button>`;
    section.appendChild(header);
    const rows = document.createElement('div');
    rows.className = 'bs-rows';
    rows.dataset.emotion = emotion;
    for (const [name, val] of Object.entries(shapes)) {
      rows.appendChild(makeBlendshapeRow(name, val));
    }
    section.appendChild(rows);
    el.appendChild(section);
  }
}

function makeBlendshapeRow(name, val) {
  const row = document.createElement('div');
  row.style.cssText = 'display:flex; gap:4px; margin-bottom:2px;';
  row.innerHTML = `<input type="text" class="bs-name" value="${escHtml(name)}" style="width:80px; background:#1a1a2e; color:#e0e0e0; border:1px solid #455a64; border-radius:3px; padding:2px 4px; font-size:0.75rem;">
    <input type="number" class="bs-val" value="${val}" step="0.1" min="0" max="1" style="width:60px; background:#1a1a2e; color:#e0e0e0; border:1px solid #455a64; border-radius:3px; padding:2px 4px; font-size:0.75rem;">
    <button class="danger" style="font-size:0.65rem; padding:1px 4px;" onclick="this.parentElement.remove()">×</button>`;
  return row;
}

function addBlendshapeRow(container) {
  container.appendChild(makeBlendshapeRow('', 0));
}

function collectBlendshapes() {
  const result = {};
  document.querySelectorAll('.bs-rows').forEach(container => {
    const emotion = container.dataset.emotion;
    const shapes = {};
    container.querySelectorAll('div').forEach(row => {
      const name = row.querySelector('.bs-name')?.value?.trim();
      const val = parseFloat(row.querySelector('.bs-val')?.value || 0);
      if (name) shapes[name] = val;
    });
    result[emotion] = shapes;
  });
  // 感情リストに新しいキーがあれば空で追加
  const emotions = collectEmotions();
  for (const key of Object.keys(emotions)) {
    if (!(key in result)) result[key] = {};
  }
  return result;
}

async function saveCharacter() {
  const body = {
    name: document.getElementById('char-name').value,
    system_prompt: document.getElementById('char-prompt').value,
    rules: collectRules(),
    emotions: collectEmotions(),
    emotion_blendshapes: collectBlendshapes(),
  };
  const res = await api('PUT', '/api/character', body);
  if (res?.ok) {
    document.getElementById('char-status').textContent = '保存しました';
    // リロードしてBlendShapeセクションを更新
    await loadCharacter();
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 初期読み込み
loadCharacter();
loadVsfDefaults();
refreshStatus();
setInterval(refreshStatus, 3000);
</script>
