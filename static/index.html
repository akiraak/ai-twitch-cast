<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Twitch Cast</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f0ff; color: #2a1f40; padding: 16px; }
  h1 { font-size: 1.3rem; margin-bottom: 16px; color: #7b1fa2; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .card { background: #ffffff; border-radius: 8px; padding: 16px; border: 1px solid #d0c0e8; }
  .card h2 { font-size: 1rem; margin-bottom: 12px; color: #7b1fa2; display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.on { background: #2e7d32; }
  .dot.off { background: #9a88b5; }
  .btn-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  button { background: #7b1fa2; color: #fff; border: none; border-radius: 4px; padding: 6px 14px; cursor: pointer; font-size: 0.85rem; }
  button:hover { background: #6a1b9a; }
  button:active { background: #4a148c; }
  button.danger { background: #c62828; }
  button.danger:hover { background: #b71c1c; }
  button.secondary { background: #e8ddf5; color: #2a1f40; }
  button.secondary:hover { background: #d0c0e8; }
  .status { font-size: 0.8rem; color: #6a5590; margin-top: 8px; min-height: 1.2em; }
  .scene-list { list-style: none; margin-top: 8px; }
  .scene-list li { padding: 4px 10px; cursor: pointer; border-radius: 4px; font-size: 0.85rem; }
  .scene-list li:hover { background: #e8ddf5; }
  .scene-list li.active { background: #ece5fa; color: #4a148c; font-weight: bold; border: 1px solid #d0c0e8; }
  .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .slider-row label { font-size: 0.8rem; min-width: 50px; color: #6a5590; }
  .slider-row input[type=range] { flex: 1; accent-color: #7b1fa2; }
  .slider-row .val { font-size: 0.8rem; min-width: 30px; text-align: right; }
  #log { background: #ece5fa; border: 1px solid #d0c0e8; border-radius: 4px; padding: 10px; font-family: monospace; font-size: 0.8rem; height: 180px; overflow-y: auto; margin-top: 16px; white-space: pre-wrap; color: #4a148c; }
  .toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 9999; padding: 12px 24px; border-radius: 8px; font-size: 0.9rem; font-weight: bold; max-width: 80vw; text-align: center; animation: fadeIn 0.3s; }
  .toast.success { background: #e8f5e9; color: #1b5e20; border: 1px solid #4caf50; }
  .toast.error { background: #ffebee; color: #b71c1c; border: 1px solid #e53935; }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  .env-card { background: #ffffff; border: 1px solid #d0c0e8; border-radius: 6px; }
  #env-table td { padding: 3px 6px; border-bottom: 1px solid #ece5fa; }
  #env-table td:first-child { color: #6a5590; }
  #env-table td:nth-child(2) { font-family: monospace; color: #4a148c; }
</style>
</head>
<body>

<h1>AI Twitch Cast</h1>

<div class="btn-row" style="margin-bottom:16px;">
  <button style="padding:10px 28px; font-size:1rem;" onclick="runSetup('/api/start')">Setup</button>
  <button style="padding:10px 28px; font-size:1rem;" onclick="api('POST','/api/stream/start')">配信開始</button>
  <button class="danger" style="padding:10px 28px; font-size:1rem;" onclick="api('POST','/api/stream/stop')">配信停止</button>
</div>

<details class="env-card" style="margin-bottom:16px;">

  <table id="env-table" style="width:100%; font-size:0.75rem; border-collapse:collapse; padding:0 12px 8px;">
  </table>
</details>

    </div>
    <div style="margin-bottom:8px;">

        <button class="secondary" onclick="searchCategories()">検索</button>

<div id="log"></div>

<script>
const logEl = document.getElementById('log');

function log(msg) {
  const t = new Date().toLocaleTimeString();
  logEl.textContent += `[${t}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

function showToast(msg, type = 'success', duration = 5000) {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

async function api(method, url, body) {
  try {
    const opts = { method };
    if (body) {
      opts.headers = { 'Content-Type': 'application/json' };
      opts.body = JSON.stringify(body);
    }
    const r = await fetch(url, opts);
    const text = await r.text();
    let data;
    try {
      data = JSON.parse(text);
    } catch {
      log(`ERROR ${url}: ${text.slice(0, 200)}`);
      return;
    }
    if (!r.ok) {
      log(`ERROR ${url}: ${data.detail || JSON.stringify(data)}`);
    } else {
      log(`OK ${url}`);
    }
    refreshStatus();
    return data;
  } catch (e) {
    log(`ERROR ${url}: ${e.message}`);
  }
}

async function runSetup(url) {
  try {
    const r = await fetch(url, { method: 'POST' });
    const text = await r.text();
    let data;
    try { data = JSON.parse(text); } catch { log(`ERROR ${url}: ${text.slice(0, 200)}`); showToast('Setup失敗: レスポンス解析エラー', 'error'); return; }
    if (!r.ok) {
      const msg = data.detail || JSON.stringify(data);
      log(`ERROR ${url}: ${msg}`);
      showToast(`Setup失敗: ${msg}`, 'error', 8000);
      return;
    }
    // 結果をログに出力
    const scenes = data.created_scenes || [];
    const sources = data.created_sources || [];
    const errors = data.errors || [];
    log(`Setup完了: ${scenes.length}シーン, ${sources.length}ソース`);
    if (sources.length) log(`  ソース: ${sources.join(', ')}`);
    if (errors.length) {
      for (const e of errors) log(`  エラー: ${e}`);
      showToast(`Setup: ${errors.length}件のエラー\n${errors[0]}`, 'error', 8000);
    } else {
      showToast(`Setup完了: ${scenes.length}シーン, ${sources.length}ソース`, 'success');
    }
    refreshStatus();
  } catch (e) {
    log(`ERROR ${url}: ${e.message}`);
    showToast(`Setup失敗: ${e.message}`, 'error', 8000);
  }
}

function startIdle() {
  const scale = parseFloat(document.getElementById('idle-scale').value);
  api('POST', '/api/vsf/idle', { scale });
}

function blend(name, value) {
  api('POST', '/api/vsf/blend', { name, value });
}

function resetBlend() {
  for (const name of ['Joy', 'Angry', 'Sorrow', 'Fun', 'A', 'Blink']) {
    api('POST', '/api/vsf/blend', { name, value: 0 });
  }
  document.querySelectorAll('.bs-slider').forEach(s => {
    s.value = 0;
    s.nextElementSibling.textContent = '0';
  });
}

async function refreshStatus() {
  try {
    const data = await (await fetch('/api/status')).json();

    // OBS
    document.getElementById('obs-dot').className = 'dot ' + (data.obs.connected ? 'on' : 'off');
    if (data.obs.connected && data.obs.stream) {
      const s = data.obs.stream;
      document.getElementById('obs-status').textContent = s.active ? `配信中 ${s.timecode}` : '停止中';
    } else {
      document.getElementById('obs-status').textContent = data.obs.connected ? '接続中' : '未接続';
    }

    // VTS
    document.getElementById('vts-dot').className = 'dot ' + (data.vts.connected ? 'on' : 'off');
    document.getElementById('vts-status').textContent = data.vts.connected ? '接続中' : '未接続';

    // VSF
    document.getElementById('vsf-dot').className = 'dot ' + (data.vsf.connected ? 'on' : 'off');
    let vsfText = data.vsf.connected ? '接続中' : '未接続';
    if (data.vsf.idle) vsfText += ' / Idle実行中';
    document.getElementById('vsf-status').textContent = vsfText;

    // シーン一覧
    if (data.obs.connected) {
      loadScenes();
    } else {
      document.getElementById('obs-scenes').innerHTML = '';
    }
  } catch (e) {}
}

async function loadScenes() {
  try {
    const data = await (await fetch('/api/obs/scenes')).json();
    const ul = document.createElement('ul');
    ul.className = 'scene-list';
    data.scenes.reverse().forEach(name => {
      const li = document.createElement('li');
      li.textContent = name;
      if (name === data.current) li.className = 'active';
      li.onclick = () => api('POST', '/api/obs/scene', { name });
      ul.appendChild(li);
    });
    document.getElementById('obs-scenes').replaceChildren(ul);
  } catch (e) {}
}

// --- キャラクター設定 ---
let _charEmotions = {};
let _charBlendshapes = {};

async function loadCharacter() {
  try {
    const data = await (await fetch('/api/character')).json();
    document.getElementById('char-name').value = data.name || '';
    document.getElementById('char-prompt').value = data.system_prompt || '';
    renderRules(data.rules || []);
    _charEmotions = data.emotions || {};
    _charBlendshapes = data.emotion_blendshapes || {};
    renderEmotions();
    renderBlendshapes();
    document.getElementById('char-status').textContent = '読み込みました';
  } catch (e) {
    document.getElementById('char-status').textContent = 'エラー: ' + e.message;
  }
}

function renderRules(rules) {
  const el = document.getElementById('char-rules');
  el.innerHTML = '';
  rules.forEach((rule, i) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex; gap:4px; margin-bottom:3px;';
    row.innerHTML = `<input type="text" class="char-rule" value="${escHtml(rule)}" style="flex:1; background:#ece5fa; color:#2a1f40; border:1px solid #d0c0e8; border-radius:3px; padding:2px 6px; font-size:0.8rem;">
      <button class="danger" style="font-size:0.7rem; padding:2px 6px;" onclick="this.parentElement.remove()">×</button>`;
    el.appendChild(row);
  });
}

function addRule() {
  const el = document.getElementById('char-rules');
  const row = document.createElement('div');
  row.style.cssText = 'display:flex; gap:4px; margin-bottom:3px;';
  row.innerHTML = `<input type="text" class="char-rule" value="" style="flex:1; background:#ece5fa; color:#2a1f40; border:1px solid #d0c0e8; border-radius:3px; padding:2px 6px; font-size:0.8rem;">
    <button class="danger" style="font-size:0.7rem; padding:2px 6px;" onclick="this.parentElement.remove()">×</button>`;
  el.appendChild(row);
}

function collectRules() {
  return [...document.querySelectorAll('.char-rule')].map(el => el.value).filter(v => v.trim());
}

function renderEmotions() {
  const el = document.getElementById('char-emotions');
  el.innerHTML = '';
  for (const [key, desc] of Object.entries(_charEmotions)) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex; gap:4px; margin-bottom:3px;';
    row.innerHTML = `<input type="text" class="emo-key" value="${escHtml(key)}" style="width:70px; background:#ece5fa; color:#2a1f40; border:1px solid #d0c0e8; border-radius:3px; padding:2px 6px; font-size:0.8rem;" placeholder="キー">
      <input type="text" class="emo-desc" value="${escHtml(desc)}" style="flex:1; background:#ece5fa; color:#2a1f40; border:1px solid #d0c0e8; border-radius:3px; padding:2px 6px; font-size:0.8rem;" placeholder="説明">
      <button class="danger" style="font-size:0.7rem; padding:2px 6px;" onclick="this.parentElement.remove()">×</button>`;
    el.appendChild(row);
  }
}

function addEmotion() {
  const el = document.getElementById('char-emotions');
  const row = document.createElement('div');
  row.style.cssText = 'display:flex; gap:4px; margin-bottom:3px;';
  row.innerHTML = `<input type="text" class="emo-key" value="" style="width:70px; background:#ece5fa; color:#2a1f40; border:1px solid #d0c0e8; border-radius:3px; padding:2px 6px; font-size:0.8rem;" placeholder="キー">
    <input type="text" class="emo-desc" value="" style="flex:1; background:#ece5fa; color:#2a1f40; border:1px solid #d0c0e8; border-radius:3px; padding:2px 6px; font-size:0.8rem;" placeholder="説明">
    <button class="danger" style="font-size:0.7rem; padding:2px 6px;" onclick="this.parentElement.remove()">×</button>`;
  el.appendChild(row);
}

function collectEmotions() {
  const result = {};
  const keys = document.querySelectorAll('.emo-key');
  const descs = document.querySelectorAll('.emo-desc');
  keys.forEach((k, i) => {
    if (k.value.trim()) result[k.value.trim()] = descs[i].value;
  });
  return result;
}

function renderBlendshapes() {
  const el = document.getElementById('char-blendshapes');
  el.innerHTML = '';
  for (const [emotion, shapes] of Object.entries(_charBlendshapes)) {
    const section = document.createElement('div');
    section.style.cssText = 'margin-bottom:8px; padding:6px; background:#ece5fa; border-radius:4px;';
    const header = document.createElement('div');
    header.style.cssText = 'font-size:0.8rem; color:#7b1fa2; margin-bottom:4px; display:flex; justify-content:space-between; align-items:center;';
    header.innerHTML = `<span>${escHtml(emotion)}</span>
      <button class="secondary" style="font-size:0.7rem; padding:1px 6px;" onclick="addBlendshapeRow(this.parentElement.nextElementSibling, '${escHtml(emotion)}')">+</button>`;
    section.appendChild(header);
    const rows = document.createElement('div');
    rows.className = 'bs-rows';
    rows.dataset.emotion = emotion;
    for (const [name, val] of Object.entries(shapes)) {
      rows.appendChild(makeBlendshapeRow(name, val));
    }
    section.appendChild(rows);
    el.appendChild(section);
  }
}

function makeBlendshapeRow(name, val) {
  const row = document.createElement('div');
  row.style.cssText = 'display:flex; gap:4px; margin-bottom:2px;';
  row.innerHTML = `<input type="text" class="bs-name" value="${escHtml(name)}" style="width:80px; background:#ece5fa; color:#2a1f40; border:1px solid #d0c0e8; border-radius:3px; padding:2px 4px; font-size:0.75rem;">
    <input type="number" class="bs-val" value="${val}" step="0.1" min="0" max="1" style="width:60px; background:#ece5fa; color:#2a1f40; border:1px solid #d0c0e8; border-radius:3px; padding:2px 4px; font-size:0.75rem;">
    <button class="danger" style="font-size:0.65rem; padding:1px 4px;" onclick="this.parentElement.remove()">×</button>`;
  return row;
}

function addBlendshapeRow(container) {
  container.appendChild(makeBlendshapeRow('', 0));
}

function collectBlendshapes() {
  const result = {};
  document.querySelectorAll('.bs-rows').forEach(container => {
    const emotion = container.dataset.emotion;
    const shapes = {};
    container.querySelectorAll('div').forEach(row => {
      const name = row.querySelector('.bs-name')?.value?.trim();
      const val = parseFloat(row.querySelector('.bs-val')?.value || 0);
      if (name) shapes[name] = val;
    });
    result[emotion] = shapes;
  });
  // 感情リストに新しいキーがあれば空で追加
  const emotions = collectEmotions();
  for (const key of Object.keys(emotions)) {
    if (!(key in result)) result[key] = {};
  }
  return result;
}

async function saveCharacter() {
  const body = {
    name: document.getElementById('char-name').value,
    system_prompt: document.getElementById('char-prompt').value,
    rules: collectRules(),
    emotions: collectEmotions(),
    emotion_blendshapes: collectBlendshapes(),
  };
  const res = await api('PUT', '/api/character', body);
  if (res?.ok) {
    document.getElementById('char-status').textContent = '保存しました';
    // リロードしてBlendShapeセクションを更新
    await loadCharacter();
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function searchCategories() {
  const query = document.getElementById('twitch-category-search').value.trim();
  if (!query) return;
  const container = document.getElementById('twitch-category-results');
  container.innerHTML = '<span style="font-size:0.8rem;color:#6a5590;">検索中...</span>';
  try {
    const res = await api('POST', '/api/twitch/categories/search', { query });
    if (!res?.categories?.length) {
      container.innerHTML = '<span style="font-size:0.8rem;color:#6a5590;">見つかりませんでした</span>';
      return;
    }
    container.innerHTML = '';
    for (const cat of res.categories) {
      const btn = document.createElement('button');
      btn.className = 'secondary';
      btn.style.cssText = 'margin:2px 4px 2px 0; font-size:0.75rem; padding:3px 10px;';
      btn.textContent = cat.name;
      btn.onclick = () => {
        document.getElementById('twitch-game-id').value = cat.id;
        document.getElementById('twitch-category-current').textContent = 'カテゴリ: ' + cat.name;
        container.innerHTML = '';
      };
      container.appendChild(btn);
    }
  } catch (e) {
    container.innerHTML = '<span style="font-size:0.8rem;color:#e53935;">エラー: ' + e.message + '</span>';
  }
}

async function loadTodoUI() {
  try {
    const data = await (await fetch('/api/todo')).json();
    const el = document.getElementById('todo-list-ui');
    el.innerHTML = '';
    for (const item of data.items) {
      const text = typeof item === 'string' ? item : item.text;
      const status = typeof item === 'string' ? 'todo' : item.status;
      const row = document.createElement('div');
      row.style.cssText = 'display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid #d0c0e8;';
      const label = document.createElement('span');
      label.style.cssText = 'flex:1; font-size:0.85rem;';
      label.textContent = text;
      if (status === 'in_progress') {
        label.style.color = '#7b1fa2';
        label.style.fontWeight = 'bold';
      }
      row.appendChild(label);
      if (status === 'todo') {
        const btn = document.createElement('button');
        btn.textContent = '開始';
        btn.style.cssText = 'font-size:0.75rem; padding:3px 10px;';
        btn.onclick = () => startTodo(text);
        row.appendChild(btn);
      } else {
        const badge = document.createElement('span');
        badge.textContent = '作業中';
        badge.style.cssText = 'font-size:0.7rem; color:#7b1fa2; background:#ece5fa; padding:2px 8px; border-radius:3px; border:1px solid #d0c0e8;';
        row.appendChild(badge);
      }
      el.appendChild(row);
    }
  } catch (e) {}
}

async function startTodo(text) {
  const res = await api('POST', '/api/todo/start', { text });
  if (res?.ok) {
    showToast(`作業開始: ${text}`, 'success');
    loadTodoUI();
  }
}
