<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI Twitch Cast - Broadcast</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 100vw; height: 100vh;
    position: relative; overflow: hidden;
    font-family: "Noto Sans JP", "Yu Gothic UI", "Meiryo", sans-serif;
    background: #000;
  }

  /* === 背景 === */
  #background {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    object-fit: cover;
  }

  /* === アバター === */
  #avatar-area {
    position: absolute;
    z-index: 5;
    left: 73.25%; top: 62.15%;
    width: 53.5%; height: 75.7%;
    transform: translate(-50%, -50%);
    transform-origin: center center;
  }
  #avatar-area img, #avatar-area canvas {
    width: 100%; height: 100%;
    object-fit: contain;
  }

  /* === リアルタイム字幕（下中央） === */
  #subtitle {
    position: absolute;
    bottom: 7.4%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    --bg-opacity: 0.85;
    background: linear-gradient(135deg, rgba(20, 20, 40, var(--bg-opacity)), rgba(30, 20, 50, var(--bg-opacity)));
    border: 1px solid rgba(124, 77, 255, 0.3);
    border-radius: 1vw;
    padding: 1.4vw 2.2vw;
    max-width: 62%;
    min-width: 21%;
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
    backdrop-filter: blur(8px);
  }
  #subtitle.visible { opacity: 1; }
  #subtitle.fading { opacity: 0; transition: opacity 1.5s ease; }
  #subtitle .comment { display: none; }
  #subtitle .response {
    font-size: 1.875vw;
    color: #ffffff;
    font-weight: bold;
    margin-bottom: 0.5vw;
    line-height: 1.5;
    text-shadow: 0 0.1vw 0.4vw rgba(0, 0, 0, 0.7), 0 0 1vw rgba(124, 77, 255, 0.2);
    letter-spacing: 0.03vw;
  }
  #subtitle .english {
    font-size: 1.04vw;
    color: #b2dfdb;
    font-style: italic;
    text-shadow: 0 0.05vw 0.2vw rgba(0, 0, 0, 0.5);
  }

  /* === TODOパネル（中央） === */
  #todo-panel {
    position: absolute;
    top: 2%; left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    width: 28%;
    overflow: hidden;
    --bg-opacity: 0.95;
    background: linear-gradient(135deg, rgba(0, 0, 0, var(--bg-opacity)), rgba(5, 0, 10, var(--bg-opacity)));
    border: 1px solid rgba(124, 77, 255, 0.3);
    border-radius: 0.6vw;
    padding: 1vw 1.25vw;
    backdrop-filter: blur(6px);
    pointer-events: none;
  }
  #todo-panel .todo-title {
    font-size: 1.46vw;
    font-weight: bold;
    color: #ffffff;
    margin-bottom: 0.6vw;
    letter-spacing: 0.05vw;
  }
  #todo-panel .todo-section {
    font-size: 0.83vw;
    color: rgba(255, 255, 255, 0.6);
    font-weight: bold;
    letter-spacing: 0.05vw;
    margin-top: 0.5vw;
    margin-bottom: 0.2vw;
    padding-top: 0.3vw;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }
  #todo-panel .todo-section:first-child {
    margin-top: 0; padding-top: 0; border-top: none;
  }
  #todo-panel .todo-item {
    color: rgba(255, 255, 255, 0.9);
    font-size: 1.25vw;
    padding: 0.3vw 0;
    line-height: 1.5;
    display: flex;
    align-items: center;
    gap: 0.4vw;
    transition: all 0.3s ease;
  }
  #todo-panel .todo-checkbox {
    flex-shrink: 0;
    width: 0.94vw; height: 0.94vw;
    border: 2px solid rgba(255, 255, 255, 0.5);
    border-radius: 2px;
  }
  #todo-panel .todo-item.in-progress {
    color: #ffffff;
    font-weight: bold;
    font-size: 1.35vw;
    padding: 0.5vw 0.6vw;
    margin: 0.2vw -0.5vw;
    background: linear-gradient(90deg, rgba(124, 77, 255, 0.2), rgba(124, 77, 255, 0.05));
    border-radius: 0.4vw;
    border-left: 3px solid #b388ff;
    animation: pulse-glow 2s ease-in-out infinite;
  }
  #todo-panel .todo-item.in-progress .todo-checkbox {
    width: 1.04vw; height: 1.04vw;
    background: #7c4dff;
    border-color: #b388ff;
    border-radius: 3px;
    box-shadow: 0 0 0.4vw rgba(124, 77, 255, 0.5);
  }
  #todo-panel .todo-item.in-progress .todo-arrow {
    color: #b388ff;
    font-size: 0.94vw;
    animation: arrow-bounce 1.2s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0px rgba(124, 77, 255, 0); }
    50% { box-shadow: 0 0 0.6vw rgba(124, 77, 255, 0.15); }
  }
  @keyframes arrow-bounce {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(0.15vw); }
  }

  /* === キャプチャレイヤー === */
  .capture-layer {
    position: absolute;
    z-index: 10;
    overflow: hidden;
    border-radius: 0.3vw;
  }
  .capture-layer img {
    width: 100%; height: 100%;
    object-fit: contain;
    pointer-events: none;
  }

  /* === 編集モード === */
  body.edit-mode .edit-toolbar { display: flex; }
  .edit-toolbar {
    display: none;
    position: fixed; top: 0; left: 0; right: 0;
    height: 44px;
    background: rgba(0, 0, 0, 0.9);
    border-bottom: 2px solid #7c4dff;
    z-index: 9999;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    color: #eee;
  }
  .edit-toolbar button {
    padding: 4px 14px;
    border: 1px solid #7c4dff;
    border-radius: 4px;
    background: transparent;
    color: #b388ff;
    font-size: 13px;
    cursor: pointer;
  }
  .edit-toolbar button:hover { background: #7c4dff33; }
  .edit-toolbar button.primary { background: #7c4dff; color: #fff; }
  .edit-toolbar select {
    padding: 4px 8px;
    border: 1px solid #555;
    border-radius: 4px;
    background: #222;
    color: #eee;
    font-size: 13px;
  }
  .edit-toolbar .spacer { flex: 1; }

  body.edit-mode [data-editable] {
    cursor: move;
    pointer-events: auto !important;
  }
  body.edit-mode [data-editable]:hover {
    outline: 2px solid #7c4dff;
    outline-offset: 2px;
  }
  body.edit-mode [data-editable].selected {
    outline: 2px dashed #4caf50;
    outline-offset: 2px;
  }

  /* === 右クリックメニュー === */
  .edit-context-menu {
    display: none;
    position: fixed;
    z-index: 10000;
    background: rgba(20, 15, 30, 0.95);
    border: 1px solid #7c4dff;
    border-radius: 6px;
    padding: 4px 0;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    color: #eee;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    min-width: 140px;
  }
  .edit-context-menu .ctx-item {
    padding: 6px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .edit-context-menu .ctx-item:hover {
    background: rgba(124, 77, 255, 0.2);
  }

  /* === Z値ダイアログ === */
  .zindex-dialog {
    display: none;
    position: fixed;
    z-index: 10001;
    background: rgba(20, 15, 30, 0.95);
    border: 1px solid #7c4dff;
    border-radius: 8px;
    padding: 12px 16px;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    color: #eee;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  .zindex-dialog .zd-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .zindex-dialog button {
    padding: 4px 12px;
    border: 1px solid #7c4dff;
    border-radius: 4px;
    background: transparent;
    color: #b388ff;
    font-size: 14px;
    cursor: pointer;
  }
  .zindex-dialog button:hover { background: #7c4dff33; }
  .zindex-dialog input[type="number"] {
    width: 55px;
    padding: 3px 4px;
    border: 1px solid #555;
    border-radius: 4px;
    background: #222;
    color: #eee;
    font-size: 14px;
    text-align: center;
  }
  .zindex-dialog .zd-shortcuts {
    display: flex;
    gap: 6px;
    border-top: 1px solid rgba(124, 77, 255, 0.2);
    padding-top: 8px;
  }
  .zindex-dialog .zd-shortcuts button {
    flex: 1;
    font-size: 11px;
    padding: 4px 6px;
  }
  body.edit-mode [data-editable].dragging {
    outline: 2px solid #ff4081;
    outline-offset: 2px;
    opacity: 0.85;
  }
  .edit-label {
    display: none;
    position: absolute; top: -20px; left: 0;
    background: #7c4dff;
    color: #fff;
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 9998;
  }
  body.edit-mode .edit-label { display: block; }

  .resize-handle {
    display: none;
    position: absolute;
    width: 12px; height: 12px;
    background: #7c4dff;
    border: 1px solid #fff;
    border-radius: 2px;
    z-index: 9998;
  }
  body.edit-mode .resize-handle { display: block; }
  .resize-handle.se { bottom: -6px; right: -6px; cursor: se-resize; }

  /* === トピックパネル（左上） === */
  #topic-panel {
    position: absolute;
    top: 1.85%; left: 1.04%;
    z-index: 20;
    max-width: 31%; min-width: 15%;
    --bg-opacity: 0.95;
    background: linear-gradient(135deg, rgba(0, 0, 0, var(--bg-opacity)), rgba(5, 0, 10, var(--bg-opacity)));
    border: 1px solid rgba(124, 77, 255, 0.3);
    border-radius: 0.5vw;
    padding: 0;
    backdrop-filter: blur(6px);
    pointer-events: none;
    opacity: 1;
    overflow: hidden;
  }
  #topic-panel.idle { border-color: rgba(255, 255, 255, 0.1); }
  #topic-panel .topic-header {
    display: flex; align-items: center; gap: 0.4vw;
    padding: 0.4vw 0.73vw;
    background: linear-gradient(90deg, rgba(124, 77, 255, 0.15), transparent);
    border-bottom: 1px solid rgba(124, 77, 255, 0.1);
  }
  #topic-panel .topic-dot {
    width: 0.42vw; height: 0.42vw;
    border-radius: 50%;
    background: #b388ff;
    box-shadow: 0 0 0.3vw rgba(124, 77, 255, 0.6);
    animation: dot-pulse 2s ease-in-out infinite;
  }
  #topic-panel .topic-dot.paused {
    background: #666; box-shadow: none; animation: none;
  }
  @keyframes dot-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  #topic-panel .topic-label {
    font-size: 0.78vw; color: #b388ff;
    font-weight: bold; letter-spacing: 0.1vw;
    text-shadow: 0 0 0.4vw rgba(124, 77, 255, 0.3);
  }
  #topic-panel .topic-body { padding: 0.6vw 0.73vw; }
  #topic-panel .topic-title {
    font-size: 1.25vw; color: #ffffff;
    font-weight: bold; line-height: 1.4;
    word-break: break-word;
  }
  #topic-panel .topic-desc {
    font-size: 0.83vw; color: rgba(255, 255, 255, 0.5);
    margin-top: 0.3vw; line-height: 1.4;
  }
  #topic-panel .topic-stats {
    font-size: 0.68vw; color: rgba(255, 255, 255, 0.35);
    margin-top: 0.4vw; padding-top: 0.4vw;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }
</style>
</head>

<!-- キャプチャレイヤーコンテナ -->

<!-- 音声要素（非表示） -->

<!-- Three.js + three-vrm -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.3.3/lib/three-vrm.module.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import * as VRM from '@pixiv/three-vrm';

// === VRMアバターレンダラー ===
const canvas = document.getElementById('avatar-canvas');
const avatarArea = document.getElementById('avatar-area');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setPixelRatio(Math.max(window.devicePixelRatio || 1, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(20, 1, 0.1, 100);
camera.position.set(0, 1.2, 3.0);
camera.lookAt(0, 1.1, 0);

// レンダラーサイズをアバター領域に合わせる
function resizeRenderer() {
  const w = avatarArea.clientWidth;
  const h = avatarArea.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resizeRenderer();
window.addEventListener('resize', resizeRenderer);

// ライティング
const ambientLight = new THREE.AmbientLight(0xffffff, 2.0);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(1, 2, 3);
scene.add(dirLight);

// ライティング設定を外部から制御
window.avatarLighting = {
  setAmbient(intensity) { ambientLight.intensity = intensity; },
  setDirectional(intensity) { dirLight.intensity = intensity; },
  setExposure(val) { renderer.toneMappingExposure = val; },
  setColor(r, g, b) {
    ambientLight.color.setRGB(r, g, b);
    dirLight.color.setRGB(r, g, b);
  },
};

let currentVRM = null;
let idleScale = 1.0;
let t0 = performance.now() / 1000;

// まばたき状態
let nextBlink = t0 + 2 + Math.random() * 3;
let blinkEnd = 0;

// 耳ぴくぴく状態
let nextEarTwitch = t0 + 3 + Math.random() * 5;
let earTwitchEnd = 0;
let earTwitchStart = 0;
let earTwitchDuration = 0.2;

// リップシンク状態
let lipsyncFrames = null;
let lipsyncStart = 0;

// 外部BlendShape（感情等）
let externalShapes = {};

// グローバル公開
window.avatarVRM = {
  setBlendShapes(shapes) { externalShapes = shapes; },
  setLipsync(frames) { lipsyncFrames = frames; lipsyncStart = performance.now() / 1000; },
  stopLipsync() { lipsyncFrames = null; },
  setIdleScale(s) { idleScale = s; },
};

// VRMモデル読み込み
async function loadVRM(url) {
  const loader = new GLTFLoader();
  loader.register((parser) => new VRM.VRMLoaderPlugin(parser));

  try {
    const gltf = await loader.loadAsync(url);
    const vrm = gltf.userData.vrm;
    if (!vrm) { console.error('VRMデータがありません'); return; }

    // 既存モデル削除
    if (currentVRM) {
      scene.remove(currentVRM.scene);
      VRM.VRMUtils.deepDispose(currentVRM.scene);
    }

    // VRM追加
    VRM.VRMUtils.rotateVRM0(vrm);
    scene.add(vrm.scene);
    currentVRM = vrm;

    console.log('VRM読み込み完了:', url);
    t0 = performance.now() / 1000;
  } catch (e) {
    console.error('VRM読み込み失敗:', e);
  }
}

// クォータニオン生成（軸+角度）
function quatFromAxisAngle(ax, ay, az, deg) {
  const rad = (deg * Math.PI / 180) / 2;
  const s = Math.sin(rad);
  return new THREE.Quaternion(ax * s, ay * s, az * s, Math.cos(rad));
}

// ボーン回転設定
function setBoneRotation(vrm, boneName, quat) {
  const node = vrm.humanoid?.getNormalizedBoneNode(boneName);
  if (node) node.quaternion.copy(quat);
}

// アイドルアニメーション + レンダリングループ
function animate() {
  requestAnimationFrame(animate);
  if (!currentVRM) { renderer.render(scene, camera); return; }

  const now = performance.now() / 1000;
  const t = now - t0;
  const s = idleScale;

  // --- 呼吸 (~4秒周期) ---
  const breath = Math.sin(t * 1.6) * 0.8 * s;
  setBoneRotation(currentVRM, 'chest', quatFromAxisAngle(1, 0, 0, breath));

  // --- 体の揺れ (~7秒周期) ---
  const sway = (Math.sin(t * 0.9) * 1.0 + Math.sin(t * 0.37) * 0.4) * s;
  setBoneRotation(currentVRM, 'spine', quatFromAxisAngle(0, 0, 1, sway));

  // --- 頭の動き ---
  const headX = (Math.sin(t * 0.7) * 1.2 + Math.sin(t * 1.3) * 0.6) * s;
  const headZ = (Math.sin(t * 0.5) * 1.6 + Math.sin(t * 1.1) * 0.6) * s;
  const headY = Math.sin(t * 0.4) * 1.2 * s;
  const qHead = quatFromAxisAngle(1, 0, 0, headX)
    .multiply(quatFromAxisAngle(0, 1, 0, headY))
    .multiply(quatFromAxisAngle(0, 0, 1, headZ));
  setBoneRotation(currentVRM, 'head', qHead);

  // --- 腕の揺れ ---
  const rArmSway = Math.sin(t * 0.6 + 1.0) * 0.8 * s;
  const lArmSway = Math.sin(t * 0.6 + 2.5) * 0.8 * s;
  setBoneRotation(currentVRM, 'rightUpperArm', quatFromAxisAngle(0, 0, 1, -70 + rArmSway));
  setBoneRotation(currentVRM, 'leftUpperArm', quatFromAxisAngle(0, 0, 1, 70 + lArmSway));

  // --- 前腕 ---
  const rFore = 20 + Math.sin(t * 0.8 + 0.5) * 0.6 * s;
  const lFore = -20 + Math.sin(t * 0.8 + 2.0) * 0.6 * s;
  setBoneRotation(currentVRM, 'rightLowerArm', quatFromAxisAngle(0, 1, 0, rFore));
  setBoneRotation(currentVRM, 'leftLowerArm', quatFromAxisAngle(0, 1, 0, lFore));

  // --- BlendShape ---
  const em = currentVRM.expressionManager;
  if (em) {
    // まばたき
    if (now >= nextBlink && blinkEnd === 0) {
      blinkEnd = now + 0.08;
    }
    if (blinkEnd > 0) {
      if (now < blinkEnd) {
        em.setValue('blink', 1.0);
      } else {
        em.setValue('blink', 0.0);
        blinkEnd = 0;
        nextBlink = now + 2 + Math.random() * 4;
      }
    }

    // 耳ぴくぴく（カスタムBlendShape）
    if (now >= nextEarTwitch && now >= earTwitchEnd) {
      earTwitchDuration = 0.15 + Math.random() * 0.15;
      earTwitchEnd = now + earTwitchDuration;
      earTwitchStart = now;
      nextEarTwitch = now + 3 + Math.random() * 7;
    }
    // ear_standがある場合のみ
    try {
      if (now < earTwitchEnd) {
        const progress = (now - earTwitchStart) / earTwitchDuration;
        em.setValue('ear_stand', Math.sin(progress * Math.PI));
      } else {
        em.setValue('ear_stand', 0.0);
      }
    } catch (e) { /* ear_stand BlendShapeがない場合は無視 */ }

    // リップシンク
    if (lipsyncFrames) {
      const frameIdx = Math.floor((now - lipsyncStart) * 30);
      if (frameIdx >= 0 && frameIdx < lipsyncFrames.length) {
        em.setValue('aa', lipsyncFrames[frameIdx]);
      } else {
        lipsyncFrames = null;
        em.setValue('aa', 0.0);
      }
    }

    // 外部BlendShape（感情等）
    for (const [name, value] of Object.entries(externalShapes)) {
      try { em.setValue(name.toLowerCase(), value); } catch (e) {}
    }

    em.update();
  }

  currentVRM.update(1 / 30);
  renderer.render(scene, camera);
}

animate();

// デフォルトでVRMモデルを読み込み
async function initAvatar() {
  try {
    const res = await fetch('/api/broadcast/avatar');
    const data = await res.json();
    // VRM URLが設定されていればそれを使う、なければデフォルト
    const vrmUrl = data.vrm_url || '/resources/vrm/Shinano.vrm';
    await loadVRM(vrmUrl);
  } catch (e) {
    // デフォルトモデル読み込み
    await loadVRM('/resources/vrm/Shinano.vrm');
  }
}

initAvatar();

// グローバル公開（非module scriptからアクセス用）
window.loadVRM = loadVRM;
</script>

<script>
// === 要素参照 ===
const subtitleEl = document.getElementById('subtitle');
const todoPanelEl = document.getElementById('todo-panel');
const todoListEl = document.getElementById('todo-list');
const topicPanelEl = document.getElementById('topic-panel');
const ttsAudio = document.getElementById('tts-audio');
const bgmAudio = document.getElementById('bgm-audio');
let fadeTimer = null;
let todoSettings = {};

// === 音量管理 ===
let volumes = { master: 0.8, tts: 0.8, bgm: 1.0 };

function applyVolume() {
  ttsAudio.volume = volumes.master * volumes.tts;
  bgmAudio.volume = volumes.master * volumes.bgm;
}

// === 背景透明度の適用（CSS変数で制御） ===
function setBgOpacity(el, opacity) {
  el.style.setProperty('--bg-opacity', opacity);
}

// === 設定適用（%/vw単位） ===
function applySettings(s) {
  const avatarArea = document.getElementById('avatar-area');
  if (s.avatar) {
    if (s.avatar.positionX != null) avatarArea.style.left = s.avatar.positionX + '%';
    if (s.avatar.positionY != null) avatarArea.style.top = s.avatar.positionY + '%';
    if (s.avatar.scale != null) {
      avatarArea.style.transform = `translate(-50%, -50%) scale(${s.avatar.scale})`;
    }
    if (s.avatar.zIndex != null) avatarArea.style.zIndex = s.avatar.zIndex;
    if (window.dispatchEvent) window.dispatchEvent(new Event('resize'));
  }
  if (s.lighting && window.avatarLighting) {
    const L = window.avatarLighting;
    const b = s.lighting.brightness ?? 1.0;
    const c = s.lighting.contrast ?? 1.0;
    const temp = s.lighting.temperature ?? 0;  // -1(寒色)〜+1(暖色)
    const sat = s.lighting.saturation ?? 1.0;
    // 明るさ → トーンマッピング露出（ACESが白飛び防止）
    L.setExposure(b);
    // コントラスト → 環境光/指向性光の比率
    L.setAmbient(Math.max(0.5, Math.min(4.0, 2.0 / c)));
    L.setDirectional(Math.max(0.3, Math.min(4.0, 1.5 * c)));
    // 色温度 → ライトの色（暖色=黄、寒色=青）
    const r = 1.0 + temp * 0.15;
    const g = 1.0;
    const bl = 1.0 - temp * 0.15;
    L.setColor(r, g, bl);
    // 彩度 → CSSフィルター
    document.getElementById('avatar-canvas').style.filter = sat !== 1.0 ? `saturate(${sat})` : '';
  }
  if (s.subtitle) {
    if (s.subtitle.bottom != null) subtitleEl.style.bottom = s.subtitle.bottom + '%';
    if (s.subtitle.fontSize != null) subtitleEl.querySelector('.response').style.fontSize = s.subtitle.fontSize + 'vw';
    if (s.subtitle.maxWidth != null) subtitleEl.style.maxWidth = s.subtitle.maxWidth + '%';
    if (s.subtitle.fadeDuration != null) subtitleEl.dataset.fadeDuration = s.subtitle.fadeDuration;
    if (s.subtitle.bgOpacity != null) setBgOpacity(subtitleEl, s.subtitle.bgOpacity);
    if (s.subtitle.zIndex != null) subtitleEl.style.zIndex = s.subtitle.zIndex;
  }
  if (s.todo) {
    todoSettings = s.todo;
    if (s.todo.width != null) todoPanelEl.style.width = s.todo.width + '%';
    if (s.todo.height != null) {
      todoPanelEl.style.height = s.todo.height + '%';
      todoPanelEl.style.maxHeight = 'none';
      todoPanelEl.style.overflow = 'hidden';
    }
    if (s.todo.positionX != null) {
      todoPanelEl.style.left = s.todo.positionX + '%';
      todoPanelEl.style.transform = 'translateX(-50%)';
    }
    if (s.todo.positionY != null) {
      todoPanelEl.style.top = s.todo.positionY + '%';
    }
    if (s.todo.fontSize != null) {
      todoPanelEl.querySelectorAll('.todo-item').forEach(el => el.style.fontSize = s.todo.fontSize + 'vw');
    }
    if (s.todo.titleFontSize != null) todoPanelEl.querySelector('.todo-title').style.fontSize = s.todo.titleFontSize + 'vw';
    if (s.todo.bgOpacity != null) setBgOpacity(todoPanelEl, s.todo.bgOpacity);
    if (s.todo.zIndex != null) todoPanelEl.style.zIndex = s.todo.zIndex;
    loadTodo();
  }
  if (s.topic) {
    if (s.topic.positionX != null) topicPanelEl.style.left = s.topic.positionX + '%';
    if (s.topic.positionY != null) topicPanelEl.style.top = s.topic.positionY + '%';
    if (s.topic.maxWidth != null) topicPanelEl.style.maxWidth = s.topic.maxWidth + '%';
    if (s.topic.titleFontSize != null) {
      document.getElementById('topic-title-text').style.fontSize = s.topic.titleFontSize + 'vw';
    }
    if (s.topic.bgOpacity != null) setBgOpacity(topicPanelEl, s.topic.bgOpacity);
    if (s.topic.zIndex != null) topicPanelEl.style.zIndex = s.topic.zIndex;
  }
}

// === 字幕 ===
function showSubtitle(data) {
  clearTimeout(fadeTimer);
  subtitleEl.classList.remove('fading');
  subtitleEl.querySelector('.author').textContent = '';
  subtitleEl.querySelector('.message').textContent = data.message;
  subtitleEl.querySelector('.response').textContent = data.response;
  subtitleEl.querySelector('.english').textContent = data.english || '';
  subtitleEl.classList.add('visible');
}

function fadeSubtitle() {
  const duration = parseFloat(subtitleEl.dataset.fadeDuration || 3) * 1000;
  fadeTimer = setTimeout(() => {
    subtitleEl.classList.add('fading');
    subtitleEl.classList.remove('visible');
  }, duration);
}

// === トピックパネル ===
function updateTopicPanel(data) {
  const titleEl = document.getElementById('topic-title-text');
  const descEl = document.getElementById('topic-desc-text');
  const statsEl = document.getElementById('topic-stats');
  const dotEl = document.getElementById('topic-dot');
  const isIdle = !data || !data.active || data.paused;

  if (isIdle) {
    topicPanelEl.classList.add('idle');
    titleEl.textContent = '----';
    descEl.textContent = '';
    descEl.style.display = 'none';
    statsEl.textContent = '';
    dotEl.classList.add('paused');
    return;
  }
  topicPanelEl.classList.remove('idle');
  titleEl.textContent = data.topic.title;
  descEl.textContent = data.topic.description || '';
  descEl.style.display = data.topic.description ? '' : 'none';
  const parts = [];
  if (data.remaining_scripts != null) parts.push(`残り ${data.remaining_scripts}件`);
  if (data.spoken_count != null) parts.push(`発話済み ${data.spoken_count}件`);
  statsEl.textContent = parts.join(' / ');
  dotEl.classList.toggle('paused', false);
}

async function loadTopicPanel() {
  try {
    const res = await fetch('/api/topic');
    const data = await res.json();
    updateTopicPanel(data);
  } catch (e) {}
}

// === TODO読み込み ===
async function loadTodo() {
  try {
    const res = await fetch('/api/todo');
    const data = await res.json();
    todoListEl.innerHTML = '';
    const fs = todoSettings.fontSize;
    let lastSection = null;
    for (const item of data.items) {
      const text_val = typeof item === 'string' ? item : item.text;
      const status = typeof item === 'string' ? 'todo' : item.status;
      const section = item.section || '';
      if (section && section !== lastSection) {
        const sectionEl = document.createElement('div');
        sectionEl.className = 'todo-section';
        sectionEl.textContent = section;
        todoListEl.appendChild(sectionEl);
        lastSection = section;
      }
      const div = document.createElement('div');
      div.className = 'todo-item' + (status === 'in_progress' ? ' in-progress' : '');
      if (status === 'in_progress') {
        const arrow = document.createElement('span');
        arrow.className = 'todo-arrow';
        arrow.textContent = '\u25B6';
        div.appendChild(arrow);
      }
      const cb = document.createElement('span');
      cb.className = 'todo-checkbox';
      const text = document.createElement('span');
      text.textContent = text_val;
      if (fs) text.style.fontSize = fs + 'vw';
      div.appendChild(cb);
      div.appendChild(text);
      todoListEl.appendChild(div);
    }
  } catch (e) {
    console.log('TODO読み込みエラー:', e.message);
  }
}

// === WebSocket（統合: overlay + tts + bgm） ===
function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${protocol}//${location.host}/ws/broadcast`);

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    switch (data.type) {
      // オーバーレイイベント
      case 'comment':
        showSubtitle(data);
        break;
      case 'speaking_end':
        fadeSubtitle();
        break;
      case 'topic_update':
        updateTopicPanel(data);
        break;
      case 'settings_update':
        applySettings(data);
        break;

      // TTS音声
      case 'play_audio':
        ttsAudio.src = data.url;
        ttsAudio.load();
        ttsAudio.play().catch(e => console.log('TTS再生エラー:', e));
        break;

      // BGM
      case 'bgm_play':
        bgmAudio.src = data.url;
        bgmAudio.load();
        bgmAudio.play().catch(e => console.log('BGM再生エラー:', e));
        break;
      case 'bgm_stop':
        bgmAudio.pause();
        bgmAudio.src = '';
        break;

      // 音量制御
      case 'volume':
        if (data.source && data.volume != null) {
          volumes[data.source] = data.volume;
          applyVolume();
        }
        break;

      // VRMアバター制御
      case 'blendshape':
        if (window.avatarVRM && data.shapes) {
          window.avatarVRM.setBlendShapes(data.shapes);
        }
        break;
      case 'lipsync':
        if (window.avatarVRM && data.frames) {
          window.avatarVRM.setLipsync(data.frames);
        }
        break;
      case 'lipsync_stop':
        if (window.avatarVRM) {
          window.avatarVRM.stopLipsync();
        }
        break;

      // アバターストリーム（MJPEG fallback）
      case 'avatar_stream':
        setAvatarStream(data.url);
        break;
      case 'avatar_stop':
        stopAvatarStream();
        break;

      // ウィンドウキャプチャ
      case 'capture_add':
        addCaptureLayer(data.id, data.stream_url, data.label, data.layout);
        break;
      case 'capture_remove':
        removeCaptureLayer(data.id);
        break;
      case 'capture_layout':
        updateCaptureLayout(data.id, data.layout);
        break;
    }
  };

  ws.onclose = () => setTimeout(connectWS, 3000);
  ws.onerror = () => ws.close();
}

// === アバターストリーム ===
const avatarImg = document.getElementById('avatar-stream');

function setAvatarStream(url) {
  avatarImg.src = url;
  avatarImg.style.display = '';
  avatarImg.onerror = () => {
    // ストリーム切断時は非表示
    avatarImg.style.display = 'none';
  };
}

function stopAvatarStream() {
  avatarImg.src = '';
  avatarImg.style.display = 'none';
}

// === ウィンドウキャプチャ ===
const captureContainer = document.getElementById('capture-container');
const captureLayers = {};

function addCaptureLayer(id, streamUrl, label, layout) {
  if (captureLayers[id]) removeCaptureLayer(id);
  const div = document.createElement('div');
  div.className = 'capture-layer';
  div.dataset.editable = `capture:${id}`;
  div.dataset.captureId = id;
  applyLayoutToEl(div, layout);

  const labelEl = document.createElement('div');
  labelEl.className = 'edit-label';
  labelEl.textContent = label || id;
  div.appendChild(labelEl);

  const handle = document.createElement('div');
  handle.className = 'resize-handle se';
  div.appendChild(handle);

  const img = document.createElement('img');
  img.src = streamUrl;
  img.alt = label || id;
  div.appendChild(img);

  captureContainer.appendChild(div);
  captureLayers[id] = div;

  if (isEditMode) setupEditable(div);
}

function removeCaptureLayer(id) {
  const el = captureLayers[id];
  if (el) { el.remove(); delete captureLayers[id]; }
}

function updateCaptureLayout(id, layout) {
  const el = captureLayers[id];
  if (el) applyLayoutToEl(el, layout);
}

function applyLayoutToEl(el, layout) {
  if (layout.x != null) el.style.left = layout.x + '%';
  if (layout.y != null) el.style.top = layout.y + '%';
  if (layout.width != null) el.style.width = layout.width + '%';
  if (layout.height != null) el.style.height = layout.height + '%';
  if (layout.zIndex != null) el.style.zIndex = layout.zIndex;
  if (layout.visible === false) el.style.display = 'none';
  else el.style.display = '';
}

// === 編集モード ===
const isEditMode = new URLSearchParams(location.search).has('edit');
let _saveTimer = null;
let _selectedEditable = null;
const _ctxMenu = document.getElementById('edit-context-menu');
const _zDialog = document.getElementById('zindex-dialog');
const _zdInput = document.getElementById('zd-input');

function getElZIndex(el) {
  return parseInt(el.style.zIndex) || parseInt(getComputedStyle(el).zIndex) || 0;
}

function showContextMenu(el, x, y) {
  hideAll();
  _selectedEditable = el;
  el.classList.add('selected');
  _ctxMenu.style.left = x + 'px';
  _ctxMenu.style.top = y + 'px';
  _ctxMenu.style.display = 'block';
}

function openZIndexDialog() {
  _ctxMenu.style.display = 'none';
  if (!_selectedEditable) return;
  _zdInput.value = getElZIndex(_selectedEditable);
  // メニューがあった位置に表示
  _zDialog.style.left = _ctxMenu.style.left;
  _zDialog.style.top = _ctxMenu.style.top;
  _zDialog.style.display = 'block';
}

function hideAll() {
  _ctxMenu.style.display = 'none';
  _zDialog.style.display = 'none';
  if (_selectedEditable) {
    _selectedEditable.classList.remove('selected');
    _selectedEditable = null;
  }
}

function editZIndex(delta) {
  if (!_selectedEditable) return;
  const newZ = Math.max(0, Math.min(100, getElZIndex(_selectedEditable) + delta));
  _selectedEditable.style.zIndex = newZ;
  _zdInput.value = newZ;
  scheduleSave();
}

function setZIndexDirect(val) {
  if (!_selectedEditable) return;
  const newZ = Math.max(0, Math.min(100, parseInt(val) || 0));
  _selectedEditable.style.zIndex = newZ;
  _zdInput.value = newZ;
  scheduleSave();
}

// メニュー/ダイアログ外クリックで閉じる
document.addEventListener('mousedown', (e) => {
  if (!_ctxMenu.contains(e.target) && !_zDialog.contains(e.target)) {
    hideAll();
  }
});

function setupEditable(el) {
  if (!el.querySelector('.edit-label')) {
    const label = document.createElement('div');
    label.className = 'edit-label';
    label.textContent = el.dataset.editable;
    el.appendChild(label);
  }
  if (!el.querySelector('.resize-handle')) {
    const handle = document.createElement('div');
    handle.className = 'resize-handle se';
    el.appendChild(handle);
  }

  el.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    showContextMenu(el, e.clientX, e.clientY);
  });

  el.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('resize-handle')) return;
    if (e.button !== 0) return;
    e.preventDefault();
    el.classList.add('dragging');
    const startX = e.clientX, startY = e.clientY;
    const origLeft = el.offsetLeft, origTop = el.offsetTop;
    let didDrag = false;

    function onMove(e) {
      didDrag = true;
      el.style.left = ((origLeft + e.clientX - startX) / window.innerWidth * 100) + '%';
      el.style.top = ((origTop + e.clientY - startY) / window.innerHeight * 100) + '%';
      el.style.transform = 'none';
    }
    function onUp() {
      el.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      if (didDrag) scheduleSave();
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  const handle = el.querySelector('.resize-handle.se');
  if (handle) {
    handle.addEventListener('mousedown', (e) => {
      e.preventDefault(); e.stopPropagation();
      const startX = e.clientX, startY = e.clientY;
      const origW = el.offsetWidth, origH = el.offsetHeight;

      function onMove(e) {
        el.style.width = ((origW + e.clientX - startX) / window.innerWidth * 100) + '%';
        el.style.height = ((origH + e.clientY - startY) / window.innerHeight * 100) + '%';
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        scheduleSave();
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }
}

function scheduleSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(editSave, 500);
}

async function editSave() {
  const overlaySettings = {};
  const avatarArea = document.getElementById('avatar-area');
  overlaySettings.avatar = {
    positionX: parseFloat(avatarArea.style.left) || 73.25,
    positionY: parseFloat(avatarArea.style.top) || 62.15,
    zIndex: parseInt(avatarArea.style.zIndex) || 5,
  };
  overlaySettings.subtitle = {
    zIndex: parseInt(subtitleEl.style.zIndex) || 20,
  };
  overlaySettings.todo = {
    positionX: parseFloat(todoPanelEl.style.left) || 50,
    positionY: parseFloat(todoPanelEl.style.top) || 16,
    width: parseFloat(todoPanelEl.style.width) || 28,
    zIndex: parseInt(todoPanelEl.style.zIndex) || 20,
  };
  if (todoPanelEl.style.height && todoPanelEl.style.height !== 'auto') {
    overlaySettings.todo.height = parseFloat(todoPanelEl.style.height);
  }
  overlaySettings.topic = {
    positionX: parseFloat(topicPanelEl.style.left) || 1.04,
    positionY: parseFloat(topicPanelEl.style.top) || 1.85,
    zIndex: parseInt(topicPanelEl.style.zIndex) || 20,
  };

  try {
    await fetch('/api/overlay/settings', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(overlaySettings),
    });
  } catch (e) { console.log('レイアウト保存エラー:', e.message); }

  for (const [id, el] of Object.entries(captureLayers)) {
    const layout = {
      x: parseFloat(el.style.left) || 0,
      y: parseFloat(el.style.top) || 0,
      width: parseFloat(el.style.width) || 40,
      height: parseFloat(el.style.height) || 50,
      zIndex: parseInt(el.style.zIndex) || 10,
    };
    try {
      await fetch(`/api/capture/${id}/layout`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(layout),
      });
    } catch (e) {}
  }
}

async function editLoadWindows() {
  const sel = document.getElementById('edit-window-list');
  sel.innerHTML = '<option value="">-- ウィンドウ追加 --</option>';
  try {
    const res = await fetch('/api/capture/windows');
    const windows = await res.json();
    for (const w of windows) {
      const opt = document.createElement('option');
      opt.value = w.sourceId;
      opt.textContent = w.name.substring(0, 50);
      sel.appendChild(opt);
    }
  } catch (e) { console.log('ウィンドウ一覧取得エラー:', e.message); }
}

async function editAddCapture() {
  const sel = document.getElementById('edit-window-list');
  const sourceId = sel.value;
  if (!sourceId) return;
  const label = sel.selectedOptions[0]?.textContent || '';
  try {
    await fetch('/api/capture/start', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ sourceId, label }),
    });
  } catch (e) { console.log('キャプチャ開始エラー:', e.message); }
}

function initEditMode() {
  document.body.classList.add('edit-mode');
  document.querySelectorAll('[data-editable]').forEach(setupEditable);
  editLoadWindows();
  setInterval(editLoadWindows, 10000);
}

function exitEditMode() {
  editSave();
  document.body.classList.remove('edit-mode');
  // リサイズハンドル・編集ラベルを除去
  document.querySelectorAll('.resize-handle, .edit-label').forEach(el => el.remove());
}

// === 初期化 ===
async function init() {
  // オーバーレイ設定読み込み
  try {
    const res = await fetch('/api/overlay/settings');
    const s = await res.json();
    applySettings(s);
  } catch (e) {
    console.log('設定読み込みスキップ:', e.message);
  }

  // 音量設定読み込み
  try {
    const res = await fetch('/api/broadcast/volumes');
    const v = await res.json();
    if (v.master != null) volumes.master = v.master;
    if (v.tts != null) volumes.tts = v.tts;
    if (v.bgm != null) volumes.bgm = v.bgm;
    applyVolume();
  } catch (e) {
    console.log('音量設定読み込みスキップ:', e.message);
  }

  // アバターストリーム復元
  try {
    const res = await fetch('/api/broadcast/avatar');
    const av = await res.json();
    if (av.url) setAvatarStream(av.url);
  } catch (e) {}

  // キャプチャソース読み込み
  try {
    const res = await fetch('/api/capture/sources');
    const sources = await res.json();
    for (const s of sources) {
      addCaptureLayer(s.id, s.stream_url, s.label || s.name || s.id, s.layout);
    }
  } catch (e) { console.log('キャプチャ読み込みスキップ:', e.message); }

  await loadTodo();
  await loadTopicPanel();
  setInterval(loadTodo, 30000);
  setInterval(loadTopicPanel, 15000);
  connectWS();

  if (isEditMode) initEditMode();

  // 編集モード時: 配信状態ポーリング
  if (isEditMode) {
    updateBroadcastStatus();
    setInterval(updateBroadcastStatus, 3000);
  }
}

// === 配信制御（編集モード用） ===
async function updateBroadcastStatus() {
  try {
    const res = await fetch('/api/broadcast/status');
    const st = await res.json();
    const label = document.getElementById('broadcast-status-label');
    const goBtn = document.getElementById('go-live-btn');
    const stopBtn = document.getElementById('stop-btn');
    if (!label) return;
    const info = document.getElementById('stream-info');
    if (st.streaming) {
      label.textContent = 'LIVE';
      label.style.color = '#f44336';
      goBtn.style.display = 'none';
      stopBtn.style.display = '';
      const mins = Math.floor((st.uptime_seconds || 0) / 60);
      const secs = Math.floor((st.uptime_seconds || 0) % 60);
      info.textContent = `${st.resolution} ${st.framerate}fps | ${mins}:${String(secs).padStart(2,'0')}`;
    } else {
      label.textContent = 'PREVIEW';
      label.style.color = '#eee';
      goBtn.style.display = '';
      stopBtn.style.display = 'none';
      info.textContent = '';
    }
  } catch (e) {}
}

async function goLive() {
  const btn = document.getElementById('go-live-btn');
  btn.textContent = '起動中...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/broadcast/go-live', { method: 'POST' });
    const data = await res.json();
    if (!data.ok) alert('配信開始失敗: ' + (data.detail || ''));
    updateBroadcastStatus();
  } catch (e) {
    alert('配信開始失敗: ' + e.message);
  } finally {
    btn.textContent = 'Go Live';
    btn.disabled = false;
  }
}

async function stopLive() {
  if (!confirm('配信を停止しますか？')) return;
  try {
    await fetch('/api/broadcast/stop', { method: 'POST' });
    updateBroadcastStatus();
  } catch (e) {
    alert('配信停止失敗: ' + e.message);
  }
}

init();
</script>
