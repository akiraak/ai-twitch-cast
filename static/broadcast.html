<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI Twitch Cast - Broadcast</title>
<link rel="stylesheet" href="/static/css/broadcast.css">
<script src="/static/js/lib/api-client.js"></script>
<script src="/static/js/lib/text-variables.js"></script>
</head>
<body>
<script>
// console.logキャプチャ → サーバー送信
(function() {
  const _buf = [];
  const _orig = console.log;
  const _origWarn = console.warn;
  const _origErr = console.error;
  function capture(level, args) {
    const line = '[' + level + '] ' + Array.from(args).map(a => {
      try { return typeof a === 'object' ? JSON.stringify(a) : String(a); } catch(e) { return String(a); }
    }).join(' ');
    _buf.push(new Date().toISOString().substr(11,12) + ' ' + line);
  }
  console.log = function() { capture('LOG', arguments); _orig.apply(console, arguments); };
  console.warn = function() { capture('WARN', arguments); _origWarn.apply(console, arguments); };
  console.error = function() { capture('ERR', arguments); _origErr.apply(console, arguments); };
  setInterval(function() {
    if (_buf.length === 0) return;
    const lines = _buf.splice(0, 100);
    fetch('/api/debug/jslog', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({lines}) }).catch(function(){});
  }, 2000);
})();
</script>

<!-- 右クリックメニュー -->
<div class="edit-context-menu" id="edit-context-menu">
  <div class="ctx-item" onclick="openSettingsPanel()">設定を編集...</div>
  <div class="ctx-item" onclick="openZIndexDialog()">Z順序を変更...</div>
  <div class="ctx-item" id="ctx-add-child" onclick="addChildPanelToSelected()">テキスト子パネルを追加</div>
  <div class="ctx-item ctx-danger" id="ctx-delete-child" onclick="deleteSelectedChildPanel()">この子パネルを削除</div>
</div>

<!-- フローティング設定パネル -->
<div class="settings-panel" id="settings-panel">
  <div class="sp-header" id="sp-header">
    <span class="sp-title" id="sp-title">設定</span>
    <button class="sp-close" onclick="closeSettingsPanel()">&times;</button>
  </div>
  <div class="sp-body" id="sp-body"></div>
</div>

<!-- Z値ダイアログ -->
<div class="zindex-dialog" id="zindex-dialog">
  <div class="zd-row">
    <button onclick="editZIndex(-1)">▼</button>
    <input type="number" id="zd-input" min="0" max="100" step="1" onchange="setZIndexDirect(this.value)">
    <button onclick="editZIndex(1)">▲</button>
  </div>
  <div class="zd-shortcuts">
    <button onclick="setZIndexDirect(0)">最背面</button>
    <button onclick="setZIndexDirect(100)">最前面</button>
  </div>
</div>

<!-- 背景画像（APIから選択済み背景を取得、なければデフォルト） -->
<img id="background" src="/resources/images/background.png" alt="">
<script>
(async () => {
  try {
    const res = await fetch('/api/files/background/list');
    const data = await res.json();
    if (data.ok && data.active) {
      document.getElementById('background').src = '/resources/images/backgrounds/' + data.active;
    }
  } catch (e) {}
})();
</script>

<!-- キャプチャレイヤーコンテナ -->
<div id="capture-container"></div>

<!-- カスタムテキストコンテナ -->
<div id="custom-text-container"></div>

<!-- メインシーン -->
<div>
  <!-- アバター（Three.js VRMレンダリング） -->
  <div id="avatar-area" data-editable="avatar">
    <canvas id="avatar-canvas"></canvas>
    <img id="avatar-stream" style="display:none;" alt="">
  </div>

  <!-- 字幕 -->
  <div id="subtitle" data-editable="subtitle">
    <div class="comment"><span class="author"></span><span class="trigger-text"></span></div>
    <div class="speech"></div>
    <div class="english"></div>
  </div>

  <!-- TODOパネル -->
  <div id="todo-panel" data-editable="todo">
    <div class="todo-title">TODO</div>
    <div id="todo-list"></div>
  </div>

  <!-- トピックパネル -->
  <div id="topic-panel" data-editable="topic">
    <div class="topic-header">
      <span class="topic-dot" id="topic-dot"></span>
      <span class="topic-label">TOPIC</span>
    </div>
    <div class="topic-body">
      <div class="topic-title" id="topic-title-text"></div>
      <div class="topic-desc" id="topic-desc-text"></div>
      <div class="topic-stats" id="topic-stats"></div>
    </div>
  </div>
</div>


<!-- 音声はすべてC#アプリが再生（ブラウザでは再生しない） -->

<!-- Three.js + three-vrm -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.3.3/lib/three-vrm.module.min.js"
  }
}
</script>

<script type="module" src="/static/js/avatar-renderer.js?v=expr1"></script>
<script src="/static/js/broadcast-main.js?v=expr1"></script>
</body>
</html>
