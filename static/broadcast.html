<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI Twitch Cast - Broadcast</title>
<link rel="stylesheet" href="/static/css/broadcast.css">
</head>
<body>

<!-- フローティング設定パネル（右クリックで直接表示） -->
<div class="settings-panel" id="settings-panel">
  <div class="sp-header" id="sp-header">
    <span class="sp-title" id="sp-title">設定</span>
    <button class="sp-close" onclick="closeSettingsPanel()">&times;</button>
  </div>
  <div class="sp-actions" id="sp-actions"></div>
  <div class="sp-body" id="sp-body"></div>
</div>

<!-- 背景画像（APIから選択済み背景を取得、なければデフォルト） -->
<img id="background" src="/resources/images/background.png" alt="">

<!-- キャプチャレイヤーコンテナ -->
<div id="capture-container"></div>

<!-- カスタムテキストコンテナ -->
<div id="custom-text-container"></div>

<!-- メインシーン -->
<div>
  <!-- 生徒アバター（左側、授業モード時のみ表示） -->
  <div id="avatar-area-2" data-editable="avatar2" style="display:none;">
    <canvas id="avatar-canvas-2"></canvas>
  </div>

  <!-- 先生アバター（右側、従来位置） -->
  <div id="avatar-area-1" data-editable="avatar1">
    <canvas id="avatar-canvas-1"></canvas>
    <img id="avatar-stream" style="display:none;" alt="">
  </div>

  <!-- 字幕（メイン） -->
  <div id="subtitle" class="subtitle-panel" data-editable="subtitle" data-speaker="teacher">
    <div class="comment"><span class="author"></span><span class="trigger-text"></span></div>
    <div class="speech"></div>
    <div class="translation"></div>
  </div>
  <!-- 字幕（サブ） -->
  <div id="subtitle-2" class="subtitle-panel" data-editable="subtitle2" data-speaker="student">
    <div class="comment"><span class="author"></span><span class="trigger-text"></span></div>
    <div class="speech"></div>
    <div class="translation"></div>
  </div>

  <!-- TODOパネル -->
  <div id="todo-panel" data-editable="todo">
    <div class="todo-title">TODO</div>
    <div id="todo-list"></div>
  </div>

  <!-- 授業タイトルパネル -->
  <div id="lesson-title-panel" data-editable="lesson_title" data-managed-visibility style="display:none;">
    <div id="lesson-title-text"></div>
  </div>

  <!-- 授業テキストパネル -->
  <div id="lesson-text-panel" data-editable="lesson_text" data-managed-visibility style="display:none;">
    <div id="lesson-text-content"></div>
  </div>

  <!-- 授業進捗パネル -->
  <div id="lesson-progress-panel" data-editable="lesson_progress" data-managed-visibility style="display:none;">
    <div id="lesson-progress-title">授業の流れ</div>
    <div id="lesson-progress-list"></div>
  </div>

</div>


<!-- 音声はすべてC#アプリが再生（ブラウザでは再生しない） -->

<!-- Three.js + three-vrm -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.3.3/lib/three-vrm.module.min.js"
  }
}
</script>

<!-- 共通ライブラリ -->
<script src="/static/js/lib/api-client.js"></script>
<script src="/static/js/lib/text-variables.js"></script>

<!-- broadcast モジュール（読み込み順序重要） -->
<script src="/static/js/broadcast/globals.js"></script>
<script src="/static/js/broadcast/style-utils.js"></script>
<script src="/static/js/broadcast/panels.js"></script>
<script src="/static/js/broadcast/capture.js"></script>
<script src="/static/js/broadcast/custom-text.js"></script>
<script src="/static/js/broadcast/child-panel.js"></script>
<script src="/static/js/broadcast/settings.js"></script>
<script src="/static/js/broadcast/settings-panel.js"></script>
<script src="/static/js/broadcast/edit-mode.js"></script>
<script src="/static/js/broadcast/websocket.js"></script>
<script src="/static/js/broadcast/init.js"></script>

<!-- VRMアバター（ES Module） -->
<script type="module" src="/static/js/avatar-renderer.js?v=multi1"></script>
</body>
</html>
