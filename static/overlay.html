<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; width: 1920px; height: 1080px; position: relative; overflow: hidden; font-family: "Noto Sans JP", "Yu Gothic UI", "Meiryo", sans-serif; }

  /* リアルタイム字幕（下中央） */
  #subtitle {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: linear-gradient(135deg, rgba(20, 20, 40, 0.85), rgba(30, 20, 50, 0.85));
    border: 1px solid rgba(124, 77, 255, 0.3);
    border-radius: 16px;
    padding: 20px 32px;
    max-width: 1200px;
    min-width: 400px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
    backdrop-filter: blur(8px);
  }
  #subtitle.visible { opacity: 1; }
  #subtitle.fading { opacity: 0; transition: opacity 1.5s ease; }

  #subtitle .comment {
    display: none;
  }
  #subtitle .response {
    font-size: 36px;
    color: #ffffff;
    font-weight: bold;
    margin-bottom: 10px;
    line-height: 1.5;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7), 0 0 20px rgba(124, 77, 255, 0.2);
    letter-spacing: 0.5px;
  }
  #subtitle .english {
    font-size: 20px;
    color: #b2dfdb;
    font-style: italic;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
  }

  /* 履歴パネル（右上） */
  #history {
    position: absolute;
    top: 30px;
    right: 30px;
    z-index: 20;
    width: 420px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .history-item {
    background: linear-gradient(135deg, rgba(20, 20, 40, 0.75), rgba(30, 20, 50, 0.75));
    border-radius: 10px;
    padding: 12px 16px;
    border-left: 3px solid #7c4dff;
    animation: slideIn 0.3s ease;
    backdrop-filter: blur(4px);
  }
  .history-item .comment {
    font-size: 13px;
    color: #90a4ae;
    margin-bottom: 6px;
    padding-bottom: 5px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  .history-item .comment .author {
    color: #4fc3f7;
    font-weight: bold;
  }
  .history-item .response {
    font-size: 16px;
    color: #e0e0e0;
    font-weight: bold;
    margin-bottom: 4px;
    line-height: 1.4;
  }
  .history-item .english {
    font-size: 12px;
    color: #80cbc4;
    font-style: italic;
  }

  /* 古いアイテムは薄く */
  .history-item:nth-child(3) { opacity: 0.85; }
  .history-item:nth-child(4) { opacity: 0.65; }
  .history-item:nth-child(5) { opacity: 0.45; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* TODOパネル（中央） */
  #todo-panel {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: linear-gradient(135deg, rgba(15, 15, 35, 0.92), rgba(25, 15, 45, 0.92));
    border: 1px solid rgba(124, 77, 255, 0.4);
    border-radius: 20px;
    padding: 32px 40px;
    min-width: 500px;
    max-width: 800px;
    max-height: 780px;
    overflow: hidden;
    backdrop-filter: blur(12px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  #todo-panel.visible { opacity: 1; }

  #todo-panel .todo-title {
    font-size: 28px;
    font-weight: bold;
    color: #b388ff;
    text-align: center;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid rgba(124, 77, 255, 0.3);
    text-shadow: 0 0 12px rgba(124, 77, 255, 0.4);
  }

  #todo-panel .todo-item {
    font-size: 20px;
    color: #e0e0e0;
    padding: 8px 0;
    padding-left: 8px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    line-height: 1.5;
  }
  #todo-panel .todo-item:last-child { border-bottom: none; }

  #todo-panel .todo-checkbox {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid #7c4dff;
    border-radius: 4px;
    margin-right: 10px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }
  #todo-panel .todo-item.done .todo-checkbox {
    background: #7c4dff;
  }
  #todo-panel .todo-item.done .todo-checkbox::after {
    content: '✓';
    color: #fff;
    font-size: 13px;
    position: absolute;
    top: -2px;
    left: 2px;
  }
  #todo-panel .todo-item.done .todo-text {
    text-decoration: line-through;
    color: #666;
  }
  #todo-panel .todo-sub {
    font-size: 16px;
    color: #9e9e9e;
    padding: 4px 0 4px 36px;
  }
</style>
</head>
<body>

<div id="subtitle">
  <div class="comment"><span class="author"></span><span class="message"></span></div>
  <div class="response"></div>
  <div class="english"></div>
</div>

<div id="history"></div>

<div id="todo-panel">
  <div class="todo-title">📋 TODO</div>
  <div class="todo-list"></div>
</div>

<script>
const subtitleEl = document.getElementById('subtitle');
const historyEl = document.getElementById('history');
let fadeTimer = null;
let maxItems = 5;

// 設定を読み込み
async function loadSettings() {
  try {
    const res = await fetch('/api/overlay/settings');
    const s = await res.json();
    applySettings(s);
  } catch (e) {
    console.log('設定読み込みスキップ:', e.message);
  }
}

function applySettings(s) {
  if (s.subtitle) {
    if (s.subtitle.bottom != null) subtitleEl.style.bottom = s.subtitle.bottom + 'px';
    if (s.subtitle.fontSize != null) subtitleEl.querySelector('.response').style.fontSize = s.subtitle.fontSize + 'px';
    if (s.subtitle.fadeDuration != null) subtitleEl.dataset.fadeDuration = s.subtitle.fadeDuration;
  }
  if (s.history) {
    if (s.history.top != null) historyEl.style.top = s.history.top + 'px';
    if (s.history.right != null) historyEl.style.right = s.history.right + 'px';
    if (s.history.fontSize != null) {
      historyEl.style.setProperty('--history-font-size', s.history.fontSize + 'px');
    }
    if (s.history.maxItems != null) maxItems = s.history.maxItems;
  }
}

function showSubtitle(data) {
  clearTimeout(fadeTimer);
  subtitleEl.classList.remove('fading');

  subtitleEl.querySelector('.author').textContent = '';
  subtitleEl.querySelector('.message').textContent = data.message;
  subtitleEl.querySelector('.response').textContent = data.response;
  subtitleEl.querySelector('.english').textContent = data.english || '';

  subtitleEl.classList.add('visible');
}

function fadeSubtitle() {
  const duration = parseFloat(subtitleEl.dataset.fadeDuration || 3) * 1000;
  fadeTimer = setTimeout(() => {
    subtitleEl.classList.add('fading');
    subtitleEl.classList.remove('visible');
  }, duration);
}

function addHistory(data) {
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `
    <div class="comment"><span class="author">${esc(data.author)}: </span>${esc(data.message)}</div>
    <div class="response">${esc(data.response)}</div>
    <div class="english">${esc(data.english || '')}</div>
  `;

  // 先頭に追加
  historyEl.insertBefore(item, historyEl.firstChild);

  // 最大件数を超えたら削除
  while (historyEl.children.length > maxItems) {
    historyEl.removeChild(historyEl.lastChild);
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// TODOパネル
const todoPanel = document.getElementById('todo-panel');
const todoList = todoPanel.querySelector('.todo-list');

async function loadTodo() {
  try {
    const res = await fetch('/api/todo');
    const data = await res.json();
    renderTodo(data.content);
  } catch (e) {
    console.log('TODO読み込みスキップ:', e.message);
  }
}

function renderTodo(markdown) {
  todoList.innerHTML = '';
  const lines = markdown.split('\n');
  for (const line of lines) {
    // "# TODO" タイトル行はスキップ
    if (/^#\s/.test(line)) continue;
    // 空行スキップ
    if (!line.trim()) continue;

    // メインタスク: "- [ ] テキスト" or "- [x] テキスト"
    const taskMatch = line.match(/^- \[([ x])\] (.+)/);
    if (taskMatch) {
      const done = taskMatch[1] === 'x';
      const text = taskMatch[2];
      const el = document.createElement('div');
      el.className = 'todo-item' + (done ? ' done' : '');
      el.innerHTML = `<span class="todo-checkbox"></span><span class="todo-text">${esc(text)}</span>`;
      todoList.appendChild(el);
      continue;
    }

    // サブタスク: インデント付きテキスト
    const subMatch = line.match(/^\s{2,}(.+)/);
    if (subMatch) {
      const el = document.createElement('div');
      el.className = 'todo-sub';
      el.textContent = subMatch[1];
      todoList.appendChild(el);
    }
  }
}

function toggleTodo() {
  if (todoPanel.classList.contains('visible')) {
    todoPanel.classList.remove('visible');
  } else {
    loadTodo().then(() => todoPanel.classList.add('visible'));
  }
}

// WebSocket接続
function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${protocol}//${location.host}/ws/overlay`);

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === 'comment') {
      showSubtitle(data);
      addHistory(data);
    } else if (data.type === 'speaking_end') {
      fadeSubtitle();
    } else if (data.type === 'settings_update') {
      applySettings(data);
    } else if (data.type === 'todo_toggle') {
      toggleTodo();
    }
  };

  ws.onclose = () => {
    // 再接続
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    ws.close();
  };
}

loadSettings();
connectWS();
</script>

</body>
</html>
