<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; width: 1920px; height: 1080px; position: relative; overflow: hidden; font-family: "Noto Sans JP", "Yu Gothic UI", "Meiryo", sans-serif; }

  /* リアルタイム字幕（下中央） */
  #subtitle {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: linear-gradient(135deg, rgba(20, 20, 40, 0.85), rgba(30, 20, 50, 0.85));
    border: 1px solid rgba(124, 77, 255, 0.3);
    border-radius: 16px;
    padding: 20px 32px;
    max-width: 1200px;
    min-width: 400px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
    backdrop-filter: blur(8px);
  }
  #subtitle.visible { opacity: 1; }
  #subtitle.fading { opacity: 0; transition: opacity 1.5s ease; }

  #subtitle .comment {
    display: none;
  }
  #subtitle .response {
    font-size: 36px;
    color: #ffffff;
    font-weight: bold;
    margin-bottom: 10px;
    line-height: 1.5;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7), 0 0 20px rgba(124, 77, 255, 0.2);
    letter-spacing: 0.5px;
  }
  #subtitle .english {
    font-size: 20px;
    color: #b2dfdb;
    font-style: italic;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
  }

  /* 履歴パネル（右上） */
  #history {
    position: absolute;
    top: 30px;
    right: 30px;
    z-index: 20;
    width: 420px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .history-item {
    background: linear-gradient(135deg, rgba(20, 20, 40, 0.75), rgba(30, 20, 50, 0.75));
    border-radius: 10px;
    padding: 12px 16px;
    border-left: 3px solid #7c4dff;
    animation: slideIn 0.3s ease;
    backdrop-filter: blur(4px);
  }
  .history-item .comment {
    font-size: 13px;
    color: #90a4ae;
    margin-bottom: 6px;
    padding-bottom: 5px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  .history-item .comment .author {
    color: #4fc3f7;
    font-weight: bold;
  }
  .history-item .response {
    font-size: 16px;
    color: #e0e0e0;
    font-weight: bold;
    margin-bottom: 4px;
    line-height: 1.4;
  }
  .history-item .english {
    font-size: 12px;
    color: #80cbc4;
    font-style: italic;
  }

  /* 古いアイテムは薄く */
  .history-item:nth-child(3) { opacity: 0.85; }
  .history-item:nth-child(4) { opacity: 0.65; }
  .history-item:nth-child(5) { opacity: 0.45; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* TODOパネル（中央） */
  #todo-panel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    width: 460px;
    background: linear-gradient(135deg, rgba(5, 5, 15, 0.95), rgba(10, 5, 20, 0.95));
    border: 1px solid rgba(124, 77, 255, 0.3);
    border-radius: 12px;
    padding: 16px 20px;
    backdrop-filter: blur(6px);
    pointer-events: none;
  }
  #todo-panel .todo-title {
    font-size: 18px;
    font-weight: bold;
    color: #7c4dff;
    margin-bottom: 12px;
    letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(124, 77, 255, 0.4);
  }
  #todo-panel .todo-item {
    font-size: 15px;
    color: #e0e0e0;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    line-height: 1.5;
  }
  #todo-panel .todo-item:last-child {
    border-bottom: none;
  }
  #todo-panel .todo-item::before {
    content: "\2610 ";
    color: #7c4dff;
    font-size: 14px;
  }

  /* 現在の作業パネル（下部） */
  #current-task {
    position: absolute;
    bottom: 20px;
    left: 30px;
    z-index: 20;
    max-width: 900px;
    background: linear-gradient(135deg, rgba(5, 5, 15, 0.92), rgba(15, 10, 30, 0.92));
    border: 1px solid rgba(77, 208, 255, 0.3);
    border-left: 3px solid #4dd0e1;
    border-radius: 10px;
    padding: 12px 18px;
    backdrop-filter: blur(6px);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  #current-task.visible { opacity: 1; }
  #current-task .task-label {
    font-size: 12px;
    color: #4dd0e1;
    font-weight: bold;
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-shadow: 0 0 8px rgba(77, 208, 255, 0.4);
  }
  #current-task .task-text {
    font-size: 18px;
    color: #e0e0e0;
    line-height: 1.5;
    word-break: break-word;
  }

</style>
</head>
<body>

<div id="subtitle">
  <div class="comment"><span class="author"></span><span class="message"></span></div>
  <div class="response"></div>
  <div class="english"></div>
</div>

<div id="todo-panel">
  <div class="todo-title">TODO</div>
  <div id="todo-list"></div>
</div>

<div id="current-task">
  <div class="task-label">CURRENT TASK</div>
  <div class="task-text"></div>
</div>

<div id="history"></div>

<script>
const subtitleEl = document.getElementById('subtitle');
const historyEl = document.getElementById('history');
const todoPanelEl = document.getElementById('todo-panel');
const todoListEl = document.getElementById('todo-list');
let fadeTimer = null;
let maxItems = 5;

// TODO設定を保持
let todoSettings = {};

function applySettings(s) {
  if (s.subtitle) {
    if (s.subtitle.bottom != null) subtitleEl.style.bottom = s.subtitle.bottom + 'px';
    if (s.subtitle.fontSize != null) subtitleEl.querySelector('.response').style.fontSize = s.subtitle.fontSize + 'px';
    if (s.subtitle.fadeDuration != null) subtitleEl.dataset.fadeDuration = s.subtitle.fadeDuration;
  }
  if (s.history) {
    if (s.history.top != null) historyEl.style.top = s.history.top + 'px';
    if (s.history.right != null) historyEl.style.right = s.history.right + 'px';
    if (s.history.fontSize != null) {
      historyEl.style.setProperty('--history-font-size', s.history.fontSize + 'px');
    }
    if (s.history.maxItems != null) maxItems = s.history.maxItems;
  }
  if (s.todo) {
    todoSettings = s.todo;
    if (s.todo.width != null) todoPanelEl.style.width = s.todo.width + 'px';
    if (s.todo.height) {
      todoPanelEl.style.height = s.todo.height + 'px';
      todoPanelEl.style.overflowY = 'auto';
    } else {
      todoPanelEl.style.height = '';
      todoPanelEl.style.overflowY = '';
    }
    if (s.todo.titleFontSize != null) todoPanelEl.querySelector('.todo-title').style.fontSize = s.todo.titleFontSize + 'px';
    if (s.todo.positionX != null || s.todo.positionY != null) {
      const x = s.todo.positionX ?? 960;
      const y = s.todo.positionY ?? 540;
      todoPanelEl.style.left = x + 'px';
      todoPanelEl.style.top = y + 'px';
    }
    // 既存のTODOアイテムにもフォントサイズを適用
    if (s.todo.fontSize != null) {
      todoPanelEl.querySelectorAll('.todo-item').forEach(el => el.style.fontSize = s.todo.fontSize + 'px');
    }
    // TODOを再読み込みして確実に反映
    loadTodo();
  }
}

function showSubtitle(data) {
  clearTimeout(fadeTimer);
  subtitleEl.classList.remove('fading');

  subtitleEl.querySelector('.author').textContent = '';
  subtitleEl.querySelector('.message').textContent = data.message;
  subtitleEl.querySelector('.response').textContent = data.response;
  subtitleEl.querySelector('.english').textContent = data.english || '';

  subtitleEl.classList.add('visible');
}

function fadeSubtitle() {
  const duration = parseFloat(subtitleEl.dataset.fadeDuration || 3) * 1000;
  fadeTimer = setTimeout(() => {
    subtitleEl.classList.add('fading');
    subtitleEl.classList.remove('visible');
  }, duration);
}

function addHistory(data) {
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `
    <div class="comment"><span class="author">${esc(data.author)}: </span>${esc(data.message)}</div>
    <div class="response">${esc(data.response)}</div>
    <div class="english">${esc(data.english || '')}</div>
  `;

  historyEl.insertBefore(item, historyEl.firstChild);

  while (historyEl.children.length > maxItems) {
    historyEl.removeChild(historyEl.lastChild);
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// 現在の作業表示
const currentTaskEl = document.getElementById('current-task');
const taskTextEl = currentTaskEl.querySelector('.task-text');

function showCurrentTask(task) {
  taskTextEl.textContent = task;
  currentTaskEl.classList.add('visible');
}

// TODO読み込み
async function loadTodo() {
  try {
    const res = await fetch('/api/todo');
    const data = await res.json();
    todoListEl.innerHTML = '';
    const fs = todoSettings.fontSize;
    for (const item of data.items) {
      const div = document.createElement('div');
      div.className = 'todo-item';
      div.textContent = item;
      if (fs) div.style.fontSize = fs + 'px';
      todoListEl.appendChild(div);
    }
  } catch (e) {
    console.log('TODO読み込みエラー:', e.message);
  }
}

// WebSocket接続
function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${protocol}//${location.host}/ws/overlay`);

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === 'comment') {
      showSubtitle(data);
      addHistory(data);
    } else if (data.type === 'speaking_end') {
      fadeSubtitle();
    } else if (data.type === 'current_task') {
      showCurrentTask(data.task);
    } else if (data.type === 'settings_update') {
      applySettings(data);
    }
  };

  ws.onclose = () => {
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    ws.close();
  };
}

// 初期化: 設定を読み込んでからTODOを読み込む
async function init() {
  try {
    const res = await fetch('/api/overlay/settings');
    const s = await res.json();
    applySettings(s);
  } catch (e) {
    console.log('設定読み込みスキップ:', e.message);
  }
  await loadTodo();
  setInterval(loadTodo, 30000);
  connectWS();
}

init();
</script>

</body>
</html>
