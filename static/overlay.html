<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; width: 1920px; height: 1080px; position: relative; overflow: hidden; font-family: "Noto Sans JP", "Yu Gothic UI", "Meiryo", sans-serif; }

  /* リアルタイム字幕（下中央） */
  #subtitle {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: linear-gradient(135deg, rgba(20, 20, 40, 0.85), rgba(30, 20, 50, 0.85));
    border: 1px solid rgba(124, 77, 255, 0.3);
    border-radius: 16px;
    padding: 20px 32px;
    max-width: 1200px;
    min-width: 400px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
    backdrop-filter: blur(8px);
  }
  #subtitle.visible { opacity: 1; }
  #subtitle.fading { opacity: 0; transition: opacity 1.5s ease; }

  #subtitle .comment {
    display: none;
  }
  #subtitle .response {
    font-size: 36px;
    color: #ffffff;
    font-weight: bold;
    margin-bottom: 10px;
    line-height: 1.5;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7), 0 0 20px rgba(124, 77, 255, 0.2);
    letter-spacing: 0.5px;
  }
  #subtitle .english {
    font-size: 20px;
    color: #b2dfdb;
    font-style: italic;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
  }

  /* TODOパネル（中央） */
  #todo-panel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    width: 540px;
    max-height: 70vh;
    overflow: hidden;
    background: linear-gradient(135deg, rgba(0, 0, 0, 0.95), rgba(5, 0, 10, 0.95));
    border: 1px solid rgba(124, 77, 255, 0.3);
    border-radius: 12px;
    padding: 20px 24px;
    backdrop-filter: blur(6px);
    pointer-events: none;
  }
  #todo-panel .todo-title {
    font-size: 28px;
    font-weight: bold;
    color: #ffffff;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  #todo-panel .todo-section {
    font-size: 16px;
    color: rgba(255, 255, 255, 0.6);
    font-weight: bold;
    letter-spacing: 1px;
    margin-top: 10px;
    margin-bottom: 4px;
    padding-top: 6px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }
  #todo-panel .todo-section:first-child {
    margin-top: 0;
    padding-top: 0;
    border-top: none;
  }
  #todo-panel .todo-item {
    color: rgba(255, 255, 255, 0.9);
    font-size: 24px;
    padding: 6px 0;
    line-height: 1.5;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
  }
  #todo-panel .todo-checkbox {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255, 255, 255, 0.5);
    border-radius: 3px;
  }

  /* 作業中アイテム - 強調表示 */
  #todo-panel .todo-item.in-progress {
    color: #ffffff;
    font-weight: bold;
    font-size: 26px;
    padding: 10px 12px;
    margin: 4px -10px;
    background: linear-gradient(90deg, rgba(124, 77, 255, 0.2), rgba(124, 77, 255, 0.05));
    border-radius: 8px;
    border-left: 3px solid #b388ff;
    animation: pulse-glow 2s ease-in-out infinite;
  }
  #todo-panel .todo-item.in-progress .todo-checkbox {
    width: 20px;
    height: 20px;
    background: #7c4dff;
    border-color: #b388ff;
    border-radius: 4px;
    box-shadow: 0 0 8px rgba(124, 77, 255, 0.5);
  }
  #todo-panel .todo-item.in-progress .todo-arrow {
    color: #b388ff;
    font-size: 18px;
    animation: arrow-bounce 1.2s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0px rgba(124, 77, 255, 0); }
    50% { box-shadow: 0 0 12px rgba(124, 77, 255, 0.15); }
  }
  @keyframes arrow-bounce {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(3px); }
  }

  /* 情報パネル（左上） */
  #info-panel {
    display: none; /* 一時的に非表示 */
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 20;
    max-width: 600px;
    min-width: 280px;
    background: linear-gradient(135deg, rgba(0, 0, 0, 0.95), rgba(5, 0, 10, 0.95));
    border: 1px solid rgba(77, 208, 255, 0.25);
    border-radius: 10px;
    padding: 0;
    backdrop-filter: blur(6px);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
    overflow: hidden;
  }
  #info-panel.visible { opacity: 1; }
  #info-panel .info-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: linear-gradient(90deg, rgba(77, 208, 225, 0.15), transparent);
    border-bottom: 1px solid rgba(77, 208, 255, 0.1);
  }
  #info-panel .info-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4dd0e1;
    box-shadow: 0 0 6px rgba(77, 208, 255, 0.6);
    animation: dot-pulse 2s ease-in-out infinite;
  }
  @keyframes dot-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  #info-panel .info-label {
    font-size: 15px;
    color: #4dd0e1;
    font-weight: bold;
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(77, 208, 255, 0.3);
  }
  #info-panel .info-body {
    padding: 10px 14px;
  }
  #info-panel .info-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 4px 0;
  }
  #info-panel .info-row:not(:last-child) {
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }
  #info-panel .info-icon {
    font-size: 20px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  #info-panel .info-text {
    font-size: 22px;
    color: #f0f0f0;
    line-height: 1.5;
    word-break: break-word;
  }
  #info-panel .info-time {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.45);
    margin-left: auto;
    flex-shrink: 0;
    margin-top: 3px;
  }

</style>
</head>
<body>

<div id="subtitle">
  <div class="comment"><span class="author"></span><span class="message"></span></div>
  <div class="response"></div>
  <div class="english"></div>
</div>

<div id="todo-panel">
  <div class="todo-title">TODO</div>
  <div id="todo-list"></div>
</div>

<div id="info-panel">
  <div class="info-header">
    <span class="info-dot"></span>
    <span class="info-label">ACTIVITY</span>
  </div>
  <div class="info-body" id="info-body"></div>
</div>


<script>
const subtitleEl = document.getElementById('subtitle');
const todoPanelEl = document.getElementById('todo-panel');
const todoListEl = document.getElementById('todo-list');
let fadeTimer = null;

// TODO設定を保持
let todoSettings = {};

function applySettings(s) {
  if (s.subtitle) {
    if (s.subtitle.bottom != null) subtitleEl.style.bottom = s.subtitle.bottom + 'px';
    if (s.subtitle.fontSize != null) subtitleEl.querySelector('.response').style.fontSize = s.subtitle.fontSize + 'px';
    if (s.subtitle.fadeDuration != null) subtitleEl.dataset.fadeDuration = s.subtitle.fadeDuration;
  }
  if (s.todo) {
    todoSettings = s.todo;
    if (s.todo.width != null) todoPanelEl.style.width = s.todo.width + 'px';
    if (s.todo.height) {
      todoPanelEl.style.height = s.todo.height + 'px';
      todoPanelEl.style.overflowY = 'hidden';
    } else {
      todoPanelEl.style.height = '';
      todoPanelEl.style.overflowY = '';
    }
    if (s.todo.titleFontSize != null) todoPanelEl.querySelector('.todo-title').style.fontSize = s.todo.titleFontSize + 'px';
    if (s.todo.positionX != null || s.todo.positionY != null) {
      const x = s.todo.positionX ?? 960;
      const y = s.todo.positionY ?? 540;
      todoPanelEl.style.left = x + 'px';
      todoPanelEl.style.top = y + 'px';
      todoPanelEl.style.transform = 'none';
    }
    // 既存のTODOアイテムにもフォントサイズを適用
    if (s.todo.fontSize != null) {
      todoPanelEl.querySelectorAll('.todo-item').forEach(el => el.style.fontSize = s.todo.fontSize + 'px');
    }
    // TODOを再読み込みして確実に反映
    loadTodo();
  }
}

function showSubtitle(data) {
  clearTimeout(fadeTimer);
  subtitleEl.classList.remove('fading');

  subtitleEl.querySelector('.author').textContent = '';
  subtitleEl.querySelector('.message').textContent = data.message;
  subtitleEl.querySelector('.response').textContent = data.response;
  subtitleEl.querySelector('.english').textContent = data.english || '';

  subtitleEl.classList.add('visible');
}

function fadeSubtitle() {
  const duration = parseFloat(subtitleEl.dataset.fadeDuration || 3) * 1000;
  fadeTimer = setTimeout(() => {
    subtitleEl.classList.add('fading');
    subtitleEl.classList.remove('visible');
  }, duration);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// 情報パネル（左上）
const infoPanelEl = document.getElementById('info-panel');
const infoBodyEl = document.getElementById('info-body');
const MAX_INFO_ROWS = 5;
let infoRows = [];

function addInfoRow(icon, text, label) {
  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

  infoRows.push({ icon, text, time: timeStr, label: label || '' });
  if (infoRows.length > MAX_INFO_ROWS) {
    infoRows.shift();
  }
  renderInfoPanel();
  infoPanelEl.classList.add('visible');
}

function setInfoLabel(label) {
  const labelEl = infoPanelEl.querySelector('.info-label');
  if (labelEl) labelEl.textContent = label;
}

function renderInfoPanel() {
  infoBodyEl.innerHTML = '';
  for (const row of infoRows) {
    const div = document.createElement('div');
    div.className = 'info-row';

    const icon = document.createElement('span');
    icon.className = 'info-icon';
    icon.textContent = row.icon;
    div.appendChild(icon);

    const text = document.createElement('span');
    text.className = 'info-text';
    text.textContent = row.text;
    div.appendChild(text);

    const time = document.createElement('span');
    time.className = 'info-time';
    time.textContent = row.time;
    div.appendChild(time);

    infoBodyEl.appendChild(div);
  }
}

// TODO読み込み
async function loadTodo() {
  try {
    const res = await fetch('/api/todo');
    const data = await res.json();
    todoListEl.innerHTML = '';
    const fs = todoSettings.fontSize;
    let lastSection = null;
    for (const item of data.items) {
      const text_val = typeof item === 'string' ? item : item.text;
      const status = typeof item === 'string' ? 'todo' : item.status;
      const section = item.section || '';

      // セクション見出し
      if (section && section !== lastSection) {
        const sectionEl = document.createElement('div');
        sectionEl.className = 'todo-section';
        sectionEl.textContent = section;
        todoListEl.appendChild(sectionEl);
        lastSection = section;
      }

      const div = document.createElement('div');
      div.className = 'todo-item' + (status === 'in_progress' ? ' in-progress' : '');

      if (status === 'in_progress') {
        const arrow = document.createElement('span');
        arrow.className = 'todo-arrow';
        arrow.textContent = '▶';
        div.appendChild(arrow);
      }

      const cb = document.createElement('span');
      cb.className = 'todo-checkbox';
      const text = document.createElement('span');
      text.textContent = text_val;
      if (fs) text.style.fontSize = fs + 'px';
      div.appendChild(cb);
      div.appendChild(text);
      todoListEl.appendChild(div);
    }
  } catch (e) {
    console.log('TODO読み込みエラー:', e.message);
  }
}

// WebSocket接続（画面表示のみ、音声は別ソースで再生）
function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${protocol}//${location.host}/ws/overlay`);

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === 'comment') {
      showSubtitle(data);
    } else if (data.type === 'speaking_end') {
      fadeSubtitle();
    } else if (data.type === 'current_task') {
      addInfoRow('🔧', data.task);
    } else if (data.type === 'info') {
      addInfoRow(data.icon || '📋', data.text, data.label);
    } else if (data.type === 'settings_update') {
      applySettings(data);
    }
  };

  ws.onclose = () => {
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    ws.close();
  };
}

// 初期化: 設定を読み込んでからTODOを読み込む
async function init() {
  try {
    const res = await fetch('/api/overlay/settings');
    const s = await res.json();
    applySettings(s);
  } catch (e) {
    console.log('設定読み込みスキップ:', e.message);
  }
  await loadTodo();
  setInterval(loadTodo, 30000);
  connectWS();
}

init();
</script>

</body>
</html>
