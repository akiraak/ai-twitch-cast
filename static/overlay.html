<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; width: 1920px; height: 1080px; position: relative; overflow: hidden; font-family: "Noto Sans JP", "Yu Gothic UI", "Meiryo", sans-serif; }

  /* リアルタイム字幕（下中央） */
  #subtitle {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: linear-gradient(135deg, rgba(20, 20, 40, 0.85), rgba(30, 20, 50, 0.85));
    border: 1px solid rgba(124, 77, 255, 0.3);
    border-radius: 16px;
    padding: 20px 32px;
    max-width: 1200px;
    min-width: 400px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
    backdrop-filter: blur(8px);
  }
  #subtitle.visible { opacity: 1; }
  #subtitle.fading { opacity: 0; transition: opacity 1.5s ease; }

  #subtitle .comment {
    display: none;
  }
  #subtitle .response {
    font-size: 36px;
    color: #ffffff;
    font-weight: bold;
    margin-bottom: 10px;
    line-height: 1.5;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7), 0 0 20px rgba(124, 77, 255, 0.2);
    letter-spacing: 0.5px;
  }
  #subtitle .english {
    font-size: 20px;
    color: #b2dfdb;
    font-style: italic;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
  }

  /* TODOパネル（中央） */
  #todo-panel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    width: 540px;
    max-height: 70vh;
    overflow: hidden;
    background: linear-gradient(135deg, rgba(0, 0, 0, 0.95), rgba(5, 0, 10, 0.95));
    border: 1px solid rgba(124, 77, 255, 0.3);
    border-radius: 12px;
    padding: 20px 24px;
    backdrop-filter: blur(6px);
    pointer-events: none;
  }
  #todo-panel .todo-title {
    font-size: 28px;
    font-weight: bold;
    color: #ffffff;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  #todo-panel .todo-section {
    font-size: 16px;
    color: rgba(255, 255, 255, 0.6);
    font-weight: bold;
    letter-spacing: 1px;
    margin-top: 10px;
    margin-bottom: 4px;
    padding-top: 6px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }
  #todo-panel .todo-section:first-child {
    margin-top: 0;
    padding-top: 0;
    border-top: none;
  }
  #todo-panel .todo-item {
    color: rgba(255, 255, 255, 0.9);
    font-size: 24px;
    padding: 6px 0;
    line-height: 1.5;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
  }
  #todo-panel .todo-checkbox {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255, 255, 255, 0.5);
    border-radius: 3px;
  }

  /* 作業中アイテム - 強調表示 */
  #todo-panel .todo-item.in-progress {
    color: #ffffff;
    font-weight: bold;
    font-size: 26px;
    padding: 10px 12px;
    margin: 4px -10px;
    background: linear-gradient(90deg, rgba(124, 77, 255, 0.2), rgba(124, 77, 255, 0.05));
    border-radius: 8px;
    border-left: 3px solid #b388ff;
    animation: pulse-glow 2s ease-in-out infinite;
  }
  #todo-panel .todo-item.in-progress .todo-checkbox {
    width: 20px;
    height: 20px;
    background: #7c4dff;
    border-color: #b388ff;
    border-radius: 4px;
    box-shadow: 0 0 8px rgba(124, 77, 255, 0.5);
  }
  #todo-panel .todo-item.in-progress .todo-arrow {
    color: #b388ff;
    font-size: 18px;
    animation: arrow-bounce 1.2s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0px rgba(124, 77, 255, 0); }
    50% { box-shadow: 0 0 12px rgba(124, 77, 255, 0.15); }
  }
  @keyframes arrow-bounce {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(3px); }
  }

  /* トピックパネル（左上） */
  #topic-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 20;
    max-width: 600px;
    min-width: 280px;
    background: linear-gradient(135deg, rgba(0, 0, 0, 0.95), rgba(5, 0, 10, 0.95));
    border: 1px solid rgba(124, 77, 255, 0.3);
    border-radius: 10px;
    padding: 0;
    backdrop-filter: blur(6px);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
    overflow: hidden;
  }
  #topic-panel.visible { opacity: 1; }
  #topic-panel .topic-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: linear-gradient(90deg, rgba(124, 77, 255, 0.15), transparent);
    border-bottom: 1px solid rgba(124, 77, 255, 0.1);
  }
  #topic-panel .topic-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #b388ff;
    box-shadow: 0 0 6px rgba(124, 77, 255, 0.6);
    animation: dot-pulse 2s ease-in-out infinite;
  }
  #topic-panel .topic-dot.paused {
    background: #666;
    box-shadow: none;
    animation: none;
  }
  @keyframes dot-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  #topic-panel .topic-label {
    font-size: 15px;
    color: #b388ff;
    font-weight: bold;
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(124, 77, 255, 0.3);
  }
  #topic-panel .topic-body {
    padding: 12px 14px;
  }
  #topic-panel .topic-title {
    font-size: 24px;
    color: #ffffff;
    font-weight: bold;
    line-height: 1.4;
    word-break: break-word;
  }
  #topic-panel .topic-desc {
    font-size: 16px;
    color: rgba(255, 255, 255, 0.5);
    margin-top: 6px;
    line-height: 1.4;
  }
  #topic-panel .topic-stats {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.35);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }

</style>
</head>
<body>

<div id="subtitle">
  <div class="comment"><span class="author"></span><span class="message"></span></div>
  <div class="response"></div>
  <div class="english"></div>
</div>

<div id="todo-panel">
  <div class="todo-title">TODO</div>
  <div id="todo-list"></div>
</div>

<div id="topic-panel">
  <div class="topic-header">
    <span class="topic-dot" id="topic-dot"></span>
    <span class="topic-label">TOPIC</span>
  </div>
  <div class="topic-body">
    <div class="topic-title" id="topic-title-text"></div>
    <div class="topic-desc" id="topic-desc-text"></div>
    <div class="topic-stats" id="topic-stats"></div>
  </div>
</div>


<script>
const subtitleEl = document.getElementById('subtitle');
const todoPanelEl = document.getElementById('todo-panel');
const todoListEl = document.getElementById('todo-list');
let fadeTimer = null;

// TODO設定を保持
let todoSettings = {};

function applySettings(s) {
  if (s.subtitle) {
    if (s.subtitle.bottom != null) subtitleEl.style.bottom = s.subtitle.bottom + 'px';
    if (s.subtitle.fontSize != null) subtitleEl.querySelector('.response').style.fontSize = s.subtitle.fontSize + 'px';
    if (s.subtitle.fadeDuration != null) subtitleEl.dataset.fadeDuration = s.subtitle.fadeDuration;
  }
  if (s.todo) {
    todoSettings = s.todo;
    if (s.todo.width != null) todoPanelEl.style.width = s.todo.width + 'px';
    if (s.todo.height) {
      todoPanelEl.style.height = s.todo.height + 'px';
      todoPanelEl.style.overflowY = 'hidden';
    } else {
      todoPanelEl.style.height = '';
      todoPanelEl.style.overflowY = '';
    }
    if (s.todo.titleFontSize != null) todoPanelEl.querySelector('.todo-title').style.fontSize = s.todo.titleFontSize + 'px';
    if (s.todo.positionX != null || s.todo.positionY != null) {
      const x = s.todo.positionX ?? 960;
      const y = s.todo.positionY ?? 540;
      todoPanelEl.style.left = x + 'px';
      todoPanelEl.style.top = y + 'px';
      todoPanelEl.style.transform = 'none';
    }
    // 既存のTODOアイテムにもフォントサイズを適用
    if (s.todo.fontSize != null) {
      todoPanelEl.querySelectorAll('.todo-item').forEach(el => el.style.fontSize = s.todo.fontSize + 'px');
    }
    // TODOを再読み込みして確実に反映
    loadTodo();
  }
  if (s.topic) {
    if (s.topic.positionX != null || s.topic.positionY != null) {
      topicPanelEl.style.left = (s.topic.positionX ?? 20) + 'px';
      topicPanelEl.style.top = (s.topic.positionY ?? 20) + 'px';
    }
    if (s.topic.width != null) topicPanelEl.style.width = s.topic.width + 'px';
    if (s.topic.titleFontSize != null) {
      document.getElementById('topic-title-text').style.fontSize = s.topic.titleFontSize + 'px';
    }
  }
}

function showSubtitle(data) {
  clearTimeout(fadeTimer);
  subtitleEl.classList.remove('fading');

  subtitleEl.querySelector('.author').textContent = '';
  subtitleEl.querySelector('.message').textContent = data.message;
  subtitleEl.querySelector('.response').textContent = data.response;
  subtitleEl.querySelector('.english').textContent = data.english || '';

  subtitleEl.classList.add('visible');
}

function fadeSubtitle() {
  const duration = parseFloat(subtitleEl.dataset.fadeDuration || 3) * 1000;
  fadeTimer = setTimeout(() => {
    subtitleEl.classList.add('fading');
    subtitleEl.classList.remove('visible');
  }, duration);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// トピックパネル（左上）
const topicPanelEl = document.getElementById('topic-panel');

function updateTopicPanel(data) {
  const titleEl = document.getElementById('topic-title-text');
  const descEl = document.getElementById('topic-desc-text');
  const statsEl = document.getElementById('topic-stats');
  const dotEl = document.getElementById('topic-dot');

  if (!data || !data.active) {
    topicPanelEl.classList.remove('visible');
    return;
  }

  titleEl.textContent = data.topic.title;
  descEl.textContent = data.topic.description || '';
  descEl.style.display = data.topic.description ? '' : 'none';

  const parts = [];
  if (data.remaining_scripts != null) parts.push(`残り ${data.remaining_scripts}件`);
  if (data.spoken_count != null) parts.push(`発話済み ${data.spoken_count}件`);
  if (data.paused) parts.push('一時停止中');
  statsEl.textContent = parts.join(' / ');

  dotEl.classList.toggle('paused', !!data.paused);
  topicPanelEl.classList.add('visible');
}

async function loadTopicPanel() {
  try {
    const res = await fetch('/api/topic');
    const data = await res.json();
    updateTopicPanel(data);
  } catch (e) {}
}

// TODO読み込み
async function loadTodo() {
  try {
    const res = await fetch('/api/todo');
    const data = await res.json();
    todoListEl.innerHTML = '';
    const fs = todoSettings.fontSize;
    let lastSection = null;
    for (const item of data.items) {
      const text_val = typeof item === 'string' ? item : item.text;
      const status = typeof item === 'string' ? 'todo' : item.status;
      const section = item.section || '';

      // セクション見出し
      if (section && section !== lastSection) {
        const sectionEl = document.createElement('div');
        sectionEl.className = 'todo-section';
        sectionEl.textContent = section;
        todoListEl.appendChild(sectionEl);
        lastSection = section;
      }

      const div = document.createElement('div');
      div.className = 'todo-item' + (status === 'in_progress' ? ' in-progress' : '');

      if (status === 'in_progress') {
        const arrow = document.createElement('span');
        arrow.className = 'todo-arrow';
        arrow.textContent = '▶';
        div.appendChild(arrow);
      }

      const cb = document.createElement('span');
      cb.className = 'todo-checkbox';
      const text = document.createElement('span');
      text.textContent = text_val;
      if (fs) text.style.fontSize = fs + 'px';
      div.appendChild(cb);
      div.appendChild(text);
      todoListEl.appendChild(div);
    }
  } catch (e) {
    console.log('TODO読み込みエラー:', e.message);
  }
}

// WebSocket接続（画面表示のみ、音声は別ソースで再生）
function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${protocol}//${location.host}/ws/overlay`);

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === 'comment') {
      showSubtitle(data);
    } else if (data.type === 'speaking_end') {
      fadeSubtitle();
    } else if (data.type === 'topic_update') {
      updateTopicPanel(data);
    } else if (data.type === 'settings_update') {
      applySettings(data);
    }
  };

  ws.onclose = () => {
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    ws.close();
  };
}

// 初期化: 設定を読み込んでからTODOを読み込む
async function init() {
  try {
    const res = await fetch('/api/overlay/settings');
    const s = await res.json();
    applySettings(s);
  } catch (e) {
    console.log('設定読み込みスキップ:', e.message);
  }
  await loadTodo();
  await loadTopicPanel();
  setInterval(loadTodo, 30000);
  setInterval(loadTopicPanel, 15000);
  connectWS();
}

init();
</script>

</body>
</html>
