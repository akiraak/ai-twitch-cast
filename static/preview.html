<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI Twitch Cast - Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    display: flex;
    width: 100vw; height: 100vh;
    background: #0d0d1a;
    font-family: system-ui, "Noto Sans JP", sans-serif;
    color: #eee;
    overflow: hidden;
  }

  /* === 配信プレビュー（左） === */
  #preview-area {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    position: relative;
    overflow: hidden;
  }
  #broadcast-frame {
    border: none;
  }

  /* === コントロールパネル（右） === */
  #control-panel {
    width: 280px;
    min-width: 280px;
    flex-shrink: 0;
    background: #111122;
    border-left: 2px solid #7c4dff;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .panel-section {
    padding: 12px 14px;
    border-bottom: 1px solid rgba(124, 77, 255, 0.15);
  }
  .panel-section h3 {
    font-size: 11px;
    color: #b388ff;
    font-weight: bold;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .panel-btn {
    display: block;
    width: 100%;
    padding: 8px 12px;
    margin-bottom: 6px;
    border: 1px solid #7c4dff;
    border-radius: 5px;
    background: transparent;
    color: #b388ff;
    font-size: 13px;
    cursor: pointer;
    text-align: center;
  }
  .panel-btn:hover { background: rgba(124, 77, 255, 0.15); }
  .panel-btn.go-live { background: #4caf50; color: #fff; border-color: #4caf50; font-weight: bold; }
  .panel-btn.go-live:hover { background: #43a047; }
  .panel-btn.stop { background: #f44336; color: #fff; border-color: #f44336; }
  .panel-btn.stop:hover { background: #e53935; }
  .panel-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #666;
  }
  .status-dot.live {
    background: #f44336;
    animation: pulse 2s infinite;
  }
  .status-dot.preview { background: #4caf50; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .stream-info {
    font-size: 11px;
    color: #999;
    margin-bottom: 6px;
  }

  select {
    width: 100%;
    padding: 6px 8px;
    margin-bottom: 6px;
    border: 1px solid #555;
    border-radius: 4px;
    background: #1a1a2e;
    color: #eee;
    font-size: 12px;
  }

  #chat-section {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  #chat-messages {
    flex: 1;
    min-height: 80px;
    overflow-y: auto;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .chat-msg-user { color: #999; }
  .chat-msg-user .chat-name { color: #7c4dff; font-weight: 600; }
  .chat-msg-ai {
    color: #e0e0e0;
    padding-left: 8px;
    border-left: 2px solid #7c4dff;
  }
  .chat-msg-err { color: #e76f51; font-size: 11px; }
  .chat-input-area {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }
  #chat-input {
    flex: 1;
    padding: 6px 8px;
    border: 1px solid #555;
    border-radius: 4px;
    background: #1a1a2e;
    color: #eee;
    font-size: 12px;
  }
  #chat-send-btn {
    padding: 6px 12px;
    background: #7c4dff;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
  }
  #chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* === 音量メーター === */
  .meter-container {
    position: relative;
    height: 10px;
    background: #0a0a14;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid #333;
  }
  .meter-bar {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 0%;
    transition: width 0.05s linear;
    border-radius: 2px;
  }
  .meter-bar.level {
    background: linear-gradient(90deg, #2d6a4f 0%, #52b788 50%, #f4a261 80%, #e76f51 95%);
    z-index: 1;
  }
  .meter-bar.peak {
    width: 2px;
    background: #fff;
    z-index: 2;
    transition: left 0.05s linear;
    left: 0%;
  }
  .meter-scale {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 3;
    pointer-events: none;
  }
  .meter-scale-mark {
    position: absolute;
    top: 0;
    height: 100%;
    border-left: 1px solid rgba(255,255,255,0.08);
  }
  .meter-scale-label {
    display: none;
  }
  .meter-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 4px;
    font-size: 10px;
    font-family: "Consolas", "Courier New", monospace;
  }
  .meter-db { color: #52b788; }
  .meter-db.hot { color: #f4a261; }
  .meter-db.clip { color: #e76f51; }
  .meter-peak { color: #666; }
  .meter-sources {
    display: flex;
    gap: 4px;
    margin-bottom: 6px;
  }
  .meter-src {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 2px;
    background: #222;
    color: #555;
    transition: all 0.15s;
  }
  .meter-src.active { color: #fff; }
  .meter-src.bgm.active { background: #2d6a4f; }
  .meter-src.tts.active { background: #5c4d9a; }
</style>
</head>
<body>

<!-- 配信プレビュー -->
<div id="preview-area">
  <iframe id="broadcast-frame"></iframe>
</div>

<!-- コントロールパネル -->
<div id="control-panel">
  <!-- 配信状態 -->
  <div class="panel-section">
    <h3>配信</h3>
    <div class="status-indicator">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-label">PREVIEW</span>
    </div>
    <div class="stream-info" id="stream-info"></div>
    <button class="panel-btn go-live" id="go-live-btn" onclick="goLive()">Go Live</button>
    <button class="panel-btn stop" id="stop-btn" style="display:none;" onclick="stopLive()">配信停止</button>
  </div>

  <!-- ウィンドウキャプチャ -->
  <div class="panel-section">
    <h3>ウィンドウキャプチャ</h3>
    <select id="window-list"><option value="">-- ウィンドウ選択 --</option></select>
    <button class="panel-btn" onclick="addCapture()">追加</button>
    <span id="capture-msg" style="font-size:0.8rem;margin-left:8px;"></span>
  </div>

  <!-- 音量メーター -->
  <div class="panel-section">
    <h3>音量</h3>
    <div class="meter-sources">
      <span class="meter-src bgm" id="meter-bgm">BGM</span>
      <span class="meter-src tts" id="meter-tts">Voice</span>
    </div>
    <div class="meter-container">
      <div class="meter-bar level" id="meter-level"></div>
      <div class="meter-bar peak" id="meter-peak"></div>
      <div class="meter-scale" id="meter-scale"></div>
    </div>
    <div class="meter-info">
      <span class="meter-db" id="meter-db">-∞ dB</span>
      <span class="meter-peak" id="meter-peak-db">pk -∞</span>
    </div>
  </div>

  <!-- チャット -->
  <div class="panel-section" id="chat-section">
    <h3>チャット</h3>
    <div id="chat-messages"></div>
    <div class="chat-input-area">
      <input type="text" id="chat-input" placeholder="メッセージを入力..."
             onkeydown="if(event.key==='Enter'&&!this.disabled)sendChat()">
      <button id="chat-send-btn" onclick="sendChat()">送信</button>
    </div>
  </div>
</div>

<script>
const frame = document.getElementById('broadcast-frame');
const params = new URLSearchParams(location.search);
const token = params.get('token');

// iframe にbroadcast.htmlを読み込み（embedded）
frame.src = `/broadcast?token=${token}&embedded`;

// プレビューエリアに合わせてiframeを16:9レターボックス表示
function resizeFrame() {
  const area = document.getElementById('preview-area');
  const areaW = area.clientWidth;
  const areaH = area.clientHeight;
  const aspect = 16 / 9;
  let w, h;
  if (areaW / areaH > aspect) {
    h = areaH;
    w = Math.floor(h * aspect);
  } else {
    w = areaW;
    h = Math.floor(w / aspect);
  }
  frame.style.width = w + 'px';
  frame.style.height = h + 'px';
}
resizeFrame();
window.addEventListener('resize', resizeFrame);

// === 配信制御 ===
async function goLive() {
  const btn = document.getElementById('go-live-btn');
  btn.textContent = '起動中...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/broadcast/go-live', { method: 'POST' });
    const data = await res.json();
    if (!data.ok) alert('配信開始失敗: ' + (data.detail || ''));
  } catch (e) {
    alert('配信開始失敗: ' + e.message);
  } finally {
    btn.textContent = 'Go Live';
    btn.disabled = false;
    updateStatus();
  }
}

async function stopLive() {
  if (!confirm('配信を停止しますか？')) return;
  try {
    await fetch('/api/broadcast/stop', { method: 'POST' });
  } catch (e) {
    alert('配信停止失敗: ' + e.message);
  }
  updateStatus();
}

async function updateStatus() {
  try {
    const res = await fetch('/api/broadcast/status');
    const st = await res.json();
    const dot = document.getElementById('status-dot');
    const label = document.getElementById('status-label');
    const goBtn = document.getElementById('go-live-btn');
    const stopBtn = document.getElementById('stop-btn');
    const info = document.getElementById('stream-info');

    if (st.streaming) {
      dot.className = 'status-dot live';
      label.textContent = 'LIVE';
      label.style.color = '#f44336';
      goBtn.style.display = 'none';
      stopBtn.style.display = '';
      const mins = Math.floor((st.uptime_seconds || 0) / 60);
      const secs = Math.floor((st.uptime_seconds || 0) % 60);
      info.textContent = `${st.resolution || '1920x1080'} ${st.framerate || 30}fps | ${mins}:${String(secs).padStart(2,'0')}`;
    } else {
      dot.className = 'status-dot preview';
      label.textContent = 'PREVIEW';
      label.style.color = '#eee';
      goBtn.style.display = '';
      stopBtn.style.display = 'none';
      info.textContent = '';
    }
  } catch (e) {}
}

// === ウィンドウキャプチャ ===
async function loadWindows() {
  const sel = document.getElementById('window-list');
  const msg = document.getElementById('capture-msg');
  sel.innerHTML = '<option value="">-- ウィンドウ選択 --</option>';
  try {
    const res = await fetch('/api/capture/windows');
    const windows = await res.json();
    if (msg && !msg.textContent.startsWith('追加')) msg.textContent = `${windows.length}件`;
    for (const w of windows) {
      const opt = document.createElement('option');
      opt.value = w.sourceId;
      opt.textContent = w.name.substring(0, 40);
      sel.appendChild(opt);
    }
  } catch (e) {}
}

async function addCapture() {
  const sel = document.getElementById('window-list');
  const msg = document.getElementById('capture-msg');
  const sourceId = sel.value;
  if (!sourceId) { msg.textContent = 'ウィンドウを選択してください'; return; }
  msg.textContent = '追加中...';
  try {
    const res = await fetch('/api/capture/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sourceId, label: sel.selectedOptions[0]?.textContent || '' }),
    });
    const data = await res.json();
    msg.textContent = data.ok ? `追加: ${data.id}` : `エラー: ${data.detail || data.error}`;
  } catch (e) { msg.textContent = `エラー: ${e.message}`; }
}

// === 音量メーター ===
const METER_MIN_DB = -60;
const meterLevel = document.getElementById('meter-level');
const meterPeakBar = document.getElementById('meter-peak');
const meterDbEl = document.getElementById('meter-db');
const meterPeakDbEl = document.getElementById('meter-peak-db');
const meterBgm = document.getElementById('meter-bgm');
const meterTts = document.getElementById('meter-tts');

// dBスケール描画
(function() {
  const scaleEl = document.getElementById('meter-scale');
  [-48, -36, -24, -12, -6, 0].forEach(db => {
    const pct = meterDbToPct(db);
    const mark = document.createElement('div');
    mark.className = 'meter-scale-mark';
    mark.style.left = pct + '%';
    scaleEl.appendChild(mark);
    const lbl = document.createElement('div');
    lbl.className = 'meter-scale-label';
    lbl.style.left = pct + '%';
    lbl.textContent = db;
    scaleEl.appendChild(lbl);
  });
})();

function meterDbToPct(db) {
  if (db <= METER_MIN_DB) return 0;
  if (db >= 0) return 100;
  return ((db - METER_MIN_DB) / (0 - METER_MIN_DB)) * 100;
}

let meterSmooth = METER_MIN_DB;

function updateMeter(data) {
  const db = isFinite(data.db) ? Math.max(METER_MIN_DB, data.db) : METER_MIN_DB;
  const peak = isFinite(data.peak) ? Math.max(METER_MIN_DB, data.peak) : METER_MIN_DB;

  meterSmooth = db > meterSmooth ? db : meterSmooth * 0.85 + db * 0.15;

  meterLevel.style.width = meterDbToPct(meterSmooth) + '%';
  meterPeakBar.style.left = meterDbToPct(peak) + '%';

  const dbStr = meterSmooth <= METER_MIN_DB ? '-∞ dB' : meterSmooth.toFixed(1) + ' dB';
  const pkStr = peak <= METER_MIN_DB ? 'pk -∞' : 'pk ' + peak.toFixed(0);
  meterDbEl.textContent = dbStr;
  meterPeakDbEl.textContent = pkStr;
  meterDbEl.className = 'meter-db' + (meterSmooth > -3 ? ' clip' : meterSmooth > -12 ? ' hot' : '');

  meterBgm.classList.toggle('active', !!data.bgm);
  meterTts.classList.toggle('active', !!data.tts);
}

// broadcast.html iframe からの postMessage で音量レベルを受信
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'audio_level') updateMeter(e.data);
});

// === チャット ===
async function sendChat() {
  const input = document.getElementById('chat-input');
  const btn = document.getElementById('chat-send-btn');
  const msg = input.value.trim();
  if (!msg) return;

  input.disabled = true;
  btn.disabled = true;
  input.value = '';
  appendChat('GM', msg);

  try {
    const res = await fetch('/api/chat/webui', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });
    const data = await res.json();
    if (data.response) {
      appendChat(null, data.response);
    }
  } catch (e) {
    appendChatErr('エラー: ' + e.message);
  } finally {
    input.disabled = false;
    btn.disabled = false;
    input.focus();
  }
}

function appendChat(author, text) {
  const c = document.getElementById('chat-messages');
  const div = document.createElement('div');
  if (author) {
    div.className = 'chat-msg-user';
    div.innerHTML = '<span class="chat-name">' + escapeHtml(author) + '</span> ' + escapeHtml(text);
  } else {
    div.className = 'chat-msg-ai';
    div.textContent = text;
  }
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
}

function appendChatErr(text) {
  const c = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg-err';
  div.textContent = text;
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// === 初期化 ===
updateStatus();
setInterval(updateStatus, 3000);
loadWindows();
setInterval(loadWindows, 10000);
</script>
</body>
</html>
