<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>BGM Audio</title></head>
<body style="background:transparent;">
<audio id="bgm" loop></audio>
<script>
const bgmEl = document.getElementById('bgm');

function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${protocol}//${location.host}/ws/bgm`);
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'bgm_play') {
      bgmEl.src = data.url;
      bgmEl.load();
      bgmEl.play().catch(e => console.log('BGM再生エラー:', e));
    } else if (data.type === 'bgm_stop') {
      bgmEl.pause();
      bgmEl.src = '';
    }
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
  ws.onerror = () => ws.close();
}
connectWS();
</script>
</body></html>
