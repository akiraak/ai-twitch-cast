site_name: AI Twitch Cast Docs
site_url: https://akiraak.github.io/ai-twitch-cast/
repo_url: https://github.com/akiraak/ai-twitch-cast
repo_name: akiraak/ai-twitch-cast

theme:
  name: material
  language: ja
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: ダークモードに切替
    - scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: ライトモードに切替
  features:
    - navigation.instant
    - navigation.top
    - toc.integrate
    - search.highlight

nav:
  - ホーム: index.md
  - OBS:
    - OBS自動制御でできること: obs-automation-guide.md
    - OBS Studio 機能調査: obs-research.md
  - アバター:
    - アバター表示・アニメーション調査: avatar-research.md
    - 3Dモデル調査: 3d-model-research.md
    - アバター変更ガイド: avatar-change-guide.md
  - 運用:
    - コンソールコマンド: console-commands.md
    - リソース管理: resource-management.md

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
