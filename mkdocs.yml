site_name: AI Twitch Cast Docs
site_url: https://akiraak.github.io/ai-twitch-cast/
repo_url: https://github.com/akiraak/ai-twitch-cast
repo_name: akiraak/ai-twitch-cast

theme:
  name: material
  language: ja
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: ダークモードに切替
    - scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: ライトモードに切替
  features:
    - navigation.instant
    - navigation.top
    - toc.integrate
    - search.highlight

nav:
  - ホーム: index.md
  - アバター:
    - アバター表示・アニメーション調査: avatar-research.md
    - 3Dモデル調査: 3d-model-research.md
    - VRM表示 実装プラン: vrm-implementation-plan.md
    - VRM変換 作業ログ: vrm-conversion-log.md
  - 音声:
    - ボイスサンプル比較: voice-samples.md
  - 配信:
    - ウィンドウキャプチャ: window-capture.md
  - Web UI:
    - デザイン改善提案: webui-design-proposal.md
  - キャラクター:
    - 会話生成の仕組み: character-prompt.md
  - 運用:
    - リソース管理: resource-management.md
    - バージョニングルール: versioning.md

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
